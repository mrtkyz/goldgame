<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bisiklet Yarışı</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #12263a;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(120, 190, 255, 0.3);
    max-width: 100vw;
    max-height: 100vh;
  }

  #back {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: #8fd3ff;
    background: rgba(10, 25, 45, 0.75);
    border: 1px solid rgba(143, 211, 255, 0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    text-decoration: none;
  }

  /* Ayarlar menüsü */
  #settings {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  #settings button {
    border: 2px solid rgba(143, 211, 255, 0.5);
    background: rgba(10, 25, 45, 0.85);
    color: #8fd3ff;
    border-radius: 999px;
    font-size: 16px;
    padding: 10px 18px;
    -webkit-tap-highlight-color: transparent;
  }
  #gear {
    width: 46px;
    height: 46px;
    padding: 0 !important;
    font-size: 24px;
    border-radius: 50% !important;
  }
  #menu { display: flex; flex-direction: column; gap: 8px; }
  #menu.hidden { display: none; }

  /* Direksiyon okları: sadece dokunmatik cihazlarda görünür */
  .steer {
    display: none;
    position: fixed;
    bottom: 24px;
    z-index: 10;
    width: 84px;
    height: 84px;
    border-radius: 50%;
    border: 2px solid rgba(143, 211, 255, 0.5);
    background: rgba(10, 25, 45, 0.55);
    color: #8fd3ff;
    font-size: 36px;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.85;
  }
  #steerL { left: 18px; }
  #steerR { right: 18px; }
  #boost {
    left: 50%;
    transform: translateX(-50%);
    border-color: rgba(255, 213, 74, 0.6);
    color: #ffd54a;
    font-size: 30px;
  }
  @media (pointer: coarse) {
    .steer { display: block; }
  }
  .steer:active { background: rgba(143, 211, 255, 0.35); }
  #boost:active { background: rgba(255, 213, 74, 0.35); }
</style>
</head>
<body>
<a id="back" href="index.html">← Oyunlar</a>
<div id="settings">
  <button id="gear" aria-label="Ayarlar">⚙</button>
  <div id="menu" class="hidden">
    <button id="btnPause">⏸ Durdur</button>
    <button id="btnStart">▶ Başlat</button>
    <button id="btnExit">✕ Çık</button>
  </div>
</div>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<button id="steerL" class="steer" aria-label="Sola dön">◀</button>
<button id="boost" class="steer" aria-label="Hızlan">⚡</button>
<button id="steerR" class="steer" aria-label="Sağa dön">▶</button>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const HORIZON = 300;          // ufuk çizgisi
  const ROADHALF = 250;         // dar sokak: yolun en yakın yarı genişliği
  const BEND = 300;             // virajın ufuktaki bükülme miktarı
  const RACE_UNITS = 1000;      // yarış uzunluğu (1 birim = 2 m -> 2000 m)
  const RIVAL_COUNT = 9;

  function fit() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  addEventListener('resize', fit);
  fit();

  // ---- Oyun durumu ----
  const STATE = { MENU: 0, PLAYING: 1, OVER: 2 };
  let state = STATE.MENU;
  let paused = false;

  let distance, speed, playerX, elapsed, countT, finalRank;
  let curveCur, curveTarget, sectionEnd;
  let rivals, crowds, nextCrowdZ;
  let bumpT, shake, rumbleAcc;
  let stamina, boosting;
  let bestRank = +(localStorage.getItem('bisiklet-best-rank') || 0); // 0 = henüz yok

  const JERSEYS = ['#e74c3c', '#3498db', '#f1c40f', '#9b59b6', '#e67e22', '#1abc9c', '#ff6b9d', '#2ecc71', '#f5f5f5'];
  const BLD_COLORS = ['#c9866b', '#b8a06a', '#8fa3b8', '#a08ab5', '#c2b280', '#9db884', '#b87f7f'];
  const SHIRTS = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#e67e22', '#ff6b9d', '#ecf0f1', '#9b59b6'];

  function resetWorld() {
    distance = 0; speed = 0; playerX = 0; elapsed = 0;
    countT = 3.5; finalRank = 0;
    curveCur = 0; curveTarget = 0; sectionEnd = 35;
    bumpT = 0; shake = 0; rumbleAcc = 0;
    stamina = 1; boosting = false;

    rivals = [];
    for (let i = 0; i < RIVAL_COUNT; i++) {
      rivals.push({
        z: 2 + (i % 3) * 2.2,                       // start çizgisinde küme halinde
        x: -0.6 + (i % 5) * 0.3 + Math.random() * 0.1,
        s: 0,
        target: 17 + Math.random() * 6.5,            // güçlü rakipler
        wob: Math.random() * Math.PI * 2,
        jersey: JERSEYS[i % JERSEYS.length],
        passed: false,
      });
    }

    crowds = [];
    nextCrowdZ = 3;
    while (nextCrowdZ < 50) spawnCrowd();
  }

  function spawnCrowd() {
    for (const side of [-1, 1]) {
      if (Math.random() < 0.85) {
        crowds.push({
          z: nextCrowdZ + Math.random(),
          x: side * (1.14 + Math.random() * 0.12),
          n: 3 + Math.floor(Math.random() * 3),
          seed: Math.random() * 100,
        });
      }
    }
    nextCrowdZ += 2.4;
  }

  resetWorld(); // menü arkaplanı için dünya hazır

  function startGame() {
    resetWorld();
    state = STATE.PLAYING;
    paused = false;
  }

  function finishRace() {
    finalRank = rank();
    if (bestRank === 0 || finalRank < bestRank) {
      bestRank = finalRank;
      localStorage.setItem('bisiklet-best-rank', bestRank);
    }
    state = STATE.OVER;
    if (finalRank === 1) { sndWin(); } else { sndFinish(); }
  }

  const rank = () => 1 + rivals.filter(r => r.z > distance).length;

  // ---- Sesler ----
  let audioCtx = null;
  function getAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    } catch (e) { return null; }
  }
  function beep(freq, dur, type = 'sine', vol = 0.15, delay = 0) {
    const ac = getAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ac.destination);
    o.start(t0);
    o.stop(t0 + dur);
  }
  const sndBump = () => beep(90, 0.15, 'sawtooth', 0.18);
  const sndRumble = () => beep(85, 0.05, 'triangle', 0.05);
  const sndCheer = () => { beep(620, 0.09, 'triangle', 0.14); beep(830, 0.09, 'triangle', 0.14, 0.07); beep(1040, 0.12, 'triangle', 0.14, 0.14); };
  const sndCount = () => beep(440, 0.15, 'square', 0.12);
  const sndGo = () => beep(880, 0.35, 'square', 0.14);
  const sndFinish = () => { beep(520, 0.15, 'triangle', 0.15); beep(660, 0.25, 'triangle', 0.15, 0.15); };
  const sndWin = () => { [523, 659, 784, 1047].forEach((f, i) => beep(f, 0.22, 'triangle', 0.16, i * 0.15)); };

  // ---- Girdi ----
  const keys = {};
  addEventListener('keydown', e => {
    if ((state === STATE.MENU || state === STATE.OVER) &&
        (e.key === ' ' || e.key === 'Enter')) { startGame(); e.preventDefault(); return; }
    keys[e.key] = true;
    if ([' ', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
  });
  addEventListener('keyup', e => keys[e.key] = false);

  let steerTouch = 0, boostTouch = false;
  for (const [id, val] of [['steerL', -1], ['steerR', 1]]) {
    const btn = document.getElementById(id);
    btn.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (state !== STATE.PLAYING) { startGame(); return; }
      steerTouch = val;
    });
    for (const ev of ['pointerup', 'pointercancel', 'pointerleave']) {
      btn.addEventListener(ev, () => { if (steerTouch === val) steerTouch = 0; });
    }
  }
  const boostBtn = document.getElementById('boost');
  boostBtn.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (state !== STATE.PLAYING) { startGame(); return; }
    boostTouch = true;
  });
  for (const ev of ['pointerup', 'pointercancel', 'pointerleave']) {
    boostBtn.addEventListener(ev, () => boostTouch = false);
  }
  canvas.addEventListener('pointerdown', () => {
    if (state !== STATE.PLAYING) startGame();
  });

  // Ayarlar menüsü
  const menuEl = document.getElementById('menu');
  document.getElementById('gear').addEventListener('click', () => {
    menuEl.classList.toggle('hidden');
  });
  document.getElementById('btnPause').addEventListener('click', () => {
    if (state === STATE.PLAYING) paused = true;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnStart').addEventListener('click', () => {
    if (state !== STATE.PLAYING) startGame();
    paused = false;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnExit').addEventListener('click', () => {
    location.href = 'index.html';
  });

  // ---- Güncelleme ----
  let lastCountInt = 4;
  function update(dt) {
    if (state !== STATE.PLAYING || paused) return;

    // Geri sayım: herkes start çizgisinde bekler
    if (countT > 0) {
      countT -= dt;
      const ci = Math.ceil(countT);
      if (ci < lastCountInt && ci > 0) { sndCount(); lastCountInt = ci; }
      if (countT <= 0) sndGo();
      return;
    }

    elapsed += dt;

    // Enerji (sprint): basılı tutunca hızlanırsın, enerji biter; bırakınca dolar
    const boostInput = keys[' '] || keys['w'] || keys['W'] || boostTouch;
    boosting = boostInput && stamina > 0;
    if (boosting) {
      stamina = Math.max(0, stamina - dt * 0.3);
    } else {
      stamina = Math.min(1, stamina + dt * 0.13);
    }

    // Oyuncu hızı: sprint olmadan rakipleri geçmek zor
    const maxSpeed = Math.min(24, 16 + elapsed * 0.18) + (boosting ? 8 : 0);
    speed += (maxSpeed - speed) * dt * (boosting ? 0.9 : 0.4);

    // Direksiyon (yol dümdüz, viraj yok)
    let steer = steerTouch;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) steer = -1;
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) steer = 1;
    playerX += steer * dt * 2.0;
    playerX = Math.max(-1.25, Math.min(1.25, playerX));

    // Kaldırıma çıkma: seyircilerin arasında yavaşlarsın
    const offroad = Math.abs(playerX) > 1;
    if (offroad) {
      speed = Math.max(5, speed * (1 - 1.4 * dt));
      shake = 3;
      rumbleAcc += dt;
      if (rumbleAcc > 0.13) { rumbleAcc = 0; sndRumble(); }
    } else {
      shake = Math.max(0, shake - dt * 12);
    }

    distance += speed * dt;

    // Rakipler
    if (bumpT > 0) bumpT -= dt;
    for (const r of rivals) {
      r.wob += dt;
      const wobble = Math.sin(r.wob * 0.7) * 1.3;
      r.s += (r.target + wobble - r.s) * dt * 0.35;
      r.z += r.s * dt;
      // hafif şerit değiştirme
      r.x = Math.max(-0.85, Math.min(0.85, r.x + Math.sin(r.wob * 0.35) * 0.002));

      // Geçiş tezahüratı
      if (!r.passed && r.z < distance) { r.passed = true; sndCheer(); }
      else if (r.passed && r.z > distance + 0.5) { r.passed = false; }

      // Çarpışmasız yarış ama sıkışırsan yavaşlarsın (nazik temas)
      const zRel = r.z - distance + 1;
      if (bumpT <= 0 && zRel > 0.88 && zRel < 1.18 && Math.abs(r.x - playerX) < 0.24) {
        speed = Math.max(5, Math.min(speed, r.s * 0.8));
        playerX += (playerX >= r.x ? 1 : -1) * 0.2;
        bumpT = 0.7;
        shake = 3;
        sndBump();
      }
    }

    // Sahne üretimi
    while (nextCrowdZ < distance + 50) spawnCrowd();
    crowds = crowds.filter(c => c.z - distance + 1 > 0.5);

    // Bitiş
    if (distance >= RACE_UNITS) finishRace();
  }

  // ---- Çizim ----
  const rowCenter = f => W / 2 - playerX * ROADHALF * f + curveCur * (1 - f) * (1 - f) * BEND;

  function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, HORIZON);
    g.addColorStop(0, '#4aa8e8');
    g.addColorStop(1, '#cfe8f7');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, HORIZON);
    // güneş
    ctx.beginPath();
    ctx.arc(W * 0.76, 66, 30, 0, Math.PI * 2);
    ctx.fillStyle = '#ffe89a';
    ctx.fill();
    // uzak şehir silueti: virajla hafif kayar
    const mOff = -curveCur * 60;
    ctx.fillStyle = '#8aa8c4';
    for (const [bx, bw, bh] of [[-40, 70, 70], [50, 55, 110], [120, 80, 60], [220, 60, 130], [300, 75, 85], [390, 65, 105], [460, 70, 65]]) {
      ctx.fillRect(mOff + bx, HORIZON - bh, bw, bh);
    }
    ctx.fillStyle = '#7b9ab8';
    for (const [bx, bw, bh] of [[10, 50, 45], [160, 55, 80], [350, 50, 55]]) {
      ctx.fillRect(mOff + bx, HORIZON - bh, bw, bh);
    }
    // bulutlar
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    const t = performance.now() / 1000;
    for (const [bx, by, br] of [[80, 50, 20], [250, 90, 16], [400, 45, 22]]) {
      const x = (bx + t * 5) % (W + 80) - 40;
      ctx.beginPath();
      ctx.ellipse(x, by, br * 1.6, br * 0.7, 0, 0, Math.PI * 2);
      ctx.ellipse(x + br, by + 4, br * 1.1, br * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawRoad() {
    for (let sy = HORIZON; sy < H; sy++) {
      const f = (sy - HORIZON) / (H - HORIZON);
      const z = distance + 1 / Math.max(f, 0.02);
      const band = Math.floor(z * 1.4) % 2;
      // kaldırım (arka plan şeridi)
      ctx.fillStyle = band ? '#9aa0a8' : '#8f959d';
      ctx.fillRect(0, sy, W, 1);
      // asfalt
      const c = rowCenter(f);
      const half = ROADHALF * f;
      ctx.fillStyle = band ? '#565a62' : '#50545c';
      ctx.fillRect(c - half, sy, half * 2, 1);
      if (f > 0.05) {
        // yol kenarı bariyer şeridi (kırmızı-beyaz)
        ctx.fillStyle = band ? '#e8e8e8' : '#d64545';
        ctx.fillRect(c - half, sy, half * 0.06, 1);
        ctx.fillRect(c + half * 0.94, sy, half * 0.06, 1);
        // orta kesik çizgi
        if (band === 0) {
          ctx.fillStyle = '#e8e8e8';
          ctx.fillRect(c - half * 0.02, sy, half * 0.04, 1);
        }
      }
    }
  }

  function drawRival(r, x, y, sc, t) {
    const bob = Math.sin(t * 7 + r.wob * 3) * 7 * sc;
    // arka tekerlek
    ctx.fillStyle = '#1c1f24';
    ctx.beginPath();
    ctx.ellipse(x, y - 36 * sc + bob, 29 * sc, 55 * sc, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4a4f58';
    ctx.beginPath();
    ctx.ellipse(x, y - 36 * sc + bob, 13 * sc, 40 * sc, 0, 0, Math.PI * 2);
    ctx.fill();
    // sele borusu
    ctx.fillStyle = '#2e3640';
    ctx.fillRect(x - 6 * sc, y - 102 * sc + bob, 12 * sc, 44 * sc);
    // gövde (forma)
    ctx.fillStyle = r.jersey;
    ctx.beginPath();
    ctx.ellipse(x, y - 122 * sc + bob, 46 * sc, 62 * sc, 0, 0, Math.PI * 2);
    ctx.fill();
    // kollar
    ctx.strokeStyle = r.jersey;
    ctx.lineWidth = 20 * sc;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x - 36 * sc, y - 154 * sc + bob); ctx.lineTo(x - 58 * sc, y - 93 * sc + bob);
    ctx.moveTo(x + 36 * sc, y - 154 * sc + bob); ctx.lineTo(x + 58 * sc, y - 93 * sc + bob);
    ctx.stroke();
    // kafa + kask
    ctx.beginPath();
    ctx.arc(x, y - 203 * sc + bob, 30 * sc, 0, Math.PI * 2);
    ctx.fillStyle = '#e8b88a';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y - 212 * sc + bob, 31 * sc, Math.PI, 0);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }

  // Sabit bina cepheleri: sokağın iki yanında hareketsiz dev binalar
  function drawFacade(x, w, top, bottom, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, top, w, bottom - top);
    // çatı çizgisi
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x, top, w, 8);
    // pencereler
    ctx.fillStyle = 'rgba(40, 60, 90, 0.7)';
    const cols = Math.max(2, Math.floor(w / 44));
    const rows = Math.max(3, Math.floor((bottom - top) / 82));
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        ctx.fillRect(
          x + w * (0.12 + c * (0.8 / cols)),
          top + (bottom - top) * (0.06 + r * (0.9 / rows)),
          w * 0.5 / cols,
          (bottom - top) * 0.5 / rows
        );
      }
    }
  }

  function drawCityWalls() {
    // sol taraf
    drawFacade(-10, 92, 96, 520, BLD_COLORS[0]);
    drawFacade(58, 66, 170, 490, BLD_COLORS[2]);
    // sağ taraf
    drawFacade(W - 82, 92, 120, 520, BLD_COLORS[3]);
    drawFacade(W - 124, 66, 200, 490, BLD_COLORS[4]);
  }

  function drawSprites() {
    const t = performance.now() / 1000;
    const sprites = [
      ...crowds.map(c => ({ ...c, kind: 'crowd' })),
      ...rivals.map(r => ({ z: r.z, x: r.x, kind: 'rival', r })),
    ];
    // bitiş takı
    if (RACE_UNITS - distance + 1 > 0.6) sprites.push({ z: RACE_UNITS, x: 0, kind: 'finish' });
    sprites.sort((a, b) => b.z - a.z);

    for (const s of sprites) {
      const zRel = s.z - distance + 1;
      if (zRel < 0.6) continue;
      const f = 1 / zRel;
      if (f > 1.05 || f < 0.03) continue;
      const fc = Math.min(f, 1);
      const y = HORIZON + fc * (H - HORIZON);
      const x = rowCenter(fc) + s.x * ROADHALF * fc;
      const sc = fc;

      if (s.kind === 'crowd') {
        if (sc < 0.1) continue;
        for (let i = 0; i < s.n; i++) {
          const px = x + (i - s.n / 2) * 62 * sc;
          const col = SHIRTS[Math.floor((s.seed + i * 7) % SHIRTS.length)];
          const wave = Math.sin(t * 7 + s.seed + i * 1.7);
          // bacaklar
          ctx.fillStyle = '#3a4252';
          ctx.fillRect(px - 17 * sc, y - 44 * sc, 14 * sc, 44 * sc);
          ctx.fillRect(px + 3 * sc, y - 44 * sc, 14 * sc, 44 * sc);
          // gövde
          ctx.fillStyle = col;
          ctx.fillRect(px - 22 * sc, y - 120 * sc, 44 * sc, 76 * sc);
          // kafa
          ctx.beginPath();
          ctx.arc(px, y - 142 * sc, 23 * sc, 0, Math.PI * 2);
          ctx.fillStyle = '#e8b88a';
          ctx.fill();
          // sallanan kol (tezahürat)
          if (wave > 0) {
            ctx.strokeStyle = col;
            ctx.lineWidth = 13 * sc;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(px + 19 * sc, y - 102 * sc);
            ctx.lineTo(px + 40 * sc, y - 163 * sc - wave * 13 * sc);
            ctx.stroke();
          }
        }
      } else if (s.kind === 'finish') {
        const half = ROADHALF * fc;
        const ph = 90 * sc;
        // direkler
        ctx.fillStyle = '#39424e';
        ctx.fillRect(x - half - 6 * sc, y - ph, 8 * sc, ph);
        ctx.fillRect(x + half - 2 * sc, y - ph, 8 * sc, ph);
        // damalı pankart
        const bh2 = 26 * sc;
        for (let i = 0; i < 10; i++) {
          for (let j = 0; j < 2; j++) {
            ctx.fillStyle = (i + j) % 2 ? '#111' : '#fff';
            ctx.fillRect(x - half + (i * half * 2) / 10, y - ph + j * bh2 / 2, (half * 2) / 10, bh2 / 2);
          }
        }
        if (sc > 0.2) {
          ctx.fillStyle = '#ffd54a';
          ctx.font = 'bold ' + 16 * sc + 'px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('BİTİŞ', x, y - ph + bh2 + 16 * sc);
        }
      } else if (s.kind === 'rival') {
        drawRival(s.r, x, y, sc, t);
      }
    }
  }

  function drawHandlebar() {
    const steer = (keys['ArrowLeft'] || keys['a'] || keys['A'] || steerTouch === -1) ? -1
                : (keys['ArrowRight'] || keys['d'] || keys['D'] || steerTouch === 1) ? 1 : 0;
    const sx = (Math.random() - 0.5) * shake * 2;
    const sy = (Math.random() - 0.5) * shake * 2;
    ctx.save();
    ctx.translate(W / 2 + sx, H + sy);
    ctx.rotate(steer * 0.05);

    // ön tekerlek
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(0, -18, 12, 46, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.ellipse(0, -18, 5, 38, 0, 0, Math.PI * 2);
    ctx.fill();

    // gidon boynu
    ctx.fillStyle = '#2e3640';
    ctx.fillRect(-9, -78, 18, 62);
    // gidon
    ctx.strokeStyle = '#39424e';
    ctx.lineWidth = 16;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-150, -64);
    ctx.quadraticCurveTo(0, -96, 150, -64);
    ctx.stroke();
    // elcikler
    ctx.strokeStyle = '#14181d';
    ctx.lineWidth = 20;
    ctx.beginPath(); ctx.moveTo(-150, -64); ctx.lineTo(-118, -73); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(150, -64); ctx.lineTo(118, -73); ctx.stroke();
    // fren kolları
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(-118, -76); ctx.lineTo(-88, -88); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(118, -76); ctx.lineTo(88, -88); ctx.stroke();
    // numara plakası
    ctx.fillStyle = '#fff';
    ctx.fillRect(-26, -60, 52, 32);
    ctx.strokeStyle = '#d64545';
    ctx.lineWidth = 3;
    ctx.strokeRect(-26, -60, 52, 32);
    ctx.fillStyle = '#222';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('1', 0, -43);
    // zil
    ctx.beginPath();
    ctx.arc(-52, -84, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd54a';
    ctx.fill();

    ctx.restore();
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(10, 25, 45, 0.55)';
    ctx.fillRect(0, 0, W, 70);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    // sıralama
    const rk = state === STATE.OVER ? finalRank : rank();
    ctx.fillStyle = rk === 1 ? '#ffd54a' : '#fff';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText('Sıra: ' + rk + '/' + (RIVAL_COUNT + 1), 118, 22);
    ctx.fillStyle = '#8fd3ff';
    ctx.font = '15px sans-serif';
    const kalan = Math.max(0, Math.ceil((RACE_UNITS - distance) * 2));
    ctx.fillText('Kalan: ' + kalan + ' m   Hız: ' + Math.floor(speed * 2) + ' km/s', 118, 45);
    // ilerleme çubuğu
    const pw = W - 236;
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(118, 52, pw, 3);
    ctx.fillStyle = '#ffd54a';
    ctx.fillRect(118, 52, pw * Math.min(1, distance / RACE_UNITS), 3);
    // enerji (sprint) çubuğu
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(118, 58, pw, 6);
    ctx.fillStyle = boosting ? '#ff9020' : (stamina > 0.3 ? '#7fff9e' : '#ff6b6b');
    ctx.fillRect(118, 58, pw * stamina, 6);
    ctx.fillStyle = '#8fd3ff';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('ENERJİ', 118 + pw + 6, 61);
  }

  function drawCenteredPanel(lines) {
    ctx.fillStyle = 'rgba(8, 20, 38, 0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    let y = H * 0.28;
    for (const [text, size, color] of lines) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.fillText(text, W / 2, y);
      y += size * 1.6;
    }
  }

  const rankText = r => r === 1 ? 'BİRİNCİ OLDUN!' : r + '. OLDUN';

  // ---- Ana döngü ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);

    drawSky();
    drawRoad();
    drawCityWalls();
    drawSprites();
    drawHandlebar();
    if (state !== STATE.MENU) drawHUD();

    // geri sayım
    if (state === STATE.PLAYING && !paused && countT > 0) {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(8, 20, 38, 0.4)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ffd54a';
      ctx.font = 'bold 120px sans-serif';
      ctx.fillText(String(Math.max(1, Math.ceil(countT))), W / 2, H * 0.42);
    } else if (state === STATE.PLAYING && !paused && elapsed < 1.2) {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#7fff9e';
      ctx.font = 'bold 90px sans-serif';
      ctx.fillText('BAŞLA!', W / 2, H * 0.42);
    }

    if (state === STATE.MENU) {
      drawCenteredPanel([
        ['BİSİKLET YARIŞI', 42, '#8fd3ff'],
        ['', 14, '#fff'],
        ['Şehrin dar sokaklarında yarış!', 20, '#ddd'],
        ['9 rakibi geç, birinci olmaya çalış', 16, '#aaa'],
        ['Yön: ok tuşları / A-D veya ekran okları', 16, '#aaa'],
        ['SPRINT: SPACE basılı tut (enerji biter, dinlenince dolar)', 15, '#ffb020'],
        ['Sprint yapmazsan rakipler seni geçer!', 16, '#ff8080'],
        ['Başlamak için tıkla veya SPACE', 20, '#ffd54a'],
      ]);
    } else if (paused && state === STATE.PLAYING) {
      drawCenteredPanel([
        ['DURAKLATILDI', 40, '#ffd54a'],
        ['', 10, '#fff'],
        ['Devam etmek için Ayarlar > Başlat', 18, '#ddd'],
      ]);
    } else if (state === STATE.OVER) {
      drawCenteredPanel([
        ['YARIŞ BİTTİ', 44, '#8fd3ff'],
        [rankText(finalRank), 36, finalRank === 1 ? '#ffd54a' : '#fff'],
        [finalRank === 1 ? '★ Şehrin şampiyonu! ★' : 'En iyi derecen: ' + (bestRank || '-') + '.', 20, '#7fff9e'],
        ['', 10, '#fff'],
        ['Tekrar yarışmak için tıkla veya SPACE', 20, '#ddd'],
      ]);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
