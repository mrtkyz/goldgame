<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bisiklet Oyunu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #12263a;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(120, 190, 255, 0.3);
    max-width: 100vw;
    max-height: 100vh;
  }

  #back {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: #8fd3ff;
    background: rgba(10, 25, 45, 0.75);
    border: 1px solid rgba(143, 211, 255, 0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    text-decoration: none;
  }

  /* Ayarlar menüsü */
  #settings {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  #settings button {
    border: 2px solid rgba(143, 211, 255, 0.5);
    background: rgba(10, 25, 45, 0.85);
    color: #8fd3ff;
    border-radius: 999px;
    font-size: 16px;
    padding: 10px 18px;
    -webkit-tap-highlight-color: transparent;
  }
  #gear {
    width: 46px;
    height: 46px;
    padding: 0 !important;
    font-size: 24px;
    border-radius: 50% !important;
  }
  #menu { display: flex; flex-direction: column; gap: 8px; }
  #menu.hidden { display: none; }

  /* Direksiyon okları: sadece dokunmatik cihazlarda görünür */
  .steer {
    display: none;
    position: fixed;
    bottom: 24px;
    z-index: 10;
    width: 84px;
    height: 84px;
    border-radius: 50%;
    border: 2px solid rgba(143, 211, 255, 0.5);
    background: rgba(10, 25, 45, 0.55);
    color: #8fd3ff;
    font-size: 36px;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.85;
  }
  #steerL { left: 18px; }
  #steerR { right: 18px; }
  @media (pointer: coarse) {
    .steer { display: block; }
  }
  .steer:active { background: rgba(143, 211, 255, 0.35); }
</style>
</head>
<body>
<a id="back" href="index.html">← Oyunlar</a>
<div id="settings">
  <button id="gear" aria-label="Ayarlar">⚙</button>
  <div id="menu" class="hidden">
    <button id="btnPause">⏸ Durdur</button>
    <button id="btnStart">▶ Başlat</button>
    <button id="btnExit">✕ Çık</button>
  </div>
</div>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<button id="steerL" class="steer" aria-label="Sola dön">◀</button>
<button id="steerR" class="steer" aria-label="Sağa dön">▶</button>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const HORIZON = 300;          // ufuk çizgisi
  const ROADHALF = 340;         // yolun en yakın yarı genişliği (px)
  const BEND = 320;             // virajın ufuktaki bükülme miktarı (px)

  function fit() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  addEventListener('resize', fit);
  fit();

  // ---- Oyun durumu ----
  const STATE = { MENU: 0, PLAYING: 1, OVER: 2 };
  let state = STATE.MENU;
  let paused = false;

  let distance, speed, playerX, lives, elapsed;
  let curveCur, curveTarget, sectionEnd;
  let obstacles, trees, nextObstZ, nextTreeZ;
  let invTimer, flashTimer, rumbleAcc, shake;
  let best = +(localStorage.getItem('bisiklet-best') || 0);

  function resetWorld() {
    distance = 0; speed = 6; playerX = 0; lives = 3; elapsed = 0;
    curveCur = 0; curveTarget = 0; sectionEnd = 40;
    obstacles = []; trees = [];
    nextObstZ = 50; nextTreeZ = 8;
    invTimer = 0; flashTimer = 0; rumbleAcc = 0; shake = 0;
  }
  resetWorld(); // menü ekranındaki yol çizimi için de dünya hazır olsun

  function startGame() {
    resetWorld();
    state = STATE.PLAYING;
    paused = false;
  }

  function gameOver() {
    state = STATE.OVER;
    sndOver();
    const m = Math.floor(distance * 2);
    if (m > best) {
      best = m;
      localStorage.setItem('bisiklet-best', best);
    }
  }

  // ---- Sesler ----
  let audioCtx = null;
  function getAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    } catch (e) { return null; }
  }
  function beep(freq, dur, type = 'sine', vol = 0.15, delay = 0) {
    const ac = getAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ac.destination);
    o.start(t0);
    o.stop(t0 + dur);
  }
  const sndCrash = () => { beep(120, 0.25, 'sawtooth', 0.22); beep(75, 0.4, 'sawtooth', 0.18, 0.05); };
  const sndOver = () => { beep(330, 0.25, 'square', 0.1); beep(220, 0.4, 'square', 0.1, 0.2); };
  const sndRumble = () => beep(85, 0.05, 'triangle', 0.05);

  // ---- Girdi ----
  const keys = {};
  addEventListener('keydown', e => {
    if ((state === STATE.MENU || state === STATE.OVER) &&
        (e.key === ' ' || e.key === 'Enter')) { startGame(); e.preventDefault(); return; }
    keys[e.key] = true;
    if ([' ', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
  });
  addEventListener('keyup', e => keys[e.key] = false);

  let steerTouch = 0;
  for (const [id, val] of [['steerL', -1], ['steerR', 1]]) {
    const btn = document.getElementById(id);
    btn.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (state !== STATE.PLAYING) { startGame(); return; }
      steerTouch = val;
    });
    for (const ev of ['pointerup', 'pointercancel', 'pointerleave']) {
      btn.addEventListener(ev, () => { if (steerTouch === val) steerTouch = 0; });
    }
  }
  canvas.addEventListener('pointerdown', () => {
    if (state !== STATE.PLAYING) startGame();
  });

  // Ayarlar menüsü
  const menuEl = document.getElementById('menu');
  document.getElementById('gear').addEventListener('click', () => {
    menuEl.classList.toggle('hidden');
  });
  document.getElementById('btnPause').addEventListener('click', () => {
    if (state === STATE.PLAYING) paused = true;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnStart').addEventListener('click', () => {
    if (state !== STATE.PLAYING) startGame();
    paused = false;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnExit').addEventListener('click', () => {
    location.href = 'index.html';
  });

  // ---- Güncelleme ----
  function update(dt) {
    if (state !== STATE.PLAYING || paused) return;
    elapsed += dt;

    // Hız: zamanla artan tavana doğru kendiliğinden hızlanır
    const maxSpeed = Math.min(26, 13 + elapsed * 0.12);
    speed += (maxSpeed - speed) * dt * 0.35;

    // Viraj bölümleri
    if (distance > sectionEnd) {
      curveTarget = (Math.random() * 2 - 1) * 1.1;
      if (Math.random() < 0.3) curveTarget = 0; // ara sıra düzlük
      sectionEnd = distance + 30 + Math.random() * 45;
    }
    curveCur += (curveTarget - curveCur) * dt * 0.9;

    // Direksiyon
    let steer = steerTouch;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) steer = -1;
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) steer = 1;
    playerX += steer * dt * 2.0;
    // Viraj merkezkaç: viraja karşı direksiyon kırmak gerekir
    playerX += curveCur * speed * 0.011 * dt;
    playerX = Math.max(-1.4, Math.min(1.4, playerX));

    // Yol dışı: yavaşlar ve sarsılır
    const offroad = Math.abs(playerX) > 1;
    if (offroad) {
      speed = Math.max(4, speed * (1 - 1.3 * dt));
      shake = 3;
      rumbleAcc += dt;
      if (rumbleAcc > 0.13) { rumbleAcc = 0; sndRumble(); }
    } else {
      shake = Math.max(0, shake - dt * 12);
    }

    distance += speed * dt;

    // Engel üret: zamanla sıklaşır
    while (nextObstZ < distance + 45) {
      const types = ['kaya', 'koni', 'kutuk'];
      obstacles.push({
        z: nextObstZ,
        x: (Math.random() * 1.5 - 0.75),
        type: types[Math.floor(Math.random() * types.length)],
      });
      nextObstZ += Math.max(9, 20 - elapsed * 0.12) + Math.random() * 14;
    }
    // Yol kenarı ağaçları
    while (nextTreeZ < distance + 45) {
      trees.push({ z: nextTreeZ, x: (Math.random() < 0.5 ? -1 : 1) * (1.25 + Math.random() * 0.5) });
      nextTreeZ += 4 + Math.random() * 4;
    }

    // Çarpışma ve temizlik
    if (invTimer > 0) invTimer -= dt;
    if (flashTimer > 0) flashTimer -= dt;
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const ob = obstacles[i];
      const zRel = ob.z - distance + 1;
      if (zRel < 0.6) { obstacles.splice(i, 1); continue; }
      if (invTimer <= 0 && zRel < 1.25 && Math.abs(ob.x - playerX) < 0.27) {
        obstacles.splice(i, 1);
        lives--;
        invTimer = 2;
        flashTimer = 0.4;
        speed = Math.max(5, speed * 0.35);
        sndCrash();
        if (lives <= 0) { gameOver(); return; }
      }
    }
    for (let i = trees.length - 1; i >= 0; i--) {
      if (trees[i].z - distance + 1 < 0.6) trees.splice(i, 1);
    }
  }

  // ---- Çizim yardımcıları ----
  // f: 0=ufuk, 1=en yakın satır
  const rowCenter = f => W / 2 - playerX * ROADHALF * f + curveCur * (1 - f) * (1 - f) * BEND;

  function drawHeart(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#ff5d8f';
    ctx.beginPath();
    ctx.moveTo(0, r * 0.9);
    ctx.bezierCurveTo(-r * 1.4, -r * 0.2, -r * 0.6, -r * 1.1, 0, -r * 0.3);
    ctx.bezierCurveTo(r * 0.6, -r * 1.1, r * 1.4, -r * 0.2, 0, r * 0.9);
    ctx.fill();
    ctx.restore();
  }

  function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, HORIZON);
    g.addColorStop(0, '#4aa8e8');
    g.addColorStop(1, '#bfe3f7');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, HORIZON);
    // güneş
    ctx.beginPath();
    ctx.arc(W * 0.78, 70, 34, 0, Math.PI * 2);
    ctx.fillStyle = '#ffe89a';
    ctx.fill();
    // dağlar: virajla hafifçe kayar
    const mOff = -curveCur * 70;
    ctx.fillStyle = '#7fa8c9';
    for (const [mx, mw, mh] of [[-60, 260, 90], [140, 300, 120], [340, 240, 80]]) {
      ctx.beginPath();
      ctx.moveTo(mOff + mx, HORIZON);
      ctx.lineTo(mOff + mx + mw / 2, HORIZON - mh);
      ctx.lineTo(mOff + mx + mw, HORIZON);
      ctx.closePath();
      ctx.fill();
    }
    // bulutlar
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    const t = performance.now() / 1000;
    for (const [bx, by, br] of [[80, 60, 22], [230, 100, 18], [390, 50, 24]]) {
      const x = (bx + t * 6) % (W + 80) - 40;
      ctx.beginPath();
      ctx.ellipse(x, by, br * 1.6, br * 0.75, 0, 0, Math.PI * 2);
      ctx.ellipse(x + br, by + 4, br * 1.1, br * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawRoad() {
    for (let sy = HORIZON; sy < H; sy++) {
      const f = (sy - HORIZON) / (H - HORIZON);
      const z = distance + 1 / Math.max(f, 0.02);
      const band = Math.floor(z * 1.4) % 2;
      // çimen
      ctx.fillStyle = band ? '#3fa054' : '#37904b';
      ctx.fillRect(0, sy, W, 1);
      // yol
      const c = rowCenter(f);
      const half = ROADHALF * f;
      ctx.fillStyle = band ? '#5c6068' : '#565a62';
      ctx.fillRect(c - half, sy, half * 2, 1);
      if (f > 0.05) {
        // kenar şeritleri (kırmızı-beyaz)
        ctx.fillStyle = band ? '#e8e8e8' : '#d64545';
        ctx.fillRect(c - half, sy, half * 0.07, 1);
        ctx.fillRect(c + half * 0.93, sy, half * 0.07, 1);
        // orta kesik çizgi
        if (band === 0) {
          ctx.fillStyle = '#e8e8e8';
          ctx.fillRect(c - half * 0.02, sy, half * 0.04, 1);
        }
      }
    }
  }

  function drawSprites() {
    // uzaktan yakına sırala (uzak önce çizilir)
    const all = [
      ...trees.map(t => ({ ...t, kind: 'tree' })),
      ...obstacles.map(o => ({ ...o, kind: 'obst' })),
    ].sort((a, b) => b.z - a.z);

    for (const s of all) {
      const zRel = s.z - distance + 1;
      if (zRel < 0.6) continue;
      const f = 1 / zRel;
      if (f > 1 || f < 0.03) continue;
      const y = HORIZON + f * (H - HORIZON);
      const x = rowCenter(f) + s.x * ROADHALF * f;
      const sc = f;

      if (s.kind === 'tree') {
        // gövde
        ctx.fillStyle = '#7a4d1e';
        ctx.fillRect(x - 5 * sc, y - 46 * sc, 10 * sc, 46 * sc);
        // taç
        ctx.beginPath();
        ctx.arc(x, y - 58 * sc, 26 * sc, 0, Math.PI * 2);
        ctx.fillStyle = '#2f8f43';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x - 12 * sc, y - 48 * sc, 16 * sc, 0, Math.PI * 2);
        ctx.arc(x + 12 * sc, y - 48 * sc, 16 * sc, 0, Math.PI * 2);
        ctx.fillStyle = '#37a04e';
        ctx.fill();
      } else if (s.type === 'koni') {
        ctx.beginPath();
        ctx.moveTo(x, y - 34 * sc);
        ctx.lineTo(x + 14 * sc, y);
        ctx.lineTo(x - 14 * sc, y);
        ctx.closePath();
        ctx.fillStyle = '#f07020';
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 8 * sc, y - 18 * sc, 16 * sc, 6 * sc);
        ctx.fillStyle = '#c85510';
        ctx.fillRect(x - 18 * sc, y - 3 * sc, 36 * sc, 4 * sc);
      } else if (s.type === 'kaya') {
        ctx.beginPath();
        ctx.ellipse(x, y - 10 * sc, 20 * sc, 14 * sc, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#8a8f98';
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x - 6 * sc, y - 16 * sc, 8 * sc, 5 * sc, -0.4, 0, Math.PI * 2);
        ctx.fillStyle = '#a7adb8';
        ctx.fill();
      } else { // kütük
        ctx.fillStyle = '#8d5a2b';
        ctx.fillRect(x - 26 * sc, y - 16 * sc, 52 * sc, 14 * sc);
        ctx.beginPath();
        ctx.ellipse(x + 26 * sc, y - 9 * sc, 5 * sc, 7 * sc, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#c99a5e';
        ctx.fill();
        ctx.strokeStyle = '#6b3f16';
        ctx.lineWidth = Math.max(1, 2 * sc);
        for (let i = 1; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(x - 26 * sc + i * 13 * sc, y - 16 * sc);
          ctx.lineTo(x - 26 * sc + i * 13 * sc, y - 2 * sc);
          ctx.stroke();
        }
      }
    }
  }

  function drawHandlebar() {
    const steer = (keys['ArrowLeft'] || keys['a'] || keys['A'] || steerTouch === -1) ? -1
                : (keys['ArrowRight'] || keys['d'] || keys['D'] || steerTouch === 1) ? 1 : 0;
    const sx = (Math.random() - 0.5) * shake * 2;
    const sy = (Math.random() - 0.5) * shake * 2;
    ctx.save();
    ctx.translate(W / 2 + sx, H + sy);
    ctx.rotate(steer * 0.05);
    // yanıp sönme: çarpışma sonrası dokunulmazlık
    if (invTimer > 0 && Math.floor(invTimer * 8) % 2 === 0) ctx.globalAlpha = 0.45;

    // ön tekerlek (gidonun altında ince görünür)
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(0, -18, 12, 46, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.ellipse(0, -18, 5, 38, 0, 0, Math.PI * 2);
    ctx.fill();

    // gidon boynu
    ctx.fillStyle = '#2e3640';
    ctx.fillRect(-9, -78, 18, 62);
    // gidon
    ctx.strokeStyle = '#39424e';
    ctx.lineWidth = 16;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-150, -64);
    ctx.quadraticCurveTo(0, -96, 150, -64);
    ctx.stroke();
    // elcikler
    ctx.strokeStyle = '#14181d';
    ctx.lineWidth = 20;
    ctx.beginPath(); ctx.moveTo(-150, -64); ctx.lineTo(-118, -73); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(150, -64); ctx.lineTo(118, -73); ctx.stroke();
    // fren kolları
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(-118, -76); ctx.lineTo(-88, -88); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(118, -76); ctx.lineTo(88, -88); ctx.stroke();
    // zil
    ctx.beginPath();
    ctx.arc(-52, -84, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd54a';
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawHUD() {
    // hız ve mesafe
    ctx.fillStyle = 'rgba(10, 25, 45, 0.55)';
    ctx.fillRect(0, 0, W, 58);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText(Math.floor(distance * 2) + ' m', 118, 22);
    ctx.fillStyle = '#8fd3ff';
    ctx.font = '15px sans-serif';
    ctx.fillText('Hız: ' + Math.floor(speed * 3) + ' km/s   Rekor: ' + best + ' m', 118, 45);
    // canlar
    for (let i = 0; i < lives; i++) {
      drawHeart(W - 82 - i * 30, 26, 12);
    }
  }

  function drawCenteredPanel(lines) {
    ctx.fillStyle = 'rgba(8, 20, 38, 0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    let y = H * 0.30;
    for (const [text, size, color] of lines) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.fillText(text, W / 2, y);
      y += size * 1.6;
    }
  }

  // ---- Ana döngü ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);

    drawSky();
    drawRoad();
    drawSprites();
    drawHandlebar();
    if (state !== STATE.MENU) drawHUD();

    // çarpışma kırmızı flaşı
    if (flashTimer > 0) {
      ctx.fillStyle = 'rgba(255, 40, 20, ' + (flashTimer * 0.8) + ')';
      ctx.fillRect(0, 0, W, H);
    }

    if (state === STATE.MENU) {
      drawCenteredPanel([
        ['BİSİKLET OYUNU', 42, '#8fd3ff'],
        ['', 16, '#fff'],
        ['Bisikletçinin gözünden yol!', 20, '#ddd'],
        ['Yolda kal, engellere çarpma', 16, '#aaa'],
        ['Ok tuşları / A-D veya ekran okları', 16, '#aaa'],
        ['Yoldan çıkarsan yavaşlarsın!', 16, '#ffb020'],
        ['Başlamak için tıkla veya SPACE', 20, '#ffd54a'],
      ]);
    } else if (paused && state === STATE.PLAYING) {
      drawCenteredPanel([
        ['DURAKLATILDI', 40, '#ffd54a'],
        ['', 10, '#fff'],
        ['Devam etmek için Ayarlar > Başlat', 18, '#ddd'],
      ]);
    } else if (state === STATE.OVER) {
      const m = Math.floor(distance * 2);
      drawCenteredPanel([
        ['OYUN BİTTİ', 44, '#ff6b6b'],
        ['Mesafe: ' + m + ' m', 30, '#8fd3ff'],
        [m >= best && m > 0 ? '★ YENİ REKOR! ★' : 'Rekor: ' + best + ' m', 24, '#ffd54a'],
        ['', 10, '#fff'],
        ['Tekrar sürmek için tıkla veya SPACE', 20, '#ddd'],
      ]);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
