server {
    listen 80;
    server_name goldgame.sinsoft.com.tr _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Oyun tek HTML dosyası; güncellemeler hemen görünsün
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
}
