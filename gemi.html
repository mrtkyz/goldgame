<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gemi Sürüşü</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #0a1e33;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(90, 200, 250, 0.3);
    max-width: 100vw;
    max-height: 100vh;
  }

  #back {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: #7fdcff;
    background: rgba(8, 25, 45, 0.75);
    border: 1px solid rgba(127, 220, 255, 0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    text-decoration: none;
  }

  /* Ayarlar menüsü */
  #settings {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  #settings button {
    border: 2px solid rgba(127, 220, 255, 0.5);
    background: rgba(8, 25, 45, 0.85);
    color: #7fdcff;
    border-radius: 999px;
    font-size: 16px;
    padding: 10px 18px;
    -webkit-tap-highlight-color: transparent;
  }
  #gear {
    width: 46px;
    height: 46px;
    padding: 0 !important;
    font-size: 24px;
    border-radius: 50% !important;
  }
  #menu { display: flex; flex-direction: column; gap: 8px; }
  #menu.hidden { display: none; }

  /* Dümen okları: sadece dokunmatik cihazlarda görünür */
  .steer {
    display: none;
    position: fixed;
    bottom: 24px;
    z-index: 10;
    width: 84px;
    height: 84px;
    border-radius: 50%;
    border: 2px solid rgba(127, 220, 255, 0.5);
    background: rgba(8, 25, 45, 0.55);
    color: #7fdcff;
    font-size: 36px;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.85;
  }
  #steerL { left: 18px; }
  #steerR { right: 18px; }
  @media (pointer: coarse) {
    .steer { display: block; }
  }
  .steer:active { background: rgba(127, 220, 255, 0.35); }
</style>
</head>
<body>
<a id="back" href="index.html">← Oyunlar</a>
<div id="settings">
  <button id="gear" aria-label="Ayarlar">⚙</button>
  <div id="menu" class="hidden">
    <button id="btnPause">⏸ Durdur</button>
    <button id="btnStart">▶ Başlat</button>
    <button id="btnExit">✕ Çık</button>
  </div>
</div>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<button id="steerL" class="steer" aria-label="Sola dön">◀</button>
<button id="steerR" class="steer" aria-label="Sağa dön">▶</button>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const HORIZON = 270;         // ufuk çizgisi
  const SEAHALF = 300;         // dünya kaydırma ölçeği

  function fit() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  addEventListener('resize', fit);
  fit();

  // ---- Oyun durumu ----
  const STATE = { MENU: 0, PLAYING: 1 };
  let state = STATE.MENU;
  let paused = false;

  let distance, speed, playerX, delivered;
  let port, buoys, nextBuoyZ;
  let obstacles, nextObstZ, bumpT, shake;
  let deliverT, missT, cargo;
  let gullT = 4;
  let best = +(localStorage.getItem('gemi-teslimat-best') || 0);

  const CARGO_COLORS = ['#e74c3c', '#f1c40f', '#2ecc71', '#3498db', '#e67e22', '#9b59b6', '#1abc9c'];

  function newCargo() {
    cargo = [];
    for (let i = 0; i < 4; i++) {
      cargo.push(CARGO_COLORS[Math.floor(Math.random() * CARGO_COLORS.length)]);
    }
  }

  function newPort(num) {
    port = {
      z: distance + 130 + Math.random() * 110,
      x: (Math.random() * 1.6 - 0.8),
      num,
      done: false,
    };
  }

  function resetWorld() {
    distance = 0; speed = 4; playerX = 0; delivered = 0;
    deliverT = 0; missT = 0;
    buoys = []; nextBuoyZ = 15;
    obstacles = []; nextObstZ = 40; bumpT = 0; shake = 0;
    newCargo();
    newPort(1);
  }
  resetWorld();

  function startGame() {
    resetWorld();
    state = STATE.PLAYING;
    paused = false;
    sndHorn();
  }

  // ---- Sesler ----
  let audioCtx = null;
  function getAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    } catch (e) { return null; }
  }
  function beep(freq, dur, type = 'sine', vol = 0.15, delay = 0) {
    const ac = getAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ac.destination);
    o.start(t0);
    o.stop(t0 + dur);
  }
  const sndHorn = () => { beep(140, 0.5, 'sawtooth', 0.15); beep(180, 0.5, 'sawtooth', 0.1); };
  const sndCrash = () => { beep(90, 0.35, 'sawtooth', 0.22); beep(55, 0.5, 'sawtooth', 0.18, 0.08); };
  const sndGull = () => { beep(1500, 0.12, 'sine', 0.06); beep(1300, 0.1, 'sine', 0.05, 0.15); };
  const sndDeliver = () => { [523, 659, 784, 1047].forEach((f, i) => beep(f, 0.2, 'triangle', 0.15, i * 0.13)); };
  const sndMiss = () => { beep(420, 0.2, 'triangle', 0.1); beep(330, 0.3, 'triangle', 0.1, 0.18); };
  const sndBell = () => { beep(1180, 0.3, 'triangle', 0.12); beep(1180, 0.3, 'triangle', 0.1, 0.35); };

  // ---- Girdi ----
  const keys = {};
  addEventListener('keydown', e => {
    if (state === STATE.MENU && (e.key === ' ' || e.key === 'Enter')) { startGame(); e.preventDefault(); return; }
    keys[e.key] = true;
    if ([' ', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
  });
  addEventListener('keyup', e => keys[e.key] = false);

  let steerTouch = 0;
  for (const [id, val] of [['steerL', -1], ['steerR', 1]]) {
    const btn = document.getElementById(id);
    btn.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (state !== STATE.PLAYING) { startGame(); return; }
      steerTouch = val;
    });
    for (const ev of ['pointerup', 'pointercancel', 'pointerleave']) {
      btn.addEventListener(ev, () => { if (steerTouch === val) steerTouch = 0; });
    }
  }
  canvas.addEventListener('pointerdown', () => {
    if (state !== STATE.PLAYING) startGame();
  });

  // Ayarlar menüsü
  const menuEl = document.getElementById('menu');
  document.getElementById('gear').addEventListener('click', () => {
    menuEl.classList.toggle('hidden');
  });
  document.getElementById('btnPause').addEventListener('click', () => {
    if (state === STATE.PLAYING) paused = true;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnStart').addEventListener('click', () => {
    if (state !== STATE.PLAYING) startGame();
    paused = false;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnExit').addEventListener('click', () => {
    location.href = 'index.html';
  });

  // ---- Güncelleme ----
  function update(dt) {
    if (state !== STATE.PLAYING || paused) return;

    // Teslimat kutlaması: gemi iskelede bekler
    if (deliverT > 0) {
      deliverT -= dt;
      speed = Math.max(0, speed - dt * 10);
      if (deliverT <= 0) {
        newCargo();
        newPort(delivered + 1);
        sndBell(); // yeni yük alındı
      }
      return;
    }
    if (missT > 0) missT -= dt;

    // Sakin seyir: yavaş ve sabit tempo
    const maxSpeed = 10;
    speed += (maxSpeed - speed) * dt * 0.4;

    // Dümen
    let steer = steerTouch;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) steer = -1;
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) steer = 1;
    playerX += steer * dt * 1.6;
    playerX = Math.max(-1.3, Math.min(1.3, playerX));

    distance += speed * dt;

    // Martı sesi ara sıra
    gullT -= dt;
    if (gullT <= 0) { sndGull(); gullT = 5 + Math.random() * 6; }

    // Dekoratif şamandıralar (çarpışma yok, sadece hız hissi)
    while (nextBuoyZ < distance + 50) {
      buoys.push({
        z: nextBuoyZ,
        x: (Math.random() < 0.5 ? -1 : 1) * (1 + Math.random() * 0.4),
        seed: Math.random() * 10,
      });
      nextBuoyZ += 9 + Math.random() * 8;
    }
    buoys = buoys.filter(b => b.z - distance + 1 > 0.55);

    // Büyük engeller: kayalık, büyük ada, deniz feneri
    while (nextObstZ < distance + 55) {
      // İskelenin yakınına engel koyma (yanaşma adil kalsın)
      if (Math.abs(nextObstZ - port.z) > 14) {
        const r = Math.random();
        obstacles.push({
          z: nextObstZ,
          x: (Math.random() * 2 - 1) * 1.05,
          type: r < 0.4 ? 'kaya' : r < 0.75 ? 'ada' : 'fener',
          seed: Math.random() * 10,
        });
      }
      nextObstZ += 16 + Math.random() * 14;
    }
    obstacles = obstacles.filter(o => o.z - distance + 1 > 0.55);

    // Engele çarpma: batmazsın ama fena yavaşlar ve sarsılırsın
    if (bumpT > 0) bumpT -= dt;
    shake = Math.max(0, shake - dt * 8);
    for (const ob of obstacles) {
      const zRel = ob.z - distance + 1;
      const hitW = ob.type === 'ada' ? 0.55 : ob.type === 'fener' ? 0.42 : 0.38;
      if (bumpT <= 0 && zRel > 0.85 && zRel < 1.25 && Math.abs(ob.x - playerX) < hitW) {
        speed = 1.5;
        bumpT = 1.2;
        shake = 5;
        playerX += (playerX >= ob.x ? 1 : -1) * 0.22;
        sndCrash();
      }
    }

    // Limana varış kontrolü
    const zRel = port.z - distance + 1;
    if (!port.done && zRel < 1.12) {
      port.done = true;
      if (Math.abs(port.x - playerX) < 0.6) {
        // Yanaştık: teslimat!
        delivered++;
        if (delivered > best) {
          best = delivered;
          localStorage.setItem('gemi-teslimat-best', best);
        }
        deliverT = 2.6;
        sndDeliver();
      } else {
        // İskeleyi kaçırdık: yeni liman ileride
        missT = 2.2;
        sndMiss();
        newPort(port.num);
      }
    }
  }

  // ---- Çizim ----
  const rowCenter = f => W / 2 - playerX * SEAHALF * f;

  function drawSky() {
    const t = performance.now() / 1000;
    const g = ctx.createLinearGradient(0, 0, 0, HORIZON);
    g.addColorStop(0, '#3f9be0');
    g.addColorStop(1, '#cfeaf7');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, HORIZON);
    // güneş
    ctx.beginPath();
    ctx.arc(W * 0.24, 74, 32, 0, Math.PI * 2);
    ctx.fillStyle = '#ffe89a';
    ctx.fill();
    // uzak adalar
    ctx.fillStyle = '#6d94ad';
    ctx.beginPath();
    ctx.ellipse(W * 0.15, HORIZON, 90, 22, 0, Math.PI, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(W * 0.85, HORIZON, 120, 30, 0, Math.PI, 0);
    ctx.fill();
    // bulutlar
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (const [bx, by, br] of [[110, 52, 20], [280, 92, 16], [420, 48, 22]]) {
      const x = (bx + t * 5) % (W + 80) - 40;
      ctx.beginPath();
      ctx.ellipse(x, by, br * 1.6, br * 0.7, 0, 0, Math.PI * 2);
      ctx.ellipse(x + br, by + 4, br * 1.1, br * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // martılar
    ctx.strokeStyle = '#f5f8fa';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    for (const [gx, gy, sp, ph] of [[0.3, 120, 14, 0], [0.55, 90, 11, 2], [0.75, 140, 13, 4]]) {
      const x = (gx * W + t * 22) % (W + 60) - 30;
      const flap = Math.sin(t * 8 + ph) * 5;
      ctx.beginPath();
      ctx.moveTo(x - sp, gy);
      ctx.quadraticCurveTo(x - sp / 2, gy - flap, x, gy);
      ctx.quadraticCurveTo(x + sp / 2, gy - flap, x + sp, gy);
      ctx.stroke();
    }
  }

  function drawSea() {
    const t = performance.now() / 1000;
    for (let sy = HORIZON; sy < H; sy++) {
      const f = (sy - HORIZON) / (H - HORIZON);
      const z = distance + 1 / Math.max(f, 0.02);
      const band = Math.floor(z * 1.1 + Math.sin(sy * 0.09 + t * 2) * 0.35) % 2;
      ctx.fillStyle = band ? '#1c6bb2' : '#1a62a5';
      ctx.fillRect(0, sy, W, 1);
    }
    // köpük parıltıları
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for (let i = 0; i < 26; i++) {
      const fy = ((i * 61.7 + distance * 40) % (H - HORIZON));
      const sy = HORIZON + fy;
      const f = fy / (H - HORIZON);
      const sx = (i * 137.5 + Math.sin(i * 3 + t) * 20) % W;
      ctx.fillRect(sx, sy, Math.max(2, 7 * f), Math.max(1, 2 * f));
    }
  }

  function drawBuoy(x, y, sc, t, seed) {
    const bob = Math.sin(t * 2 + seed) * 4 * sc;
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.moveTo(x - 12 * sc, y + bob);
    ctx.lineTo(x + 12 * sc, y + bob);
    ctx.lineTo(x + 7 * sc, y - 26 * sc + bob);
    ctx.lineTo(x - 7 * sc, y - 26 * sc + bob);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 9 * sc, y - 14 * sc + bob, 18 * sc, 6 * sc);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 3 * sc;
    ctx.beginPath();
    ctx.ellipse(x, y + 4 * sc + bob, 18 * sc, 5 * sc, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  function drawObstacle(s, x, y, sc, t) {
    if (s.type === 'kaya') {
      // büyük kayalık kümesi
      ctx.fillStyle = '#5b6572';
      ctx.beginPath();
      ctx.ellipse(x, y - 30 * sc, 90 * sc, 55 * sc, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6d7784';
      ctx.beginPath();
      ctx.ellipse(x - 55 * sc, y - 18 * sc, 45 * sc, 32 * sc, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#78828f';
      ctx.beginPath();
      ctx.ellipse(x + 50 * sc, y - 22 * sc, 40 * sc, 30 * sc, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#98a2ad';
      ctx.beginPath();
      ctx.ellipse(x - 20 * sc, y - 62 * sc, 34 * sc, 22 * sc, -0.3, 0, Math.PI * 2);
      ctx.fill();
      // dalga köpüğü
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 5 * sc;
      ctx.beginPath();
      ctx.ellipse(x, y - 4 * sc, 110 * sc, 16 * sc, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (s.type === 'ada') {
      // büyük ada
      ctx.fillStyle = '#e8cf8e';
      ctx.beginPath();
      ctx.ellipse(x, y - 14 * sc, 160 * sc, 44 * sc, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#d9bd75';
      ctx.beginPath();
      ctx.ellipse(x + 30 * sc, y - 30 * sc, 90 * sc, 26 * sc, 0, 0, Math.PI * 2);
      ctx.fill();
      // iki palmiye
      for (const [ox, lean] of [[-50, -1], [55, 1]]) {
        ctx.strokeStyle = '#8d5a2b';
        ctx.lineWidth = 12 * sc;
        ctx.beginPath();
        ctx.moveTo(x + ox * sc, y - 28 * sc);
        ctx.quadraticCurveTo(x + (ox + lean * 16) * sc, y - 90 * sc, x + (ox + lean * 8) * sc, y - 128 * sc);
        ctx.stroke();
        ctx.strokeStyle = '#2f9e4b';
        ctx.lineWidth = 9 * sc;
        for (const a of [-2.7, -2.1, -1.4, -0.8, -0.2]) {
          ctx.beginPath();
          ctx.moveTo(x + (ox + lean * 8) * sc, y - 128 * sc);
          ctx.quadraticCurveTo(
            x + (ox + lean * 8) * sc + Math.cos(a) * 48 * sc, y - 128 * sc + Math.sin(a) * 42 * sc - 10 * sc,
            x + (ox + lean * 8) * sc + Math.cos(a) * 74 * sc, y - 128 * sc + Math.sin(a) * 56 * sc + 8 * sc
          );
          ctx.stroke();
        }
      }
    } else { // deniz feneri
      // kaya taban
      ctx.fillStyle = '#6d7784';
      ctx.beginPath();
      ctx.ellipse(x, y - 16 * sc, 70 * sc, 34 * sc, 0, 0, Math.PI * 2);
      ctx.fill();
      // kule: kırmızı-beyaz şeritli
      const tw = 40 * sc, th = 150 * sc;
      for (let i = 0; i < 5; i++) {
        ctx.fillStyle = i % 2 ? '#e8e8e8' : '#d64545';
        const yTop = y - 30 * sc - th + (i * th) / 5;
        const wTop = tw * (0.7 + 0.3 * (i / 5));
        ctx.fillRect(x - wTop / 2, yTop, wTop, th / 5 + 1);
      }
      // fener odası
      ctx.fillStyle = '#333';
      ctx.fillRect(x - 20 * sc, y - 30 * sc - th - 22 * sc, 40 * sc, 22 * sc);
      // dönen ışık
      const lightOn = Math.floor(t * 1.5 + s.seed) % 2 === 0;
      ctx.fillStyle = lightOn ? '#ffe89a' : '#8a7a4a';
      if (lightOn) { ctx.shadowColor = '#ffe89a'; ctx.shadowBlur = 25 * sc; }
      ctx.fillRect(x - 14 * sc, y - 30 * sc - th - 18 * sc, 28 * sc, 14 * sc);
      ctx.shadowBlur = 0;
      // çatı
      ctx.fillStyle = '#d64545';
      ctx.beginPath();
      ctx.moveTo(x - 24 * sc, y - 30 * sc - th - 22 * sc);
      ctx.lineTo(x, y - 30 * sc - th - 44 * sc);
      ctx.lineTo(x + 24 * sc, y - 30 * sc - th - 22 * sc);
      ctx.closePath();
      ctx.fill();
      // köpük
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 5 * sc;
      ctx.beginPath();
      ctx.ellipse(x, y - 2 * sc, 85 * sc, 14 * sc, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawPort(x, y, sc, t, num) {
    const pw = 340 * sc;   // iskele genişliği
    // iskele platformu (ahşap)
    ctx.fillStyle = '#8d5a2b';
    ctx.fillRect(x - pw / 2, y - 34 * sc, pw, 26 * sc);
    ctx.fillStyle = '#6b3f16';
    for (let i = 0; i < 8; i++) {
      ctx.fillRect(x - pw / 2 + (i + 0.5) * pw / 8, y - 34 * sc, 3 * sc, 26 * sc);
    }
    // ayaklar
    ctx.fillStyle = '#5a4632';
    for (const px of [-pw * 0.4, -pw * 0.15, pw * 0.15, pw * 0.4]) {
      ctx.fillRect(x + px - 4 * sc, y - 10 * sc, 8 * sc, 18 * sc);
    }
    // depo binası
    ctx.fillStyle = '#d8d2c2';
    ctx.fillRect(x - 130 * sc, y - 104 * sc, 130 * sc, 70 * sc);
    ctx.fillStyle = '#b8432c';
    ctx.beginPath();
    ctx.moveTo(x - 140 * sc, y - 104 * sc);
    ctx.lineTo(x - 65 * sc, y - 132 * sc);
    ctx.lineTo(x + 10 * sc, y - 104 * sc);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#7a6a54';
    ctx.fillRect(x - 92 * sc, y - 78 * sc, 40 * sc, 44 * sc);
    // vinç
    ctx.strokeStyle = '#e67e22';
    ctx.lineWidth = 8 * sc;
    ctx.beginPath();
    ctx.moveTo(x + 60 * sc, y - 34 * sc);
    ctx.lineTo(x + 60 * sc, y - 150 * sc);
    ctx.lineTo(x + 130 * sc, y - 120 * sc);
    ctx.stroke();
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 3 * sc;
    ctx.beginPath();
    ctx.moveTo(x + 130 * sc, y - 120 * sc);
    ctx.lineTo(x + 130 * sc, y - 70 * sc - Math.sin(t * 1.5) * 8 * sc);
    ctx.stroke();
    ctx.fillStyle = '#f1c40f';
    ctx.fillRect(x + 118 * sc, y - 70 * sc - Math.sin(t * 1.5) * 8 * sc, 24 * sc, 18 * sc);
    // liman tabelası
    if (sc > 0.12) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(x - 60 * sc, y - 174 * sc, 120 * sc, 30 * sc);
      ctx.strokeStyle = '#2a6f97';
      ctx.lineWidth = 3 * sc;
      ctx.strokeRect(x - 60 * sc, y - 174 * sc, 120 * sc, 30 * sc);
      ctx.fillStyle = '#5a4632';
      ctx.fillRect(x - 4 * sc, y - 144 * sc, 8 * sc, 40 * sc);
      ctx.fillStyle = '#1a4a6e';
      ctx.font = 'bold ' + 20 * sc + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('LİMAN ' + num, x, y - 159 * sc);
    }
    // giriş şamandıraları (yeşil = giriş)
    ctx.fillStyle = '#2ecc71';
    for (const bx of [-pw / 2 - 20 * sc, pw / 2 + 20 * sc]) {
      ctx.beginPath();
      ctx.arc(x + bx, y - 4 * sc + Math.sin(t * 2 + bx) * 3 * sc, 9 * sc, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawSprites() {
    const t = performance.now() / 1000;
    const sprites = [
      ...buoys.map(b => ({ z: b.z, x: b.x, kind: 'buoy', seed: b.seed })),
      ...obstacles.map(o => ({ z: o.z, x: o.x, kind: 'obst', o })),
      { z: port.z, x: port.x, kind: 'port', num: port.num },
    ].sort((a, b) => b.z - a.z);

    for (const s of sprites) {
      const zRel = s.z - distance + 1;
      if (zRel < 0.55) continue;
      const f = 1 / zRel;
      if (f > 1.05 || f < 0.02) continue;
      const fc = Math.min(f, 1);
      const y = HORIZON + fc * (H - HORIZON);
      const x = rowCenter(fc) + s.x * SEAHALF * fc;
      if (s.kind === 'buoy') drawBuoy(x, y, fc, t, s.seed);
      else if (s.kind === 'obst') drawObstacle(s.o, x, y, fc, t);
      else drawPort(x, y, fc, t, s.num);
    }
  }

  function drawShip() {
    const t = performance.now() / 1000;
    const steer = (keys['ArrowLeft'] || keys['a'] || keys['A'] || steerTouch === -1) ? -1
                : (keys['ArrowRight'] || keys['d'] || keys['D'] || steerTouch === 1) ? 1 : 0;
    const bob = Math.sin(t * 2) * 5;
    const baseX = W / 2 + playerX * 26 + (Math.random() - 0.5) * shake * 3;
    const baseY = H - 40 + bob + (Math.random() - 0.5) * shake * 2;

    // dümen suyu (köpük izi)
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i = 0; i < 4; i++) {
      const wy = baseY + 14 + i * 12;
      const ww = 60 + i * 34 + Math.sin(t * 5 + i) * 6;
      ctx.beginPath();
      ctx.ellipse(baseX, wy, ww / 2, 7 + i * 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.save();
    ctx.translate(baseX, baseY);
    ctx.rotate(steer * 0.06);

    // gövde (kıç taraftan)
    ctx.fillStyle = '#b8432c';
    ctx.beginPath();
    ctx.moveTo(-95, -60);
    ctx.lineTo(95, -60);
    ctx.lineTo(72, 10);
    ctx.lineTo(-72, 10);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#8f3220';
    ctx.beginPath();
    ctx.moveTo(-72, 10);
    ctx.lineTo(72, 10);
    ctx.lineTo(58, 26);
    ctx.lineTo(-58, 26);
    ctx.closePath();
    ctx.fill();
    // gemi adı
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('TALHA', 0, -22);
    // küpeşte
    ctx.fillStyle = '#7a2b1b';
    ctx.fillRect(-95, -66, 190, 8);
    // güvertedeki yük konteynerleri
    if (deliverT <= 0) {
      cargo.forEach((col, i) => {
        const cx = i < 2 ? -86 + (i % 2) * 0 : 62;
        const side = i < 2 ? -1 : 1;
        const stackX = side * 74;
        const stackY = -66 - 24 * (i % 2) - 24;
        ctx.fillStyle = col;
        ctx.fillRect(stackX - 18, stackY, 36, 22);
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 2;
        ctx.strokeRect(stackX - 18, stackY, 36, 22);
        // konteyner çizgileri
        ctx.beginPath();
        ctx.moveTo(stackX - 6, stackY);
        ctx.lineTo(stackX - 6, stackY + 22);
        ctx.moveTo(stackX + 6, stackY);
        ctx.lineTo(stackX + 6, stackY + 22);
        ctx.stroke();
      });
    }
    // kabin
    ctx.fillStyle = '#f2ede2';
    ctx.fillRect(-52, -118, 104, 52);
    ctx.fillStyle = '#3d6f91';
    for (const wx of [-38, -10, 18]) {
      ctx.fillRect(wx, -108, 20, 16);
    }
    // üst güverte + baca
    ctx.fillStyle = '#e0d9c8';
    ctx.fillRect(-30, -140, 60, 22);
    ctx.fillStyle = '#d64545';
    ctx.fillRect(8, -170, 20, 32);
    ctx.fillStyle = '#333';
    ctx.fillRect(8, -174, 20, 7);
    // duman
    ctx.fillStyle = 'rgba(220,220,220,0.6)';
    for (let i = 0; i < 3; i++) {
      const dy = -184 - i * 20 - (t * 26 % 20);
      ctx.beginPath();
      ctx.arc(18 + Math.sin(t * 2 + i * 2) * 6 + i * 4, dy, 8 + i * 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // direk + bayrak
    ctx.strokeStyle = '#5a4632';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-36, -140);
    ctx.lineTo(-36, -186);
    ctx.stroke();
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.moveTo(-36, -186);
    ctx.lineTo(-6 + Math.sin(t * 6) * 3, -178);
    ctx.lineTo(-36, -170);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(8, 25, 45, 0.55)';
    ctx.fillRect(0, 0, W, 58);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd54a';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText('Teslimat: ' + delivered, 118, 22);
    ctx.fillStyle = '#7fdcff';
    ctx.font = '15px sans-serif';
    const kalan = Math.max(0, Math.ceil((port.z - distance) * 2));
    ctx.fillText('Limana: ' + kalan + ' m   Hız: ' + Math.floor(speed * 1.2) + ' knot   Rekor: ' + best, 118, 45);

    // liman yön göstergesi: iskele hangi taraftaysa ok o yöne
    const dx = port.x - playerX;
    if (Math.abs(dx) > 0.2 && deliverT <= 0) {
      const ax = W / 2 + Math.sign(dx) * 150;
      ctx.fillStyle = '#ffd54a';
      ctx.beginPath();
      if (dx > 0) {
        ctx.moveTo(ax + 18, 90); ctx.lineTo(ax - 8, 76); ctx.lineTo(ax - 8, 104);
      } else {
        ctx.moveTo(ax - 18, 90); ctx.lineTo(ax + 8, 76); ctx.lineTo(ax + 8, 104);
      }
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawCenteredPanel(lines) {
    ctx.fillStyle = 'rgba(5, 18, 35, 0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    let y = H * 0.28;
    for (const [text, size, color] of lines) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.fillText(text, W / 2, y);
      y += size * 1.6;
    }
  }

  // ---- Ana döngü ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);

    drawSky();
    drawSea();
    drawSprites();
    drawShip();
    if (state !== STATE.MENU) drawHUD();

    // teslimat kutlaması
    if (state === STATE.PLAYING && !paused && deliverT > 0) {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(5, 18, 35, 0.5)';
      ctx.fillRect(0, H * 0.3, W, 150);
      ctx.fillStyle = '#7fff9e';
      ctx.font = 'bold 38px sans-serif';
      ctx.fillText('YÜK TESLİM EDİLDİ!', W / 2, H * 0.36);
      ctx.fillStyle = '#ffd54a';
      ctx.font = 'bold 24px sans-serif';
      ctx.fillText('Yeni yük yükleniyor...', W / 2, H * 0.36 + 50);
    }
    // iskeleyi kaçırma mesajı
    if (state === STATE.PLAYING && !paused && missT > 0) {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ffb020';
      ctx.font = 'bold 26px sans-serif';
      ctx.fillText('İskeleyi kaçırdın! İleride yenisi var', W / 2, H * 0.34);
    }

    if (state === STATE.MENU) {
      drawCenteredPanel([
        ['GEMİ SÜRÜŞÜ', 44, '#7fdcff'],
        ['', 14, '#fff'],
        ['TALHA gemisiyle yük taşı!', 20, '#ddd'],
        ['Limandan limana yük götür,', 16, '#aaa'],
        ['sarı ok iskelenin yönünü gösterir', 16, '#aaa'],
        ['İskeleye dümen kırıp yanaş, teslim et', 16, '#aaa'],
        ['Kayalık, ada ve fenerlere çarpma: yavaşlarsın!', 16, '#ffb020'],
        ['Ok tuşları / A-D veya ekran okları', 16, '#aaa'],
        ['Başlamak için tıkla veya SPACE', 20, '#ffd54a'],
      ]);
    } else if (paused && state === STATE.PLAYING) {
      drawCenteredPanel([
        ['DURAKLATILDI', 40, '#ffd54a'],
        ['', 10, '#fff'],
        ['Devam etmek için Ayarlar > Başlat', 18, '#ddd'],
      ]);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
