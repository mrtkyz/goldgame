<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gemi Sürüşü</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #0a1e33;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(90, 200, 250, 0.3);
    max-width: 100vw;
    max-height: 100vh;
  }

  #back {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: #7fdcff;
    background: rgba(8, 25, 45, 0.75);
    border: 1px solid rgba(127, 220, 255, 0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    text-decoration: none;
  }

  /* Ayarlar menüsü */
  #settings {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  #settings button {
    border: 2px solid rgba(127, 220, 255, 0.5);
    background: rgba(8, 25, 45, 0.85);
    color: #7fdcff;
    border-radius: 999px;
    font-size: 16px;
    padding: 10px 18px;
    -webkit-tap-highlight-color: transparent;
  }
  #gear {
    width: 46px;
    height: 46px;
    padding: 0 !important;
    font-size: 24px;
    border-radius: 50% !important;
  }
  #menu { display: flex; flex-direction: column; gap: 8px; }
  #menu.hidden { display: none; }

  /* Dümen okları: sadece dokunmatik cihazlarda görünür */
  .steer {
    display: none;
    position: fixed;
    bottom: 24px;
    z-index: 10;
    width: 84px;
    height: 84px;
    border-radius: 50%;
    border: 2px solid rgba(127, 220, 255, 0.5);
    background: rgba(8, 25, 45, 0.55);
    color: #7fdcff;
    font-size: 36px;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.85;
  }
  #steerL { left: 18px; }
  #steerR { right: 18px; }
  @media (pointer: coarse) {
    .steer { display: block; }
  }
  .steer:active { background: rgba(127, 220, 255, 0.35); }
</style>
</head>
<body>
<a id="back" href="index.html">← Oyunlar</a>
<div id="settings">
  <button id="gear" aria-label="Ayarlar">⚙</button>
  <div id="menu" class="hidden">
    <button id="btnPause">⏸ Durdur</button>
    <button id="btnStart">▶ Başlat</button>
    <button id="btnExit">✕ Çık</button>
  </div>
</div>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<button id="steerL" class="steer" aria-label="Sola dön">◀</button>
<button id="steerR" class="steer" aria-label="Sağa dön">▶</button>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const HORIZON = 270;         // ufuk çizgisi
  const SEAHALF = 300;         // dünya kaydırma ölçeği

  function fit() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  addEventListener('resize', fit);
  fit();

  // ---- Oyun durumu ----
  const STATE = { MENU: 0, PLAYING: 1, OVER: 2 };
  let state = STATE.MENU;
  let paused = false;

  let distance, speed, playerX, lives, elapsed;
  let obstacles, nextObstZ;
  let invTimer, flashTimer, shake, gullT;
  let best = +(localStorage.getItem('gemi-best') || 0);

  function resetWorld() {
    distance = 0; speed = 8; playerX = 0; lives = 3; elapsed = 0;
    obstacles = []; nextObstZ = 25;
    invTimer = 0; flashTimer = 0; shake = 0; gullT = 4;
  }
  resetWorld();

  function startGame() {
    resetWorld();
    state = STATE.PLAYING;
    paused = false;
    sndHorn();
  }

  function gameOver() {
    state = STATE.OVER;
    sndOver();
    const m = Math.floor(distance * 2);
    if (m > best) {
      best = m;
      localStorage.setItem('gemi-best', best);
    }
  }

  // ---- Sesler ----
  let audioCtx = null;
  function getAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    } catch (e) { return null; }
  }
  function beep(freq, dur, type = 'sine', vol = 0.15, delay = 0) {
    const ac = getAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ac.destination);
    o.start(t0);
    o.stop(t0 + dur);
  }
  const sndHorn = () => { beep(140, 0.5, 'sawtooth', 0.15); beep(180, 0.5, 'sawtooth', 0.1); };
  const sndCrash = () => { beep(100, 0.3, 'sawtooth', 0.22); beep(60, 0.45, 'sawtooth', 0.18, 0.06); };
  const sndGull = () => { beep(1500, 0.12, 'sine', 0.06); beep(1300, 0.1, 'sine', 0.05, 0.15); };
  const sndOver = () => { beep(330, 0.25, 'square', 0.1); beep(220, 0.4, 'square', 0.1, 0.2); };

  // ---- Girdi ----
  const keys = {};
  addEventListener('keydown', e => {
    if ((state === STATE.MENU || state === STATE.OVER) &&
        (e.key === ' ' || e.key === 'Enter')) { startGame(); e.preventDefault(); return; }
    keys[e.key] = true;
    if ([' ', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
  });
  addEventListener('keyup', e => keys[e.key] = false);

  let steerTouch = 0;
  for (const [id, val] of [['steerL', -1], ['steerR', 1]]) {
    const btn = document.getElementById(id);
    btn.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (state !== STATE.PLAYING) { startGame(); return; }
      steerTouch = val;
    });
    for (const ev of ['pointerup', 'pointercancel', 'pointerleave']) {
      btn.addEventListener(ev, () => { if (steerTouch === val) steerTouch = 0; });
    }
  }
  canvas.addEventListener('pointerdown', () => {
    if (state !== STATE.PLAYING) startGame();
  });

  // Ayarlar menüsü
  const menuEl = document.getElementById('menu');
  document.getElementById('gear').addEventListener('click', () => {
    menuEl.classList.toggle('hidden');
  });
  document.getElementById('btnPause').addEventListener('click', () => {
    if (state === STATE.PLAYING) paused = true;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnStart').addEventListener('click', () => {
    if (state !== STATE.PLAYING) startGame();
    paused = false;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnExit').addEventListener('click', () => {
    location.href = 'index.html';
  });

  // ---- Güncelleme ----
  function update(dt) {
    if (state !== STATE.PLAYING || paused) return;
    elapsed += dt;

    // Hız: zamanla artar
    const maxSpeed = Math.min(26, 14 + elapsed * 0.15);
    speed += (maxSpeed - speed) * dt * 0.35;

    // Dümen
    let steer = steerTouch;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) steer = -1;
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) steer = 1;
    playerX += steer * dt * 1.9;
    playerX = Math.max(-1.3, Math.min(1.3, playerX));

    distance += speed * dt;
    shake = Math.max(0, shake - dt * 10);

    // Martı sesi ara sıra
    gullT -= dt;
    if (gullT <= 0) { sndGull(); gullT = 5 + Math.random() * 6; }

    // Engel üret: kaya, ada, tekne
    while (nextObstZ < distance + 50) {
      const r = Math.random();
      const type = r < 0.4 ? 'kaya' : r < 0.72 ? 'tekne' : 'ada';
      obstacles.push({
        z: nextObstZ,
        x: (Math.random() * 2.2 - 1.1),
        type,
        s: type === 'tekne' ? 5 + Math.random() * 4 : 0,   // tekneler yavaşça ilerler
        seed: Math.random() * 10,
      });
      nextObstZ += Math.max(7, 15 - elapsed * 0.08) + Math.random() * 10;
    }

    // Çarpışma ve temizlik
    if (invTimer > 0) invTimer -= dt;
    if (flashTimer > 0) flashTimer -= dt;
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const ob = obstacles[i];
      ob.z += ob.s * dt;
      const zRel = ob.z - distance + 1;
      if (zRel < 0.55) { obstacles.splice(i, 1); continue; }
      const hitW = ob.type === 'ada' ? 0.42 : 0.3;
      if (invTimer <= 0 && zRel < 1.25 && zRel > 0.85 && Math.abs(ob.x - playerX) < hitW) {
        obstacles.splice(i, 1);
        lives--;
        invTimer = 2;
        flashTimer = 0.4;
        shake = 4;
        speed = Math.max(6, speed * 0.4);
        sndCrash();
        if (lives <= 0) { gameOver(); return; }
      }
    }
  }

  // ---- Çizim ----
  const rowCenter = f => W / 2 - playerX * SEAHALF * f;

  function drawHeart(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#ff5d8f';
    ctx.beginPath();
    ctx.moveTo(0, r * 0.9);
    ctx.bezierCurveTo(-r * 1.4, -r * 0.2, -r * 0.6, -r * 1.1, 0, -r * 0.3);
    ctx.bezierCurveTo(r * 0.6, -r * 1.1, r * 1.4, -r * 0.2, 0, r * 0.9);
    ctx.fill();
    ctx.restore();
  }

  function drawSky() {
    const t = performance.now() / 1000;
    const g = ctx.createLinearGradient(0, 0, 0, HORIZON);
    g.addColorStop(0, '#3f9be0');
    g.addColorStop(1, '#cfeaf7');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, HORIZON);
    // güneş
    ctx.beginPath();
    ctx.arc(W * 0.24, 74, 32, 0, Math.PI * 2);
    ctx.fillStyle = '#ffe89a';
    ctx.fill();
    // uzak adalar
    ctx.fillStyle = '#6d94ad';
    ctx.beginPath();
    ctx.ellipse(W * 0.15, HORIZON, 90, 22, 0, Math.PI, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(W * 0.85, HORIZON, 120, 30, 0, Math.PI, 0);
    ctx.fill();
    // bulutlar
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (const [bx, by, br] of [[110, 52, 20], [280, 92, 16], [420, 48, 22]]) {
      const x = (bx + t * 5) % (W + 80) - 40;
      ctx.beginPath();
      ctx.ellipse(x, by, br * 1.6, br * 0.7, 0, 0, Math.PI * 2);
      ctx.ellipse(x + br, by + 4, br * 1.1, br * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // martılar
    ctx.strokeStyle = '#f5f8fa';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    for (const [gx, gy, sp, ph] of [[0.3, 120, 14, 0], [0.55, 90, 11, 2], [0.75, 140, 13, 4]]) {
      const x = (gx * W + t * 22) % (W + 60) - 30;
      const flap = Math.sin(t * 8 + ph) * 5;
      ctx.beginPath();
      ctx.moveTo(x - sp, gy);
      ctx.quadraticCurveTo(x - sp / 2, gy - flap, x, gy);
      ctx.quadraticCurveTo(x + sp / 2, gy - flap, x + sp, gy);
      ctx.stroke();
    }
  }

  function drawSea() {
    const t = performance.now() / 1000;
    for (let sy = HORIZON; sy < H; sy++) {
      const f = (sy - HORIZON) / (H - HORIZON);
      const z = distance + 1 / Math.max(f, 0.02);
      const band = Math.floor(z * 1.1 + Math.sin(sy * 0.09 + t * 2) * 0.35) % 2;
      ctx.fillStyle = band ? '#1c6bb2' : '#1a62a5';
      ctx.fillRect(0, sy, W, 1);
    }
    // köpük parıltıları
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for (let i = 0; i < 26; i++) {
      const fy = ((i * 61.7 + distance * 40) % (H - HORIZON));
      const sy = HORIZON + fy;
      const f = fy / (H - HORIZON);
      const sx = (i * 137.5 + Math.sin(i * 3 + t) * 20) % W;
      ctx.fillRect(sx, sy, Math.max(2, 7 * f), Math.max(1, 2 * f));
    }
  }

  function drawObstacle(s, x, y, sc, t) {
    if (s.type === 'kaya') {
      ctx.fillStyle = '#5b6572';
      ctx.beginPath();
      ctx.ellipse(x, y - 14 * sc, 42 * sc, 28 * sc, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#78828f';
      ctx.beginPath();
      ctx.ellipse(x - 14 * sc, y - 30 * sc, 20 * sc, 14 * sc, -0.4, 0, Math.PI * 2);
      ctx.fill();
      // köpük halkası
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 4 * sc;
      ctx.beginPath();
      ctx.ellipse(x, y - 4 * sc, 50 * sc, 12 * sc, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (s.type === 'ada') {
      // kum
      ctx.fillStyle = '#e8cf8e';
      ctx.beginPath();
      ctx.ellipse(x, y - 8 * sc, 85 * sc, 26 * sc, 0, 0, Math.PI * 2);
      ctx.fill();
      // palmiye gövdesi
      ctx.strokeStyle = '#8d5a2b';
      ctx.lineWidth = 8 * sc;
      ctx.beginPath();
      ctx.moveTo(x, y - 18 * sc);
      ctx.quadraticCurveTo(x + 10 * sc, y - 60 * sc, x + 4 * sc, y - 88 * sc);
      ctx.stroke();
      // yapraklar
      ctx.strokeStyle = '#2f9e4b';
      ctx.lineWidth = 6 * sc;
      for (const a of [-2.6, -2.1, -1.4, -0.7, -0.2]) {
        ctx.beginPath();
        ctx.moveTo(x + 4 * sc, y - 88 * sc);
        ctx.quadraticCurveTo(
          x + 4 * sc + Math.cos(a) * 34 * sc, y - 88 * sc + Math.sin(a) * 30 * sc - 8 * sc,
          x + 4 * sc + Math.cos(a) * 52 * sc, y - 88 * sc + Math.sin(a) * 40 * sc + 6 * sc
        );
        ctx.stroke();
      }
    } else { // tekne (arkadan görünüm)
      const bob = Math.sin(t * 2.4 + s.seed) * 3 * sc;
      // gövde
      ctx.fillStyle = '#c0533a';
      ctx.beginPath();
      ctx.moveTo(x - 34 * sc, y - 34 * sc + bob);
      ctx.lineTo(x + 34 * sc, y - 34 * sc + bob);
      ctx.lineTo(x + 24 * sc, y - 4 * sc + bob);
      ctx.lineTo(x - 24 * sc, y - 4 * sc + bob);
      ctx.closePath();
      ctx.fill();
      // kabin
      ctx.fillStyle = '#f2ede2';
      ctx.fillRect(x - 16 * sc, y - 58 * sc + bob, 32 * sc, 26 * sc);
      ctx.fillStyle = '#3d6f91';
      ctx.fillRect(x - 10 * sc, y - 52 * sc + bob, 8 * sc, 8 * sc);
      ctx.fillRect(x + 3 * sc, y - 52 * sc + bob, 8 * sc, 8 * sc);
      // bayrak direği
      ctx.strokeStyle = '#5a4632';
      ctx.lineWidth = 3 * sc;
      ctx.beginPath();
      ctx.moveTo(x, y - 58 * sc + bob);
      ctx.lineTo(x, y - 78 * sc + bob);
      ctx.stroke();
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(x, y - 78 * sc + bob, 14 * sc, 8 * sc);
      // iz köpüğü
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.ellipse(x, y + bob, 30 * sc, 7 * sc, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawSprites() {
    const t = performance.now() / 1000;
    const sorted = [...obstacles].sort((a, b) => b.z - a.z);
    for (const s of sorted) {
      const zRel = s.z - distance + 1;
      if (zRel < 0.55) continue;
      const f = 1 / zRel;
      if (f > 1.05 || f < 0.03) continue;
      const fc = Math.min(f, 1);
      const y = HORIZON + fc * (H - HORIZON);
      const x = rowCenter(fc) + s.x * SEAHALF * fc;
      drawObstacle(s, x, y, fc, t);
    }
  }

  function drawShip() {
    const t = performance.now() / 1000;
    const steer = (keys['ArrowLeft'] || keys['a'] || keys['A'] || steerTouch === -1) ? -1
                : (keys['ArrowRight'] || keys['d'] || keys['D'] || steerTouch === 1) ? 1 : 0;
    const bob = Math.sin(t * 2) * 5;
    const sx = (Math.random() - 0.5) * shake * 2;
    const baseX = W / 2 + playerX * 26 + sx;
    const baseY = H - 40 + bob;

    // dümen suyu (köpük izi)
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i = 0; i < 4; i++) {
      const wy = baseY + 14 + i * 12;
      const ww = 60 + i * 34 + Math.sin(t * 5 + i) * 6;
      ctx.beginPath();
      ctx.ellipse(baseX, wy, ww / 2, 7 + i * 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.save();
    ctx.translate(baseX, baseY);
    ctx.rotate(steer * 0.06);
    if (invTimer > 0 && Math.floor(invTimer * 8) % 2 === 0) ctx.globalAlpha = 0.45;

    // gövde (kıç taraftan)
    ctx.fillStyle = '#b8432c';
    ctx.beginPath();
    ctx.moveTo(-95, -60);
    ctx.lineTo(95, -60);
    ctx.lineTo(72, 10);
    ctx.lineTo(-72, 10);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#8f3220';
    ctx.beginPath();
    ctx.moveTo(-72, 10);
    ctx.lineTo(72, 10);
    ctx.lineTo(58, 26);
    ctx.lineTo(-58, 26);
    ctx.closePath();
    ctx.fill();
    // gemi adı
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('TALHA', 0, -22);
    // küpeşte
    ctx.fillStyle = '#7a2b1b';
    ctx.fillRect(-95, -66, 190, 8);
    // kabin
    ctx.fillStyle = '#f2ede2';
    ctx.fillRect(-52, -118, 104, 52);
    ctx.fillStyle = '#3d6f91';
    for (const wx of [-38, -10, 18]) {
      ctx.fillRect(wx, -108, 20, 16);
    }
    // üst güverte + baca
    ctx.fillStyle = '#e0d9c8';
    ctx.fillRect(-30, -140, 60, 22);
    ctx.fillStyle = '#d64545';
    ctx.fillRect(8, -170, 20, 32);
    ctx.fillStyle = '#333';
    ctx.fillRect(8, -174, 20, 7);
    // duman
    ctx.fillStyle = 'rgba(220,220,220,0.6)';
    for (let i = 0; i < 3; i++) {
      const dy = -184 - i * 20 - (t * 26 % 20);
      ctx.beginPath();
      ctx.arc(18 + Math.sin(t * 2 + i * 2) * 6 + i * 4, dy, 8 + i * 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // direk + bayrak
    ctx.strokeStyle = '#5a4632';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-36, -140);
    ctx.lineTo(-36, -186);
    ctx.stroke();
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.moveTo(-36, -186);
    ctx.lineTo(-6 + Math.sin(t * 6) * 3, -178);
    ctx.lineTo(-36, -170);
    ctx.closePath();
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(8, 25, 45, 0.55)';
    ctx.fillRect(0, 0, W, 58);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText(Math.floor(distance * 2) + ' m', 118, 22);
    ctx.fillStyle = '#7fdcff';
    ctx.font = '15px sans-serif';
    ctx.fillText('Hız: ' + Math.floor(speed * 1.2) + ' knot   Rekor: ' + best + ' m', 118, 45);
    for (let i = 0; i < lives; i++) {
      drawHeart(W - 82 - i * 30, 26, 12);
    }
  }

  function drawCenteredPanel(lines) {
    ctx.fillStyle = 'rgba(5, 18, 35, 0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    let y = H * 0.28;
    for (const [text, size, color] of lines) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.fillText(text, W / 2, y);
      y += size * 1.6;
    }
  }

  // ---- Ana döngü ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);

    drawSky();
    drawSea();
    drawSprites();
    drawShip();
    if (state !== STATE.MENU) drawHUD();

    if (flashTimer > 0) {
      ctx.fillStyle = 'rgba(255, 40, 20, ' + (flashTimer * 0.8) + ')';
      ctx.fillRect(0, 0, W, H);
    }

    if (state === STATE.MENU) {
      drawCenteredPanel([
        ['GEMİ SÜRÜŞÜ', 44, '#7fdcff'],
        ['', 14, '#fff'],
        ['TALHA gemisiyle denize açıl!', 20, '#ddd'],
        ['Kayalardan, adalardan ve teknelerden kaç', 16, '#aaa'],
        ['Ok tuşları / A-D veya ekran okları', 16, '#aaa'],
        ['Gittikçe hızlanırsın, rotanı iyi çiz!', 16, '#ffb020'],
        ['Başlamak için tıkla veya SPACE', 20, '#ffd54a'],
      ]);
    } else if (paused && state === STATE.PLAYING) {
      drawCenteredPanel([
        ['DURAKLATILDI', 40, '#ffd54a'],
        ['', 10, '#fff'],
        ['Devam etmek için Ayarlar > Başlat', 18, '#ddd'],
      ]);
    } else if (state === STATE.OVER) {
      const m = Math.floor(distance * 2);
      drawCenteredPanel([
        ['GEMİ BATTI!', 44, '#ff6b6b'],
        ['Mesafe: ' + m + ' m', 30, '#7fdcff'],
        [m >= best && m > 0 ? '★ YENİ REKOR! ★' : 'Rekor: ' + best + ' m', 24, '#ffd54a'],
        ['', 10, '#fff'],
        ['Tekrar denize açılmak için tıkla veya SPACE', 19, '#ddd'],
      ]);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
