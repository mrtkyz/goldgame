name: DigitalOcean Droplet'e Deploy (Docker)

on:
  push:
    branches:
      - main
      - claude/gold-game-index-page-h80dgz
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Docker imajını test amaçlı derle
        run: docker build -t goldgame:ci .

      - name: SSH anahtarını hazırla
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DO_PORT || '22' }}" -H "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts

      - name: Dosyaları sunucuya kopyala
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DO_PORT || '22' }}" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'deploy' \
            --exclude 'README.md' \
            ./ "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:${{ secrets.DO_TARGET_DIR || '/opt/goldgame' }}/"

      - name: Container'ı yeniden derleyip başlat
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DO_PORT || '22' }}" \
            "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}" \
            "cd '${{ secrets.DO_TARGET_DIR || '/opt/goldgame' }}' \
             && docker compose up -d --build \
             && docker image prune -f"

      - name: Deploy sonucunu doğrula (HTTPS)
        run: |
          # İlk deploy'da Let's Encrypt sertifikasının alınması birkaç saniye sürebilir
          for i in $(seq 1 12); do
            if curl -fsS -m 10 https://goldgame.sinsoft.com.tr/ > /dev/null; then
              echo "Deploy basarili: site HTTPS uzerinden yanit veriyor"
              exit 0
            fi
            echo "Deneme $i/12 basarisiz, 5 sn sonra tekrar..."
            sleep 5
          done
          echo "HTTPS dogrulanamadi (443 portu acik mi? DNS dogru mu?)"
          exit 1
