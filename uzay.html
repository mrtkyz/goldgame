<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Uzay Savaşı</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #0a0a1e;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game {
    display: block;
    background: linear-gradient(#101034 0%, #0a0a1e 60%, #14142e 100%);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(140, 120, 255, 0.3);
    max-width: 100vw;
    max-height: 100vh;
  }

  #back {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: #b0a0ff;
    background: rgba(15, 15, 40, 0.75);
    border: 1px solid rgba(176, 160, 255, 0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    text-decoration: none;
  }

  /* Ayarlar menüsü */
  #settings {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  #settings button {
    border: 2px solid rgba(176, 160, 255, 0.5);
    background: rgba(15, 15, 40, 0.85);
    color: #b0a0ff;
    border-radius: 999px;
    font-size: 16px;
    padding: 10px 18px;
    -webkit-tap-highlight-color: transparent;
  }
  #gear {
    width: 46px;
    height: 46px;
    padding: 0 !important;
    font-size: 24px;
    border-radius: 50% !important;
  }
  #menu { display: flex; flex-direction: column; gap: 8px; }
  #menu.hidden { display: none; }
</style>
</head>
<body>
<a id="back" href="index.html">← Oyunlar</a>
<div id="settings">
  <button id="gear" aria-label="Ayarlar">⚙</button>
  <div id="menu" class="hidden">
    <button id="btnPause">⏸ Durdur</button>
    <button id="btnStart">▶ Başlat</button>
    <button id="btnExit">✕ Çık</button>
  </div>
</div>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  function fit() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  addEventListener('resize', fit);
  fit();

  // ---- Oyun durumu ----
  const STATE = { MENU: 0, PLAYING: 1, OVER: 2 };
  let state = STATE.MENU;
  let paused = false;

  const player = { x: W / 2, y: H - 110, speed: 340 };
  let lasers = [], bullets = [], enemies = [], particles = [], floaters = [];
  let score = 0, lives = 3, wave = 0, toSpawn = 0, spawnT = 0, fireT = 0, waveT = 0, invTimer = 0, flashTimer = 0;
  let best = +(localStorage.getItem('uzay-best') || 0);

  // yıldız alanı
  const stars = [];
  for (let i = 0; i < 70; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      s: 0.4 + Math.random() * 1.8,
      r: Math.random() < 0.15 ? 2 : 1,
    });
  }

  function startGame() {
    lasers = []; bullets = []; enemies = []; particles = []; floaters = [];
    score = 0; lives = 3; wave = 0;
    toSpawn = 0; spawnT = 0; fireT = 0; waveT = 0;
    invTimer = 0; flashTimer = 0;
    player.x = W / 2; player.y = H - 110;
    nextWave();
    state = STATE.PLAYING;
    paused = false;
  }

  function nextWave() {
    wave++;
    toSpawn = 5 + wave * 2;
    spawnT = 0.5;
    waveT = 2;
    if (wave > 1) sndWave();
  }

  function gameOver() {
    state = STATE.OVER;
    sndOver();
    if (score > best) {
      best = score;
      localStorage.setItem('uzay-best', best);
    }
  }

  // ---- Sesler ----
  let audioCtx = null;
  function getAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    } catch (e) { return null; }
  }
  function beep(freq, dur, type = 'sine', vol = 0.15, delay = 0, slide = 0) {
    const ac = getAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ac.destination);
    o.start(t0);
    o.stop(t0 + dur);
  }
  const sndLaser = () => beep(880, 0.09, 'square', 0.05, 0, 220);
  const sndBoom = () => { beep(180, 0.25, 'sawtooth', 0.15, 0, 40); beep(90, 0.3, 'square', 0.1, 0.03, 30); };
  const sndHit = () => beep(140, 0.3, 'sawtooth', 0.2, 0, 50);
  const sndWave = () => { beep(523, 0.12, 'triangle', 0.13); beep(659, 0.12, 'triangle', 0.13, 0.12); beep(784, 0.18, 'triangle', 0.13, 0.24); };
  const sndOver = () => { beep(330, 0.25, 'square', 0.1); beep(220, 0.4, 'square', 0.1, 0.2); };

  // ---- Girdi ----
  const keys = {};
  addEventListener('keydown', e => {
    if ((state === STATE.MENU || state === STATE.OVER) &&
        (e.key === ' ' || e.key === 'Enter')) { startGame(); e.preventDefault(); return; }
    keys[e.key] = true;
    if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
  });
  addEventListener('keyup', e => keys[e.key] = false);

  let pointerX = null, pointerY = null;
  function pointerPos(e) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) / r.width * W,
      y: (e.clientY - r.top) / r.height * H,
    };
  }
  canvas.addEventListener('pointerdown', e => {
    if (state !== STATE.PLAYING) { startGame(); return; }
    const p = pointerPos(e);
    pointerX = p.x; pointerY = p.y;
  });
  canvas.addEventListener('pointermove', e => {
    if (pointerX !== null) {
      const p = pointerPos(e);
      pointerX = p.x; pointerY = p.y;
    }
  });
  addEventListener('pointerup', () => { pointerX = null; pointerY = null; });

  // Ayarlar menüsü
  const menuEl = document.getElementById('menu');
  document.getElementById('gear').addEventListener('click', () => {
    menuEl.classList.toggle('hidden');
  });
  document.getElementById('btnPause').addEventListener('click', () => {
    if (state === STATE.PLAYING) paused = true;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnStart').addEventListener('click', () => {
    if (state !== STATE.PLAYING) startGame();
    paused = false;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnExit').addEventListener('click', () => {
    location.href = 'index.html';
  });

  // ---- Yardımcılar ----
  function boom(x, y, color, n = 16) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 60 + Math.random() * 200;
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.5 + Math.random() * 0.3, color });
    }
  }
  function addFloater(x, y, text, color) {
    floaters.push({ x, y, text, color, life: 1 });
  }

  function spawnEnemy() {
    const isBig = wave >= 2 && Math.random() < 0.3;
    enemies.push({
      x: 40 + Math.random() * (W - 80),
      y: -34,
      type: isBig ? 'alien' : 'ufo',
      hp: isBig ? 2 : 1,
      r: isBig ? 26 : 20,
      vy: (isBig ? 26 : 38) + wave * 3,
      phase: Math.random() * Math.PI * 2,
      amp: 30 + Math.random() * 50,
      fireT: 2 + Math.random() * 3,
      shooter: isBig || (wave >= 3 && Math.random() < 0.3),
    });
  }

  // ---- Güncelleme ----
  function update(dt) {
    if (state !== STATE.PLAYING || paused) return;

    // Oyuncu hareketi
    if (pointerX !== null) {
      const follow = Math.min(1, dt * 14);
      player.x += (pointerX - player.x) * follow;
      player.y += (pointerY - 40 - player.y) * follow; // parmağın biraz üstünde dursun
    } else {
      let dx = 0, dy = 0;
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
      if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
      if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;
      if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }
      player.x += dx * player.speed * dt;
      player.y += dy * player.speed * dt;
    }
    player.x = Math.max(20, Math.min(W - 20, player.x));
    player.y = Math.max(80, Math.min(H - 40, player.y));

    // Otomatik lazer ateşi
    fireT -= dt;
    if (fireT <= 0) {
      lasers.push({ x: player.x, y: player.y - 26 });
      sndLaser();
      fireT = Math.max(0.16, 0.26 - wave * 0.01);
    }

    // Lazerler
    for (let i = lasers.length - 1; i >= 0; i--) {
      lasers[i].y -= 560 * dt;
      if (lasers[i].y < -20) lasers.splice(i, 1);
    }

    // Düşman üretimi
    if (toSpawn > 0) {
      spawnT -= dt;
      if (spawnT <= 0) {
        spawnEnemy();
        toSpawn--;
        spawnT = Math.max(0.35, 1.1 - wave * 0.06);
      }
    } else if (enemies.length === 0) {
      nextWave();
    }

    // Düşmanlar
    for (let i = enemies.length - 1; i >= 0; i--) {
      const en = enemies[i];
      en.phase += dt * 2;
      en.y += en.vy * dt;
      en.x += Math.sin(en.phase) * en.amp * dt;
      en.x = Math.max(24, Math.min(W - 24, en.x));

      // ateş eden düşmanlar
      if (en.shooter && en.y > 40 && en.y < H - 260) {
        en.fireT -= dt;
        if (en.fireT <= 0) {
          bullets.push({ x: en.x, y: en.y + en.r });
          en.fireT = 2.4 + Math.random() * 2.6 - Math.min(1.2, wave * 0.1);
        }
      }

      // ekranın altından çıkan düşman kaybolur
      if (en.y > H + 40) { enemies.splice(i, 1); continue; }

      // lazer çarpması
      for (let j = lasers.length - 1; j >= 0; j--) {
        const lz = lasers[j];
        if (Math.abs(lz.x - en.x) < en.r && Math.abs(lz.y - en.y) < en.r + 8) {
          lasers.splice(j, 1);
          en.hp--;
          if (en.hp <= 0) {
            const pts = en.type === 'alien' ? 25 : 10;
            score += pts;
            addFloater(en.x, en.y, '+' + pts, '#ffd54a');
            boom(en.x, en.y, en.type === 'alien' ? '#c17ff0' : '#7fff9e');
            sndBoom();
            enemies.splice(i, 1);
          } else {
            boom(en.x, en.y, '#fff', 5);
          }
          break;
        }
      }
    }

    // Düşman mermileri
    for (let i = bullets.length - 1; i >= 0; i--) {
      bullets[i].y += (170 + wave * 8) * dt;
      if (bullets[i].y > H + 20) bullets.splice(i, 1);
    }

    // Oyuncuya çarpma
    if (invTimer > 0) invTimer -= dt;
    if (flashTimer > 0) flashTimer -= dt;
    if (invTimer <= 0) {
      let hit = false;
      for (let i = enemies.length - 1; i >= 0; i--) {
        const en = enemies[i];
        if (Math.hypot(en.x - player.x, en.y - player.y) < en.r + 16) {
          enemies.splice(i, 1);
          boom(en.x, en.y, '#ff8050');
          hit = true;
          break;
        }
      }
      if (!hit) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          if (Math.hypot(b.x - player.x, b.y - player.y) < 20) {
            bullets.splice(i, 1);
            hit = true;
            break;
          }
        }
      }
      if (hit) {
        lives--;
        invTimer = 2;
        flashTimer = 0.35;
        boom(player.x, player.y, '#ff5030', 22);
        sndHit();
        if (lives <= 0) { gameOver(); return; }
      }
    }

    // Efektler
    if (waveT > 0) waveT -= dt;
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = floaters.length - 1; i >= 0; i--) {
      floaters[i].y -= 50 * dt;
      floaters[i].life -= dt;
      if (floaters[i].life <= 0) floaters.splice(i, 1);
    }
    // yıldız kayması
    for (const st of stars) {
      st.y += st.s * 60 * dt;
      if (st.y > H) { st.y = -2; st.x = Math.random() * W; }
    }
  }

  // ---- Çizim ----
  function drawHeart(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#ff5d8f';
    ctx.beginPath();
    ctx.moveTo(0, r * 0.9);
    ctx.bezierCurveTo(-r * 1.4, -r * 0.2, -r * 0.6, -r * 1.1, 0, -r * 0.3);
    ctx.bezierCurveTo(r * 0.6, -r * 1.1, r * 1.4, -r * 0.2, 0, r * 0.9);
    ctx.fill();
    ctx.restore();
  }

  function drawShip() {
    const t = performance.now() / 1000;
    const x = player.x, y = player.y;
    ctx.save();
    if (invTimer > 0 && Math.floor(invTimer * 8) % 2 === 0) ctx.globalAlpha = 0.4;
    // motor alevi
    const fl = 14 + Math.sin(t * 30) * 5;
    ctx.fillStyle = '#ffb020';
    ctx.beginPath();
    ctx.moveTo(x - 8, y + 22);
    ctx.lineTo(x, y + 22 + fl);
    ctx.lineTo(x + 8, y + 22);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffe89a';
    ctx.beginPath();
    ctx.moveTo(x - 4, y + 22);
    ctx.lineTo(x, y + 22 + fl * 0.6);
    ctx.lineTo(x + 4, y + 22);
    ctx.closePath();
    ctx.fill();
    // kanatlar
    ctx.fillStyle = '#d64545';
    ctx.beginPath();
    ctx.moveTo(x - 8, y + 2);
    ctx.lineTo(x - 26, y + 22);
    ctx.lineTo(x - 8, y + 20);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + 8, y + 2);
    ctx.lineTo(x + 26, y + 22);
    ctx.lineTo(x + 8, y + 20);
    ctx.closePath();
    ctx.fill();
    // gövde
    const g = ctx.createLinearGradient(x - 12, y, x + 12, y);
    g.addColorStop(0, '#c8d2e0');
    g.addColorStop(0.5, '#f2f6fa');
    g.addColorStop(1, '#aab6c8');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(x, y - 28);
    ctx.quadraticCurveTo(x + 13, y - 6, x + 11, y + 22);
    ctx.lineTo(x - 11, y + 22);
    ctx.quadraticCurveTo(x - 13, y - 6, x, y - 28);
    ctx.closePath();
    ctx.fill();
    // kokpit camı
    ctx.fillStyle = '#4fc9f0';
    ctx.beginPath();
    ctx.ellipse(x, y - 6, 6, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawEnemy(en) {
    const t = performance.now() / 1000;
    const x = en.x, y = en.y;
    if (en.type === 'ufo') {
      // uçan daire: gri tabak + yeşil kubbe
      ctx.fillStyle = '#39d353';
      ctx.beginPath();
      ctx.ellipse(x, y - 8, 12, 10, 0, Math.PI, 0);
      ctx.fill();
      // gözler
      ctx.fillStyle = '#083b12';
      ctx.fillRect(x - 6, y - 13, 3, 4);
      ctx.fillRect(x + 3, y - 13, 3, 4);
      const g = ctx.createLinearGradient(x, y - 8, x, y + 8);
      g.addColorStop(0, '#aab6c8');
      g.addColorStop(1, '#6b7688');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(x, y, 22, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      // ışıklar
      for (let i = -1; i <= 1; i++) {
        ctx.fillStyle = Math.floor(t * 4 + i) % 2 ? '#ffd54a' : '#ff6b9d';
        ctx.beginPath();
        ctx.arc(x + i * 12, y + 3, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // mor uzaylı: ahtapot kafası + dokunaçlar
      ctx.fillStyle = '#c17ff0';
      ctx.beginPath();
      ctx.ellipse(x, y - 4, 22, 18, 0, 0, Math.PI * 2);
      ctx.fill();
      // dokunaçlar
      ctx.strokeStyle = '#a15fd0';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      for (let i = -2; i <= 2; i++) {
        const sway = Math.sin(t * 5 + i + en.phase) * 5;
        ctx.beginPath();
        ctx.moveTo(x + i * 9, y + 10);
        ctx.quadraticCurveTo(x + i * 9 + sway, y + 20, x + i * 9 - sway, y + 28);
        ctx.stroke();
      }
      // gözler
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x - 8, y - 6, 6, 0, Math.PI * 2);
      ctx.arc(x + 8, y - 6, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(x - 8, y - 5, 3, 0, Math.PI * 2);
      ctx.arc(x + 8, y - 5, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawHUD() {
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#ffd54a';
    ctx.font = 'bold 26px sans-serif';
    ctx.fillText(score, 118, 14);
    ctx.fillStyle = '#b0a0ff';
    ctx.font = '15px sans-serif';
    ctx.fillText('Dalga: ' + wave + '   Rekor: ' + best, 118, 46);
    for (let i = 0; i < lives; i++) {
      drawHeart(W - 26 - i * 30, 28, 12);
    }
  }

  function drawCenteredPanel(lines) {
    ctx.fillStyle = 'rgba(8, 8, 28, 0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    let y = H * 0.28;
    for (const [text, size, color] of lines) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.fillText(text, W / 2, y);
      y += size * 1.6;
    }
  }

  // ---- Ana döngü ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);

    ctx.clearRect(0, 0, W, H);

    // yıldızlar
    for (const st of stars) {
      ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + st.s * 0.3) + ')';
      ctx.fillRect(st.x, st.y, st.r, st.r);
    }

    // lazerler
    for (const lz of lasers) {
      ctx.fillStyle = '#7fff9e';
      ctx.shadowColor = '#7fff9e';
      ctx.shadowBlur = 8;
      ctx.fillRect(lz.x - 2, lz.y - 12, 4, 16);
      ctx.shadowBlur = 0;
    }
    // düşman mermileri
    for (const b of bullets) {
      ctx.fillStyle = '#ff5060';
      ctx.shadowColor = '#ff5060';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    if (state !== STATE.MENU) {
      for (const en of enemies) drawEnemy(en);
      drawShip();
    }

    // parçacıklar
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / 0.8);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2.5, p.y - 2.5, 5, 5);
    }
    ctx.globalAlpha = 1;

    for (const f of floaters) {
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = f.color;
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    if (state !== STATE.MENU) drawHUD();

    // hasar flaşı
    if (flashTimer > 0) {
      ctx.fillStyle = 'rgba(255, 40, 20, ' + (flashTimer * 0.7) + ')';
      ctx.fillRect(0, 0, W, H);
    }

    // dalga duyurusu
    if (state === STATE.PLAYING && !paused && waveT > 0) {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha = Math.min(1, waveT);
      ctx.fillStyle = '#b0a0ff';
      ctx.font = 'bold 44px sans-serif';
      ctx.fillText('DALGA ' + wave, W / 2, H * 0.35);
      ctx.globalAlpha = 1;
    }

    if (state === STATE.MENU) {
      drawCenteredPanel([
        ['UZAY SAVAŞI', 46, '#b0a0ff'],
        ['', 12, '#fff'],
        ['Uzaylı istilasını durdur!', 20, '#ddd'],
        ['Gemin kendiliğinden ateş eder', 16, '#aaa'],
        ['UFO +10 · Mor uzaylı +25 puan', 16, '#aaa'],
        ['Uzaylılara ve mermilere çarpma!', 16, '#ff8080'],
        ['Ok tuşları / WASD veya parmağınla sürükle', 16, '#aaa'],
        ['Başlamak için tıkla veya SPACE', 20, '#ffd54a'],
      ]);
    } else if (paused && state === STATE.PLAYING) {
      drawCenteredPanel([
        ['DURAKLATILDI', 40, '#ffd54a'],
        ['', 10, '#fff'],
        ['Devam etmek için Ayarlar > Başlat', 18, '#ddd'],
      ]);
    } else if (state === STATE.OVER) {
      drawCenteredPanel([
        ['OYUN BİTTİ', 44, '#ff6b6b'],
        ['Skorun: ' + score, 30, '#ffd54a'],
        ['Dalga: ' + wave, 22, '#b0a0ff'],
        [score >= best && score > 0 ? '★ YENİ REKOR! ★' : 'Rekor: ' + best, 24, '#7fff9e'],
        ['', 10, '#fff'],
        ['Tekrar savaşmak için tıkla veya SPACE', 19, '#ddd'],
      ]);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
