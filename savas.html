<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Savaş Pilotu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #1a2318;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(180, 220, 140, 0.25);
    max-width: 100vw;
    max-height: 100vh;
  }

  #back {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: #c8e0a8;
    background: rgba(20, 28, 16, 0.75);
    border: 1px solid rgba(200, 224, 168, 0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    text-decoration: none;
  }

  /* Ayarlar menüsü */
  #settings {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  #settings button {
    border: 2px solid rgba(200, 224, 168, 0.5);
    background: rgba(20, 28, 16, 0.85);
    color: #c8e0a8;
    border-radius: 999px;
    font-size: 16px;
    padding: 10px 18px;
    -webkit-tap-highlight-color: transparent;
  }
  #gear {
    width: 46px;
    height: 46px;
    padding: 0 !important;
    font-size: 24px;
    border-radius: 50% !important;
  }
  #menu { display: flex; flex-direction: column; gap: 8px; }
  #menu.hidden { display: none; }
</style>
</head>
<body>
<a id="back" href="index.html">← Oyunlar</a>
<div id="settings">
  <button id="gear" aria-label="Ayarlar">⚙</button>
  <div id="menu" class="hidden">
    <button id="btnPause">⏸ Durdur</button>
    <button id="btnStart">▶ Başlat</button>
    <button id="btnExit">✕ Çık</button>
  </div>
</div>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const HORIZON = 240;
  const SIDE = 300;
  const ALT = 300;

  function fit() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  addEventListener('resize', fit);
  fit();

  // ---- Oyun durumu ----
  const STATE = { MENU: 0, PLAYING: 1, OVER: 2 };
  let state = STATE.MENU;
  let paused = false;

  let distance, playerX, playerH, speed, elapsed;
  let enemies, myBullets, foeBullets, particles, floaters, trees;
  let spawnT, fireT, lives, score, invTimer, flashTimer, nextTreeZ;
  let best = +(localStorage.getItem('savas-best') || 0);

  function resetWorld() {
    distance = 0; playerX = 0; playerH = 0.8; speed = 20; elapsed = 0;
    enemies = []; myBullets = []; foeBullets = []; particles = []; floaters = []; trees = [];
    spawnT = 1.2; fireT = 0; lives = 3; score = 0;
    invTimer = 0; flashTimer = 0; nextTreeZ = 3;
    while (nextTreeZ < 45) spawnTree();
  }
  function spawnTree() {
    trees.push({
      z: nextTreeZ,
      x: (Math.random() < 0.5 ? -1 : 1) * (0.5 + Math.random() * 1.4),
      s: 0.7 + Math.random() * 0.6,
    });
    nextTreeZ += 2.5 + Math.random() * 3;
  }

  resetWorld();

  function startGame() {
    resetWorld();
    state = STATE.PLAYING;
    paused = false;
    sndStart();
  }

  function gameOver() {
    state = STATE.OVER;
    sndOver();
    if (score > best) {
      best = score;
      localStorage.setItem('savas-best', best);
    }
  }

  // ---- Sesler ----
  let audioCtx = null;
  function getAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    } catch (e) { return null; }
  }
  function beep(freq, dur, type = 'sine', vol = 0.15, delay = 0, slide = 0) {
    const ac = getAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ac.destination);
    o.start(t0);
    o.stop(t0 + dur);
  }
  const sndStart = () => { beep(90, 0.5, 'sawtooth', 0.14); beep(140, 0.4, 'sawtooth', 0.12, 0.4); };
  const sndGun = () => beep(950, 0.05, 'square', 0.03, 0, 500);
  const sndBoom = () => { beep(170, 0.28, 'sawtooth', 0.16, 0, 40); beep(85, 0.35, 'square', 0.12, 0.04, 30); };
  const sndHit = () => beep(140, 0.3, 'sawtooth', 0.2, 0, 50);
  const sndOver = () => { beep(330, 0.25, 'square', 0.1); beep(220, 0.4, 'square', 0.1, 0.2); };

  // ---- Girdi ----
  const keys = {};
  addEventListener('keydown', e => {
    if (state !== STATE.PLAYING && (e.key === ' ' || e.key === 'Enter')) { startGame(); e.preventDefault(); return; }
    keys[e.key] = true;
    if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
  });
  addEventListener('keyup', e => keys[e.key] = false);

  let pointerX = null, pointerY = null;
  function pointerPos(e) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) / r.width * W,
      y: (e.clientY - r.top) / r.height * H,
    };
  }
  canvas.addEventListener('pointerdown', e => {
    if (state !== STATE.PLAYING) { startGame(); return; }
    const p = pointerPos(e);
    pointerX = p.x; pointerY = p.y;
  });
  canvas.addEventListener('pointermove', e => {
    if (pointerX !== null) {
      const p = pointerPos(e);
      pointerX = p.x; pointerY = p.y;
    }
  });
  addEventListener('pointerup', () => { pointerX = null; pointerY = null; });

  // Ayarlar menüsü
  const menuEl = document.getElementById('menu');
  document.getElementById('gear').addEventListener('click', () => {
    menuEl.classList.toggle('hidden');
  });
  document.getElementById('btnPause').addEventListener('click', () => {
    if (state === STATE.PLAYING) paused = true;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnStart').addEventListener('click', () => {
    if (state !== STATE.PLAYING) startGame();
    paused = false;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnExit').addEventListener('click', () => {
    location.href = 'index.html';
  });

  const planeScreen = () => ({
    x: W / 2 + playerX * 26,
    y: H - 150 - (playerH - 0.8) * 190,
  });

  // ---- Güncelleme ----
  let steerX = 0, steerY = 0;
  function update(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 220 * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = floaters.length - 1; i >= 0; i--) {
      floaters[i].y -= 45 * dt;
      floaters[i].life -= dt;
      if (floaters[i].life <= 0) floaters.splice(i, 1);
    }

    if (state !== STATE.PLAYING || paused) return;
    elapsed += dt;

    // Hareket: 4 yön
    let dx = 0, dy = 0;
    if (pointerX !== null) {
      const ps = planeScreen();
      const diffX = pointerX - ps.x;
      const diffY = (pointerY - 40) - ps.y;
      dx = Math.abs(diffX) > 10 ? Math.sign(diffX) * Math.min(1, Math.abs(diffX) / 50) : 0;
      dy = Math.abs(diffY) > 10 ? Math.sign(diffY) * Math.min(1, Math.abs(diffY) / 50) : 0;
    } else {
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
      if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
      if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;
    }
    steerX += (dx - steerX) * dt * 6;
    steerY += (dy - steerY) * dt * 6;
    playerX += dx * 1.9 * dt;
    playerH -= dy * 1.3 * dt;
    playerX = Math.max(-1.25, Math.min(1.25, playerX));
    playerH = Math.max(0.25, Math.min(1.45, playerH));

    distance += speed * dt;

    // Ağaçlar
    while (nextTreeZ < distance + 45) spawnTree();
    trees = trees.filter(s => s.z - distance + 1 > 0.5);

    // Makineli tüfek: otomatik ateş
    fireT -= dt;
    if (fireT <= 0) {
      const gunSide = (myBullets.length % 2) ? -0.07 : 0.07;
      myBullets.push({ z: distance + 1.4, x: playerX + gunSide, h: playerH });
      sndGun();
      fireT = 0.13;
    }
    for (let i = myBullets.length - 1; i >= 0; i--) {
      myBullets[i].z += 55 * dt;
      if (myBullets[i].z - distance > 30) myBullets.splice(i, 1);
    }

    // Düşman üretimi: zamanla sıklaşır
    spawnT -= dt;
    if (spawnT <= 0) {
      const fast = elapsed > 40 && Math.random() < 0.35;
      enemies.push({
        z: distance + 38,
        x: (Math.random() * 2 - 1) * 1.05,
        h: 0.35 + Math.random() * 1.0,
        closing: (fast ? 14 : 8) + Math.random() * 5,
        weave: Math.random() < 0.4 ? 0.5 + Math.random() * 0.5 : 0,
        phase: Math.random() * Math.PI * 2,
        fast,
        fireT: 1.2 + Math.random() * 2,
        hp: 1,
      });
      spawnT = Math.max(0.7, 2.0 - elapsed * 0.02);
    }

    // Düşmanlar: bizimle uçar, yavaşça üstümüze gelirler (it dalaşı hissi)
    for (let i = enemies.length - 1; i >= 0; i--) {
      const en = enemies[i];
      en.z += (speed - en.closing) * dt;
      en.phase += dt * 3;
      if (en.weave) {
        en.x += Math.sin(en.phase) * en.weave * dt;
        en.x = Math.max(-1.2, Math.min(1.2, en.x));
      }
      const zRel = en.z - distance + 1;

      // ateş: yaklaşırken oyuncuya nişan alır
      if (zRel > 5 && zRel < 22) {
        en.fireT -= dt;
        if (en.fireT <= 0) {
          const tt = zRel / 26;  // merminin varış süresi tahmini
          foeBullets.push({
            z: en.z - 1,
            x: en.x,
            h: en.h,
            vx: (playerX - en.x) / tt,
            vh: (playerH - en.h) / tt,
          });
          en.fireT = Math.max(1.2, 2.6 - elapsed * 0.015) + Math.random() * 1.4;
        }
      }

      // oyuncuyla çarpışma
      if (zRel < 1.15 && zRel > 0.8 &&
          Math.abs(en.x - playerX) < 0.28 && Math.abs(en.h - playerH) < 0.24) {
        enemies.splice(i, 1);
        boomAt(en.x, en.h, en.z, '#ff8050');
        hurtPlayer();
        continue;
      }
      if (zRel < 0.5) { enemies.splice(i, 1); continue; }

      // mermilerimizle vurulma
      for (let j = myBullets.length - 1; j >= 0; j--) {
        const b = myBullets[j];
        if (Math.abs(b.z - en.z) < 1.6 &&
            Math.abs(b.x - en.x) < 0.24 && Math.abs(b.h - en.h) < 0.22) {
          myBullets.splice(j, 1);
          en.hp--;
          if (en.hp <= 0) {
            const pts = en.fast ? 30 : 20;
            score += pts;
            addFloaterAt(en.x, en.h, en.z, '+' + pts);
            boomAt(en.x, en.h, en.z, en.fast ? '#ff6b5e' : '#ffb020');
            sndBoom();
            enemies.splice(i, 1);
          }
          break;
        }
      }
    }

    // Düşman mermileri
    for (let i = foeBullets.length - 1; i >= 0; i--) {
      const b = foeBullets[i];
      b.z += (speed - 26) * dt;
      b.x += b.vx * dt;
      b.h += b.vh * dt;
      const zRel = b.z - distance + 1;
      if (zRel < 1.1 && zRel > 0.85 &&
          Math.abs(b.x - playerX) < 0.17 && Math.abs(b.h - playerH) < 0.15) {
        foeBullets.splice(i, 1);
        hurtPlayer();
        continue;
      }
      if (zRel < 0.4) foeBullets.splice(i, 1);
    }

    if (invTimer > 0) invTimer -= dt;
    if (flashTimer > 0) flashTimer -= dt;
  }

  function hurtPlayer() {
    if (invTimer > 0) return;
    lives--;
    invTimer = 2;
    flashTimer = 0.35;
    const ps = planeScreen();
    for (let i = 0; i < 20; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 60 + Math.random() * 200;
      particles.push({ x: ps.x, y: ps.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.5, color: '#ff5030' });
    }
    sndHit();
    if (lives <= 0) gameOver();
  }

  // ---- Çizim yardımcıları ----
  const rowCenter = f => W / 2 - playerX * SIDE * f;
  const flyY = (f, h) => HORIZON + f * (H - HORIZON) - h * ALT * f;

  function screenOf(z, x, h) {
    const zRel = z - distance + 1;
    if (zRel < 0.4) return null;
    const f = 1 / zRel;
    if (f > 1.2 || f < 0.02) return null;
    const fc = Math.min(f, 1.2);
    return {
      f: fc,
      x: rowCenter(fc) + x * SIDE * fc,
      y: flyY(fc, h),
      gy: HORIZON + fc * (H - HORIZON),
    };
  }

  function boomAt(x, h, z, color) {
    const p = screenOf(z, x, h);
    if (!p) return;
    for (let i = 0; i < 18; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 50 + Math.random() * 180;
      particles.push({ x: p.x, y: p.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.5 + Math.random() * 0.3, color });
    }
  }
  function addFloaterAt(x, h, z, text) {
    const p = screenOf(z, x, h);
    if (!p) return;
    floaters.push({ x: p.x, y: p.y, text, life: 1 });
  }

  function drawHeart(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#ff5d8f';
    ctx.beginPath();
    ctx.moveTo(0, r * 0.9);
    ctx.bezierCurveTo(-r * 1.4, -r * 0.2, -r * 0.6, -r * 1.1, 0, -r * 0.3);
    ctx.bezierCurveTo(r * 0.6, -r * 1.1, r * 1.4, -r * 0.2, 0, r * 0.9);
    ctx.fill();
    ctx.restore();
  }

  function drawSky() {
    const t = performance.now() / 1000;
    const g = ctx.createLinearGradient(0, 0, 0, HORIZON);
    g.addColorStop(0, '#5b8fc4');
    g.addColorStop(1, '#cfe0ee');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, HORIZON);
    ctx.beginPath();
    ctx.arc(W * 0.78, 60, 28, 0, Math.PI * 2);
    ctx.fillStyle = '#ffe89a';
    ctx.fill();
    ctx.fillStyle = '#7b93a8';
    for (const [mx, mw, mh] of [[-60, 280, 90], [160, 320, 120], [360, 260, 85]]) {
      ctx.beginPath();
      ctx.moveTo(mx, HORIZON);
      ctx.lineTo(mx + mw / 2, HORIZON - mh);
      ctx.lineTo(mx + mw, HORIZON);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (const [bx, by, br] of [[90, 100, 20], [280, 70, 24], [430, 120, 17]]) {
      const x = (bx + t * 5) % (W + 70) - 35;
      ctx.beginPath();
      ctx.ellipse(x, by, br * 1.7, br * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawGround() {
    for (let sy = HORIZON; sy < H; sy++) {
      const f = (sy - HORIZON) / (H - HORIZON);
      const z = distance + 1 / Math.max(f, 0.02);
      const band = Math.floor(z * 1.3) % 2;
      ctx.fillStyle = band ? '#4f8a52' : '#478048';
      ctx.fillRect(0, sy, W, 1);
    }
  }

  function drawTree(x, y, sc, k) {
    ctx.fillStyle = '#6b4a26';
    ctx.fillRect(x - 5 * sc * k, y - 30 * sc * k, 10 * sc * k, 30 * sc * k);
    for (let i = 0; i < 2; i++) {
      const ty = y - 26 * sc * k - i * 24 * sc * k;
      const tw = (46 - i * 12) * sc * k;
      ctx.fillStyle = i % 2 ? '#1f6b35' : '#2a7e41';
      ctx.beginPath();
      ctx.moveTo(x - tw, ty);
      ctx.lineTo(x, ty - 40 * sc * k);
      ctx.lineTo(x + tw, ty);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawEnemyJet(en, x, y, sc) {
    // önden görünen düşman jeti
    const col = en.fast ? '#a83232' : '#5a6472';
    const wing = en.fast ? '#8a2828' : '#485260';
    ctx.save();
    ctx.translate(x, y);
    // kanatlar
    ctx.fillStyle = wing;
    ctx.beginPath();
    ctx.moveTo(-64 * sc, 4 * sc);
    ctx.lineTo(-8 * sc, -3 * sc);
    ctx.lineTo(8 * sc, -3 * sc);
    ctx.lineTo(64 * sc, 4 * sc);
    ctx.lineTo(58 * sc, 9 * sc);
    ctx.lineTo(-58 * sc, 9 * sc);
    ctx.closePath();
    ctx.fill();
    // gövde + burun
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.ellipse(0, 0, 12 * sc, 16 * sc, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2e343c';
    ctx.beginPath();
    ctx.arc(0, 2 * sc, 6 * sc, 0, Math.PI * 2);
    ctx.fill();
    // kuyruk
    ctx.fillStyle = col;
    ctx.fillRect(-3 * sc, -22 * sc, 6 * sc, 12 * sc);
    // kanopi parıltısı
    ctx.fillStyle = 'rgba(140, 200, 255, 0.8)';
    ctx.beginPath();
    ctx.ellipse(0, -8 * sc, 5 * sc, 4 * sc, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawPlayerJet() {
    const t = performance.now() / 1000;
    const ps = planeScreen();
    const x = ps.x, y = ps.y + Math.sin(t * 2.4) * 2;
    const bank = steerX * 0.4;

    // gölge
    const shScale = 1.15 - playerH * 0.45;
    ctx.fillStyle = 'rgba(0,0,0,' + Math.max(0.05, 0.3 - playerH * 0.14) + ')';
    ctx.beginPath();
    ctx.ellipse(x, H - 24, 60 * shScale, 8 * shScale, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(bank);
    if (invTimer > 0 && Math.floor(invTimer * 8) % 2 === 0) ctx.globalAlpha = 0.45;

    // art yakıcı alevleri
    const fl = 16 + Math.sin(t * 35) * 6;
    for (const s of [-8, 8]) {
      ctx.fillStyle = '#4fc9f0';
      ctx.beginPath();
      ctx.moveTo(s - 5, 24);
      ctx.lineTo(s, 24 + fl);
      ctx.lineTo(s + 5, 24);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffe89a';
      ctx.beginPath();
      ctx.moveTo(s - 2.5, 24);
      ctx.lineTo(s, 24 + fl * 0.55);
      ctx.lineTo(s + 2.5, 24);
      ctx.closePath();
      ctx.fill();
    }

    // delta kanatlar (kamuflaj yeşili)
    const wg = ctx.createLinearGradient(-100, 0, 100, 0);
    wg.addColorStop(0, '#4a5d3a');
    wg.addColorStop(0.5, '#66804e');
    wg.addColorStop(1, '#4a5d3a');
    ctx.fillStyle = wg;
    ctx.beginPath();
    ctx.moveTo(-100, 20 + steerY * 6);
    ctx.lineTo(-10, -16);
    ctx.lineTo(10, -16);
    ctx.lineTo(100, 20 + steerY * 6);
    ctx.lineTo(92, 28 + steerY * 6);
    ctx.lineTo(-92, 28 + steerY * 6);
    ctx.closePath();
    ctx.fill();
    // kanat altı füzeler
    ctx.fillStyle = '#c8d2dc';
    for (const s of [-58, -34, 34, 58]) {
      ctx.fillRect(s - 3, 16 + steerY * 5, 6, 16);
      ctx.fillStyle = '#d64545';
      ctx.beginPath();
      ctx.moveTo(s - 3, 16 + steerY * 5);
      ctx.lineTo(s, 10 + steerY * 5);
      ctx.lineTo(s + 3, 16 + steerY * 5);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#c8d2dc';
    }

    // gövde
    const bg = ctx.createLinearGradient(-14, 0, 14, 0);
    bg.addColorStop(0, '#5a6d48');
    bg.addColorStop(0.5, '#7d9663');
    bg.addColorStop(1, '#4e5f3e');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.ellipse(0, 2, 14, 26, 0, 0, Math.PI * 2);
    ctx.fill();

    // çift dikey kuyruk
    ctx.fillStyle = '#556747';
    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(s * 8, -8);
      ctx.lineTo(s * 16, -44 - steerY * 5);
      ctx.lineTo(s * 22, -40 - steerY * 5);
      ctx.lineTo(s * 14, -6);
      ctx.closePath();
      ctx.fill();
    }
    // kuyruk işareti
    ctx.fillStyle = '#ffd54a';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('T', 18, -38 - steerY * 5);

    // kokpit
    ctx.fillStyle = '#4fc9f0';
    ctx.beginPath();
    ctx.ellipse(0, -14, 7, 10, 0, Math.PI, 0);
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(20, 28, 16, 0.55)';
    ctx.fillRect(0, 0, W, 58);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd54a';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText(score, 118, 22);
    ctx.fillStyle = '#c8e0a8';
    ctx.font = '15px sans-serif';
    ctx.fillText('Rekor: ' + best, 118, 45);
    for (let i = 0; i < lives; i++) {
      drawHeart(W - 82 - i * 30, 26, 12);
    }
  }

  function drawCenteredPanel(lines) {
    ctx.fillStyle = 'rgba(14, 20, 10, 0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    let y = H * 0.28;
    for (const [text, size, color] of lines) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.fillText(text, W / 2, y);
      y += size * 1.6;
    }
  }

  // ---- Ana döngü ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);

    drawSky();
    drawGround();

    // ağaçlar
    for (const s of [...trees].sort((a, b) => b.z - a.z)) {
      const p = screenOf(s.z, s.x, 0);
      if (p) drawTree(p.x, p.gy, p.f, s.s);
    }

    // düşmanlar (uzak önce)
    for (const en of [...enemies].sort((a, b) => b.z - a.z)) {
      const p = screenOf(en.z, en.x, en.h);
      if (p) drawEnemyJet(en, p.x, p.y, p.f);
    }

    // mermiler
    for (const b of myBullets) {
      const p = screenOf(b.z, b.x, b.h);
      if (!p) continue;
      ctx.fillStyle = '#ffe060';
      ctx.shadowColor = '#ffe060';
      ctx.shadowBlur = 6;
      ctx.fillRect(p.x - 2, p.y - 8 * p.f, 4, 16 * p.f);
      ctx.shadowBlur = 0;
    }
    for (const b of foeBullets) {
      const p = screenOf(b.z, b.x, b.h);
      if (!p) continue;
      ctx.fillStyle = '#ff5040';
      ctx.shadowColor = '#ff5040';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(2.5, 5 * p.f), 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    drawPlayerJet();

    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / 0.8);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2.5, p.y - 2.5, 5, 5);
    }
    ctx.globalAlpha = 1;

    for (const f of floaters) {
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = '#ffd54a';
      ctx.font = 'bold 20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    if (state !== STATE.MENU) drawHUD();

    if (flashTimer > 0) {
      ctx.fillStyle = 'rgba(255, 40, 20, ' + (flashTimer * 0.7) + ')';
      ctx.fillRect(0, 0, W, H);
    }

    if (state === STATE.MENU) {
      drawCenteredPanel([
        ['SAVAŞ PİLOTU', 44, '#c8e0a8'],
        ['', 12, '#fff'],
        ['Düşman jetleri karşıdan geliyor!', 18, '#ddd'],
        ['Makineli tüfeğin kendiliğinden ateş eder', 15, '#aaa'],
        ['Nişan almak için jetle hizalan', 15, '#aaa'],
        ['Gri jet +20 · Kırmızı hızlı jet +30', 15, '#ffb020'],
        ['Kızıl mermilerden ve jetlerden kaç!', 15, '#ff6b5e'],
        ['Ok tuşları / WASD veya parmağınla sürükle', 15, '#aaa'],
        ['Başlamak için tıkla veya SPACE', 19, '#ffd54a'],
      ]);
    } else if (paused && state === STATE.PLAYING) {
      drawCenteredPanel([
        ['DURAKLATILDI', 40, '#ffd54a'],
        ['', 10, '#fff'],
        ['Devam etmek için Ayarlar > Başlat', 18, '#ddd'],
      ]);
    } else if (state === STATE.OVER) {
      drawCenteredPanel([
        ['VURULDUN!', 46, '#ff4030'],
        ['Skorun: ' + score, 30, '#ffd54a'],
        [score >= best && score > 0 ? '★ YENİ REKOR! ★' : 'Rekor: ' + best, 24, '#7fff9e'],
        ['', 10, '#fff'],
        ['Tekrar savaşmak için tıkla veya SPACE', 19, '#ddd'],
      ]);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
