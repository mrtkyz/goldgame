<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gold Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #1a1033;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game {
    display: block;
    background: linear-gradient(#3b2a6e 0%, #1a1033 70%, #2a1a4a 100%);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(255, 200, 50, 0.25);
    max-width: 100vw;
    max-height: 100vh;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Canvas'ı ekrana sığdır (oranı koruyarak)
  function fit() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  addEventListener('resize', fit);
  fit();

  // ---- Oyun durumu ----
  const STATE = { MENU: 0, PLAYING: 1, OVER: 2 };
  let state = STATE.MENU;

  let score = 0;
  let lives = 3;
  let level = 1;
  let best = +(localStorage.getItem('goldgame-best') || 0);

  const player = { x: W / 2, y: H - 80, w: 90, h: 60, speed: 420, vx: 0 };
  let items = [];        // düşen nesneler
  let sparkles = [];     // efekt parçacıkları
  let floaters = [];     // "+10" yazıları
  let spawnTimer = 0;
  let elapsed = 0;

  // ---- Girdi ----
  const keys = {};
  addEventListener('keydown', e => {
    keys[e.key] = true;
    if ((state === STATE.MENU || state === STATE.OVER) &&
        (e.key === ' ' || e.key === 'Enter')) startGame();
    if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
  });
  addEventListener('keyup', e => keys[e.key] = false);

  // Dokunmatik / fare: parmağın olduğu yere doğru git (her yöne)
  let pointerX = null, pointerY = null;
  function pointerPos(e) {
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {
      x: (t.clientX - r.left) / r.width * W,
      y: (t.clientY - r.top) / r.height * H,
    };
  }
  canvas.addEventListener('pointerdown', e => {
    if (state !== STATE.PLAYING) { startGame(); return; }
    const p = pointerPos(e);
    pointerX = p.x; pointerY = p.y;
  });
  canvas.addEventListener('pointermove', e => {
    if (pointerX !== null) {
      const p = pointerPos(e);
      pointerX = p.x; pointerY = p.y;
    }
  });
  addEventListener('pointerup', () => { pointerX = null; pointerY = null; });

  // ---- Sesler (WebAudio ile sentezlenir, ses dosyası yok) ----
  let audioCtx = null;
  function getAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    } catch (e) { return null; }
  }
  function beep(freq, dur, type = 'sine', vol = 0.15) {
    const ac = getAudio();
    if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(g).connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + dur);
  }
  // Madeni para tınısı: inharmonik yüksek frekanslı kısa çınlama
  function coinClink(delay, vol) {
    const ac = getAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const partials = [[2510, 1], [3730, 0.55], [5280, 0.35], [6710, 0.2]];
    for (const [f, a] of partials) {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'sine';
      o.frequency.value = f * (0.98 + Math.random() * 0.04);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(vol * a, t0 + 0.004);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.12 + Math.random() * 0.06);
      o.connect(g).connect(ac.destination);
      o.start(t0);
      o.stop(t0 + 0.25);
    }
  }
  // Bozuk para düşme sesi: ilk çarpma + gittikçe sönen sekmeler
  const sndCoin = () => { coinClink(0, 0.22); coinClink(0.085, 0.12); coinClink(0.16, 0.06); };
  const sndGem  = () => { beep(660, 0.1, 'sine'); beep(990, 0.12, 'sine'); beep(1480, 0.2, 'sine', 0.12); };
  const sndBomb = () => beep(110, 0.4, 'sawtooth', 0.2);
  const sndOver = () => { beep(330, 0.25, 'square', 0.1); setTimeout(() => beep(220, 0.4, 'square', 0.1), 200); };

  // ---- Oyun akışı ----
  function startGame() {
    state = STATE.PLAYING;
    score = 0; lives = 3; level = 1;
    items = []; sparkles = []; floaters = [];
    spawnTimer = 0; elapsed = 0;
    player.x = W / 2;
    player.y = H - 80;
  }

  function gameOver() {
    state = STATE.OVER;
    sndOver();
    if (score > best) {
      best = score;
      localStorage.setItem('goldgame-best', best);
    }
  }

  // ---- Nesne üretimi ----
  function spawnItem() {
    // Seviye yükseldikçe bomba oranı artar, kalp nadirleşir
    const bombChance = Math.min(0.40, 0.16 + (level - 1) * 0.03);
    const heartChance = Math.max(0.03, 0.08 - (level - 1) * 0.005);
    const r = Math.random();
    let type;
    if (r < bombChance) type = 'bomb';                       // bomba: -1 can
    else if (r < bombChance + 0.10) type = 'gem';            // elmas: +50
    else if (r < bombChance + 0.10 + heartChance) type = 'heart'; // kalp: +1 can
    else type = 'coin';                                      // altın: +10
    if (type === 'heart' && lives >= 5) type = 'coin';

    items.push({
      type,
      x: 30 + Math.random() * (W - 60),
      y: -30,
      r: type === 'gem' ? 14 : 16,
      vy: (150 + Math.random() * 100) * (1 + (level - 1) * 0.22),
      spin: Math.random() * Math.PI * 2,
    });
  }

  function addSparkles(x, y, color, n = 12) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 60 + Math.random() * 180;
      sparkles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.6, color });
    }
  }

  function addFloater(x, y, text, color) {
    floaters.push({ x, y, text, color, life: 1 });
  }

  // ---- Güncelleme ----
  function update(dt) {
    if (state !== STATE.PLAYING) return;

    elapsed += dt;
    const newLevel = 1 + Math.floor(elapsed / 15);   // her 15 saniyede seviye artar
    if (newLevel > level) {
      level = newLevel;
      addFloater(W / 2, H / 2, 'SEVİYE ' + level + '!', '#7fff9e');
    }

    // Oyuncu hareketi: her yöne serbest
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;
    if (pointerX !== null) {
      const diffX = pointerX - player.x;
      const diffY = pointerY - player.y;
      dx = Math.abs(diffX) > 6 ? Math.sign(diffX) : 0;
      dy = Math.abs(diffY) > 6 ? Math.sign(diffY) : 0;
    }
    if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; } // çapraz hız sabit kalsın
    player.x += dx * player.speed * dt;
    player.y += dy * player.speed * dt;
    player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
    player.y = Math.max(80, Math.min(H - player.h - 10, player.y));

    // Nesne üret: seviye arttıkça daha sık
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnItem();
      spawnTimer = Math.max(0.15, 0.85 - level * 0.07);
    }

    // Nesneleri güncelle + çarpışma
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      it.y += it.vy * dt;
      it.spin += dt * 4;

      const caught =
        it.y > player.y - 10 && it.y < player.y + player.h &&
        Math.abs(it.x - player.x) < player.w / 2 + it.r - 4;

      if (caught) {
        if (it.type === 'coin') {
          score += 10; sndCoin();
          addSparkles(it.x, it.y, '#ffd54a');
          addFloater(it.x, it.y, '+10', '#ffd54a');
        } else if (it.type === 'gem') {
          score += 50; sndGem();
          addSparkles(it.x, it.y, '#6ee7ff', 18);
          addFloater(it.x, it.y, '+50', '#6ee7ff');
        } else if (it.type === 'heart') {
          lives = Math.min(5, lives + 1); sndGem();
          addSparkles(it.x, it.y, '#ff6b9d', 14);
          addFloater(it.x, it.y, '+1 CAN', '#ff6b9d');
        } else { // bomb
          lives--; sndBomb();
          addSparkles(it.x, it.y, '#ff5030', 20);
          addFloater(it.x, it.y, 'BOM!', '#ff5030');
          if (lives <= 0) { items.splice(i, 1); gameOver(); return; }
        }
        items.splice(i, 1);
        continue;
      }

      if (it.y > H + 40) items.splice(i, 1);
    }

    // Efektler
    for (let i = sparkles.length - 1; i >= 0; i--) {
      const p = sparkles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 500 * dt;
      p.life -= dt;
      if (p.life <= 0) sparkles.splice(i, 1);
    }
    for (let i = floaters.length - 1; i >= 0; i--) {
      const f = floaters[i];
      f.y -= 50 * dt;
      f.life -= dt;
      if (f.life <= 0) floaters.splice(i, 1);
    }
  }

  // ---- Çizim ----
  function drawCoin(x, y, r, spin) {
    const squash = Math.abs(Math.cos(spin));
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(Math.max(0.25, squash), 1);
    ctx.fillStyle = '#ffc93c';
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#e6a817'; ctx.lineWidth = 3; ctx.stroke();
    ctx.fillStyle = '#e6a817';
    ctx.font = 'bold ' + r + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('₺', 0, 1);
    ctx.restore();
  }

  function drawGem(x, y, r, spin) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.sin(spin) * 0.25);
    const w = r * 1.15, top = -r * 0.75, mid = -r * 0.1, bot = r * 1.05;

    // pırlanta kesimi dış hat: tabla + omuzlar + sivri alt uç
    const body = () => {
      ctx.beginPath();
      ctx.moveTo(-w * 0.55, top);
      ctx.lineTo(w * 0.55, top);
      ctx.lineTo(w, mid);
      ctx.lineTo(0, bot);
      ctx.lineTo(-w, mid);
      ctx.closePath();
    };
    const g = ctx.createLinearGradient(-w, top, w, bot);
    g.addColorStop(0, '#c9f6ff');
    g.addColorStop(0.45, '#4fd0f7');
    g.addColorStop(1, '#1272b8');
    body();
    ctx.fillStyle = g;
    ctx.fill();

    // alt kısım (pavyon) biraz daha koyu dursun
    ctx.beginPath();
    ctx.moveTo(-w, mid); ctx.lineTo(w, mid); ctx.lineTo(0, bot); ctx.closePath();
    ctx.fillStyle = 'rgba(10, 70, 140, 0.35)';
    ctx.fill();

    // faset çizgileri
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-w, mid); ctx.lineTo(w, mid);                       // kuşak
    ctx.moveTo(-w * 0.55, top); ctx.lineTo(-w * 0.3, mid); ctx.lineTo(0, bot); // sol fasetler
    ctx.moveTo(w * 0.55, top); ctx.lineTo(w * 0.3, mid); ctx.lineTo(0, bot);   // sağ fasetler
    ctx.moveTo(-w * 0.3, mid); ctx.lineTo(0, top);                 // tablaya bağlantı
    ctx.moveTo(w * 0.3, mid); ctx.lineTo(0, top);
    ctx.stroke();

    // dış hat
    body();
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // parıltı: dönüşle yanıp sönen küçük yıldız
    const tw = 0.55 + 0.45 * Math.sin(spin * 3);
    ctx.globalAlpha = tw;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    const sx = -w * 0.35, sy = top + r * 0.25, sr = r * 0.28;
    ctx.moveTo(sx, sy - sr); ctx.quadraticCurveTo(sx, sy, sx + sr, sy);
    ctx.quadraticCurveTo(sx, sy, sx, sy + sr);
    ctx.quadraticCurveTo(sx, sy, sx - sr, sy);
    ctx.quadraticCurveTo(sx, sy, sx, sy - sr);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawHeart(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#ff5d8f';
    ctx.beginPath();
    ctx.moveTo(0, r * 0.9);
    ctx.bezierCurveTo(-r * 1.4, -r * 0.2, -r * 0.6, -r * 1.1, 0, -r * 0.3);
    ctx.bezierCurveTo(r * 0.6, -r * 1.1, r * 1.4, -r * 0.2, 0, r * 0.9);
    ctx.fill();
    ctx.restore();
  }

  function drawBomb(x, y, r, spin) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#2b2b34';
    ctx.beginPath(); ctx.arc(0, 2, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.stroke();
    // fitil
    ctx.strokeStyle = '#b98a4a'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(4, -r + 4); ctx.quadraticCurveTo(12, -r - 6, 8, -r - 12); ctx.stroke();
    // kıvılcım
    const s = 3 + Math.sin(spin * 6) * 2;
    ctx.fillStyle = '#ffb020';
    ctx.beginPath(); ctx.arc(8, -r - 12, s, 0, Math.PI * 2); ctx.fill();
    // parlama
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.25, r * 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawPlayer() {
    const { x, y, w, h } = player;
    ctx.save();
    ctx.translate(x, y);

    // altına düşen yumuşak gölge
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath();
    ctx.ellipse(0, h + 7, w * 0.42, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // seramik çanak gövdesi: soldan sağa ışık gradyanı
    const g = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
    g.addColorStop(0, '#5b3a16');
    g.addColorStop(0.3, '#a9743a');
    g.addColorStop(0.5, '#c8955a');
    g.addColorStop(0.75, '#8d5a2b');
    g.addColorStop(1, '#5b3a16');
    ctx.beginPath();
    ctx.moveTo(-w / 2, 4);
    ctx.bezierCurveTo(-w / 2 - 5, h * 0.8, -w * 0.28, h, 0, h);
    ctx.bezierCurveTo(w * 0.28, h, w / 2 + 5, h * 0.8, w / 2, 4);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = '#3f2609';
    ctx.lineWidth = 2;
    ctx.stroke();

    // gövdedeki süs şeridi
    ctx.strokeStyle = 'rgba(255, 216, 120, 0.45)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(0, h * 0.42, w * 0.44, h * 0.2, 0, Math.PI * 0.12, Math.PI * 0.88);
    ctx.stroke();

    // dikey ışık yansıması
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.ellipse(-w * 0.27, h * 0.42, w * 0.07, h * 0.3, -0.25, 0, Math.PI * 2);
    ctx.fill();

    // ağız: dış halka (kalın kenarlı seramik)
    const rimG = ctx.createLinearGradient(0, -9, 0, 13);
    rimG.addColorStop(0, '#dca763');
    rimG.addColorStop(1, '#6b4519');
    ctx.beginPath();
    ctx.ellipse(0, 2, w / 2, 11, 0, 0, Math.PI * 2);
    ctx.fillStyle = rimG;
    ctx.fill();
    ctx.strokeStyle = '#3f2609';
    ctx.lineWidth = 2;
    ctx.stroke();

    // iç boşluk (karanlık)
    ctx.beginPath();
    ctx.ellipse(0, 3, w / 2 - 7, 7.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#2c1b09';
    ctx.fill();

    // içindeki altın yığını: tek tek parlayan tümsekler
    const piles = [[-w * 0.22, 4, 7], [w * 0.2, 4, 7], [-w * 0.08, 5, 6], [w * 0.09, 5, 6], [0, 3, 8]];
    for (const [ox, oy, orr] of piles) {
      const cg = ctx.createRadialGradient(ox - 2, oy - 2, 1, ox, oy, orr);
      cg.addColorStop(0, '#ffe89a');
      cg.addColorStop(1, '#cf941c');
      ctx.beginPath();
      ctx.ellipse(ox, oy, orr, orr * 0.5, 0, 0, Math.PI * 2);
      ctx.fillStyle = cg;
      ctx.fill();
    }
    ctx.restore();
  }

  function drawHUD() {
    // Skor: emoji yerine çizilmiş altın (bazı telefonlar canvas'ta emoji gösteremiyor)
    drawCoin(30, 28, 13, 0);
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd54a';
    ctx.font = 'bold 26px sans-serif';
    ctx.fillText(String(score), 50, 29);
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#bbb';
    ctx.font = '15px sans-serif';
    ctx.fillText('Rekor: ' + best + '   Seviye: ' + level, 16, 46);
    // Canlar: emoji yerine çizilmiş kalpler
    for (let i = 0; i < lives; i++) {
      drawHeart(W - 26 - i * 30, 28, 12);
    }
  }

  function drawCenteredPanel(lines) {
    ctx.fillStyle = 'rgba(10, 5, 30, 0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    let y = H * 0.30;
    for (const [text, size, color] of lines) {
      if (text === '@coin') {
        drawCoin(W / 2, y - size * 0.3, size * 0.5, 0);
        y += size * 1.6;
        continue;
      }
      ctx.fillStyle = color;
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.fillText(text, W / 2, y);
      y += size * 1.6;
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // arka plan yıldızları
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i = 0; i < 40; i++) {
      const sx = (i * 137.5) % W;
      const sy = (i * 89.3 + performance.now() * 0.01 * ((i % 3) + 1)) % H;
      ctx.fillRect(sx, sy, 2, 2);
    }

    for (const it of items) {
      if (it.type === 'coin') drawCoin(it.x, it.y, it.r, it.spin);
      else if (it.type === 'gem') drawGem(it.x, it.y, it.r, it.spin);
      else if (it.type === 'heart') drawHeart(it.x, it.y, it.r);
      else drawBomb(it.x, it.y, it.r, it.spin);
    }

    for (const p of sparkles) {
      ctx.globalAlpha = Math.max(0, p.life / 0.6);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;

    drawPlayer();

    for (const f of floaters) {
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = f.color;
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    drawHUD();

    if (state === STATE.MENU) {
      drawCenteredPanel([
        ['GOLD GAME', 48, '#ffd54a'],
        ['', 16, '#fff'],
        ['@coin', 60, '#fff'],
        ['Keseyi her yöne hareket ettirip altınları topla!', 18, '#ddd'],
        ['Elmas +50 · Kalp +1 can · Bombadan kaç!', 16, '#aaa'],
        ['Ok tuşları / WASD veya dokunarak oyna', 16, '#aaa'],
        ['Dikkat: oyun gittikçe hızlanır!', 16, '#ffb020'],
        ['Başlamak için tıkla veya SPACE', 20, '#7fff9e'],
      ]);
    } else if (state === STATE.OVER) {
      drawCenteredPanel([
        ['OYUN BİTTİ', 44, '#ff6b6b'],
        ['Skorun: ' + score, 30, '#ffd54a'],
        [score >= best && score > 0 ? '★ YENİ REKOR! ★' : 'Rekor: ' + best, 24, '#7fff9e'],
        ['', 10, '#fff'],
        ['Tekrar oynamak için tıkla veya SPACE', 20, '#ddd'],
      ]);
    }
  }

  // ---- Ana döngü ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
