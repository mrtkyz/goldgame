<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Uçak Sürüşü</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #12283f;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(140, 200, 255, 0.3);
    max-width: 100vw;
    max-height: 100vh;
  }

  #back {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: #a8d8ff;
    background: rgba(12, 28, 48, 0.75);
    border: 1px solid rgba(168, 216, 255, 0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    text-decoration: none;
  }

  /* Ayarlar menüsü */
  #settings {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  #settings button {
    border: 2px solid rgba(168, 216, 255, 0.5);
    background: rgba(12, 28, 48, 0.85);
    color: #a8d8ff;
    border-radius: 999px;
    font-size: 16px;
    padding: 10px 18px;
    -webkit-tap-highlight-color: transparent;
  }
  #gear {
    width: 46px;
    height: 46px;
    padding: 0 !important;
    font-size: 24px;
    border-radius: 50% !important;
  }
  #menu { display: flex; flex-direction: column; gap: 8px; }
  #menu.hidden { display: none; }
</style>
</head>
<body>
<a id="back" href="index.html">← Oyunlar</a>
<div id="settings">
  <button id="gear" aria-label="Ayarlar">⚙</button>
  <div id="menu" class="hidden">
    <button id="btnPause">⏸ Durdur</button>
    <button id="btnStart">▶ Başlat</button>
    <button id="btnExit">✕ Çık</button>
  </div>
</div>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const HORIZON = 250;
  const SIDE = 300;            // dünya yatay kaydırma ölçeği
  const ALT = 300;             // irtifanın ekrandaki ölçeği
  const YOKE = { x: W / 2, y: H - 84, r: 58 };   // direksiyon konumu

  function fit() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  addEventListener('resize', fit);
  fit();

  // ---- Oyun durumu ----
  const STATE = { MENU: 0, PLAYING: 1, OVER: 2 };
  let state = STATE.MENU;
  let paused = false;

  let distance, playerX, playerH, speed;
  let clouds, balloons, houses, particles;
  let nextCloudZ, nextBalloonZ, nextHouseZ;
  let warnT = 0, crashed = false;
  let airport, passengers, carried, stopT, takeoffT, missT, msg, msgT;
  let best = +(localStorage.getItem('ucak-yolcu-best') || 0);

  function newAirport(num) {
    // havalimanları arası ~2 km (1900-2200 m)
    airport = {
      z: distance + 950 + Math.random() * 150,
      x: (Math.random() * 1.6 - 0.8),
      num,
      done: false,
    };
  }

  function resetWorld() {
    distance = 0; playerX = 0; playerH = 0.9; speed = 16;
    clouds = []; balloons = []; houses = []; particles = [];
    nextCloudZ = 6; nextBalloonZ = 30; nextHouseZ = 4;
    warnT = 0; crashed = false;
    passengers = 0; carried = 0;
    stopT = 0; takeoffT = 0; missT = 0; msg = ''; msgT = 0;
    newAirport(1);
    while (nextCloudZ < 50) spawnCloud();
    while (nextHouseZ < 50) spawnHouse();
  }
  function spawnCloud() {
    clouds.push({
      z: nextCloudZ,
      x: (Math.random() * 2 - 1) * 1.6,
      h: 0.9 + Math.random() * 0.9,
      s: 0.7 + Math.random() * 0.8,
    });
    nextCloudZ += 5 + Math.random() * 6;
  }
  function spawnBalloon() {
    balloons.push({
      z: nextBalloonZ,
      x: (Math.random() < 0.5 ? -1 : 1) * (0.9 + Math.random() * 0.8),
      h: 0.5 + Math.random() * 0.8,
      col: ['#e74c3c', '#f1c40f', '#9b59b6', '#2ecc71'][Math.floor(Math.random() * 4)],
      seed: Math.random() * 10,
    });
    nextBalloonZ += 25 + Math.random() * 25;
  }
  function spawnHouse() {
    houses.push({
      z: nextHouseZ,
      x: (Math.random() < 0.5 ? -1 : 1) * (0.7 + Math.random() * 1.2),
      tree: Math.random() < 0.5,
    });
    nextHouseZ += 3.5 + Math.random() * 4;
  }

  resetWorld();

  function startGame() {
    resetWorld();
    state = STATE.PLAYING;
    paused = false;
    sndStart();
  }

  function crash() {
    crashed = true;
    const ps = planeScreen();
    for (let i = 0; i < 60; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 80 + Math.random() * 320;
      particles.push({
        x: ps.x, y: ps.y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s - 80,
        life: 0.7 + Math.random() * 0.6,
        color: ['#ffb020', '#ff5030', '#ffe89a', '#555'][i % 4],
      });
    }
    sndCrash();
    state = STATE.OVER;
  }

  // ---- Sesler ----
  let audioCtx = null;
  function getAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    } catch (e) { return null; }
  }
  function beep(freq, dur, type = 'sine', vol = 0.15, delay = 0) {
    const ac = getAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ac.destination);
    o.start(t0);
    o.stop(t0 + dur);
  }
  const sndStart = () => { beep(100, 0.5, 'sawtooth', 0.12); beep(150, 0.5, 'sawtooth', 0.1, 0.4); beep(210, 0.4, 'sawtooth', 0.09, 0.8); };
  const sndWarn = () => beep(820, 0.15, 'square', 0.09);
  const sndCrash = () => { beep(150, 0.4, 'sawtooth', 0.25); beep(80, 0.6, 'sawtooth', 0.22, 0.08); beep(50, 0.8, 'square', 0.18, 0.18); };
  const sndLand = () => { beep(523, 0.15, 'triangle', 0.14); beep(659, 0.15, 'triangle', 0.14, 0.13); beep(784, 0.22, 'triangle', 0.14, 0.26); };
  const sndBoard = () => { beep(1180, 0.25, 'triangle', 0.12); beep(1180, 0.25, 'triangle', 0.1, 0.3); };
  const sndMiss = () => { beep(420, 0.2, 'triangle', 0.08); beep(330, 0.3, 'triangle', 0.08, 0.18); };

  // ---- Girdi ----
  const keys = {};
  addEventListener('keydown', e => {
    if (state !== STATE.PLAYING && (e.key === ' ' || e.key === 'Enter')) { startGame(); e.preventDefault(); return; }
    keys[e.key] = true;
    if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
  });
  addEventListener('keyup', e => keys[e.key] = false);

  // Direksiyon (levye): sürükleyerek kullanılır
  let yokeActive = false;
  let yokeX = 0, yokeY = 0;    // -1..1
  function pointerPos(e) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) / r.width * W,
      y: (e.clientY - r.top) / r.height * H,
    };
  }
  canvas.addEventListener('pointerdown', e => {
    if (state !== STATE.PLAYING) { startGame(); return; }
    const p = pointerPos(e);
    if (Math.hypot(p.x - YOKE.x, p.y - YOKE.y) < YOKE.r + 46) {
      yokeActive = true;
      moveYoke(p);
    }
  });
  canvas.addEventListener('pointermove', e => {
    if (yokeActive) moveYoke(pointerPos(e));
  });
  addEventListener('pointerup', () => { yokeActive = false; });
  function moveYoke(p) {
    yokeX = Math.max(-1, Math.min(1, (p.x - YOKE.x) / 70));
    yokeY = Math.max(-1, Math.min(1, (p.y - YOKE.y) / 70));
  }

  // Ayarlar menüsü
  const menuEl = document.getElementById('menu');
  document.getElementById('gear').addEventListener('click', () => {
    menuEl.classList.toggle('hidden');
  });
  document.getElementById('btnPause').addEventListener('click', () => {
    if (state === STATE.PLAYING) paused = true;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnStart').addEventListener('click', () => {
    if (state !== STATE.PLAYING) startGame();
    paused = false;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnExit').addEventListener('click', () => {
    location.href = 'index.html';
  });

  // Uçağın ekrandaki konumu
  const planeScreen = () => ({
    x: W / 2 + playerX * 30,
    y: H - 175 - playerH * (ALT * 0.72),
  });

  // ---- Güncelleme ----
  let steerX = 0, steerY = 0;
  function update(dt) {
    // patlama parçacıkları OVER'da da aksın
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (state !== STATE.PLAYING || paused) return;

    if (msgT > 0) msgT -= dt;
    if (missT > 0) missT -= dt;

    // Havalimanında duruş: yolcular iner, yeniler biner
    if (stopT > 0) {
      stopT -= dt;
      playerH = 0.06;
      if (stopT <= 0) {
        passengers = 4 + Math.floor(Math.random() * 9);
        msg = passengers + ' YENİ YOLCU BİNDİ!';
        msgT = 2.2;
        sndBoard();
        takeoffT = 2;
        newAirport(airport.num + 1);
      }
      return;
    }
    // Otomatik kalkış
    if (takeoffT > 0) {
      takeoffT -= dt;
      playerH += 0.5 * dt;
    }

    // Kontrol: direksiyon veya klavye
    let dx = 0, dy = 0;
    if (yokeActive) {
      dx = yokeX;
      dy = yokeY;
    } else {
      // bırakınca direksiyon yavaşça ortalanır
      yokeX += (0 - yokeX) * dt * 8;
      yokeY += (0 - yokeY) * dt * 8;
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
      if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
      if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;
      if (dx || dy) { yokeX = dx * 0.7; yokeY = dy * 0.7; }
    }
    steerX += (dx - steerX) * dt * 6;
    steerY += (dy - steerY) * dt * 6;

    playerX += dx * 1.5 * dt;
    playerX = Math.max(-1.3, Math.min(1.3, playerX));
    // direksiyon yukarı = yüksel; uçak kendiliğinden hafifçe alçalır
    playerH += (-dy * 0.9 - 0.06) * dt;
    playerH = Math.min(1.5, playerH);

    // YERE ÇARPMA!
    if (playerH <= 0.02) {
      playerH = 0.02;
      crash();
      return;
    }

    // alçak irtifa uyarısı (havalimanı yaklaşmasında susar: iniş bölgesi)
    const nearAirport = airport.z - distance < 30;
    if (playerH < 0.28 && !nearAirport) {
      warnT -= dt;
      if (warnT <= 0) { sndWarn(); warnT = 0.55; }
    }

    distance += speed * dt;

    // Havalimanına varış: alçak ve hizalıysan inersin
    const azRel = airport.z - distance + 1;
    if (!airport.done && azRel < 1.06) {
      airport.done = true;
      if (Math.abs(airport.x - playerX) < 0.52 && playerH < 0.4) {
        // İNDİK!
        if (passengers > 0) {
          carried += passengers;
          msg = passengers + ' YOLCU TESLİM EDİLDİ!';
          if (carried > best) {
            best = carried;
            localStorage.setItem('ucak-yolcu-best', best);
          }
        } else {
          msg = 'HAVALİMANINA İNDİN!';
        }
        msgT = 2.4;
        passengers = 0;
        stopT = 2.4;
        playerH = 0.06;
        sndLand();
      } else {
        msg = 'Havalimanını kaçırdın! İleride yenisi var';
        msgT = 2.2;
        sndMiss();
        newAirport(airport.num);
      }
    }

    while (nextCloudZ < distance + 55) spawnCloud();
    while (nextBalloonZ < distance + 60) spawnBalloon();
    while (nextHouseZ < distance + 55) spawnHouse();
    clouds = clouds.filter(c => c.z - distance + 1 > 0.4);
    balloons = balloons.filter(b => b.z - distance + 1 > 0.4);
    houses = houses.filter(h => h.z - distance + 1 > 0.5);
  }

  // ---- Çizim ----
  const rowCenter = f => W / 2 - playerX * SIDE * f;
  const flyY = (f, h) => HORIZON + f * (H - HORIZON) - h * ALT * f;

  function drawSky() {
    const t = performance.now() / 1000;
    const g = ctx.createLinearGradient(0, 0, 0, HORIZON);
    g.addColorStop(0, '#4aa3e8');
    g.addColorStop(1, '#cfe8f7');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, HORIZON);
    ctx.beginPath();
    ctx.arc(W * 0.22, 66, 30, 0, Math.PI * 2);
    ctx.fillStyle = '#ffe89a';
    ctx.fill();
    ctx.fillStyle = '#89a8c4';
    for (const [mx, mw, mh] of [[-40, 240, 70], [180, 280, 95], [360, 220, 65]]) {
      ctx.beginPath();
      ctx.moveTo(mx, HORIZON);
      ctx.lineTo(mx + mw / 2, HORIZON - mh);
      ctx.lineTo(mx + mw, HORIZON);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (const [bx, by, br] of [[100, 120, 18], [300, 100, 22], [440, 130, 16]]) {
      const x = (bx + t * 4) % (W + 60) - 30;
      ctx.beginPath();
      ctx.ellipse(x, by, br * 1.7, br * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // kuş sürüsü
    ctx.strokeStyle = '#3a4a5a';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    for (let i = 0; i < 3; i++) {
      const x = ((W * 0.6 + i * 30 + t * 15) % (W + 60)) - 30;
      const y = 150 + i * 12;
      const flap = Math.sin(t * 7 + i) * 4;
      ctx.beginPath();
      ctx.moveTo(x - 7, y);
      ctx.quadraticCurveTo(x - 3, y - flap, x, y);
      ctx.quadraticCurveTo(x + 3, y - flap, x + 7, y);
      ctx.stroke();
    }
  }

  function drawGround() {
    for (let sy = HORIZON; sy < H; sy++) {
      const f = (sy - HORIZON) / (H - HORIZON);
      const z = distance + 1 / Math.max(f, 0.02);
      const zi = Math.floor(z * 1.3);
      const isRiver = (zi % 41) === 20;
      const band = zi % 3;
      ctx.fillStyle = isRiver ? '#3d8fd1' : band === 0 ? '#57a05c' : band === 1 ? '#4c8f51' : '#b8a04e';
      ctx.fillRect(0, sy, W, 1);
    }
  }

  function drawCloudSprite(x, y, sc, s) {
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.ellipse(x, y, 60 * sc * s.s, 22 * sc * s.s, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 34 * sc * s.s, y + 6 * sc * s.s, 40 * sc * s.s, 16 * sc * s.s, 0, 0, Math.PI * 2);
    ctx.ellipse(x - 34 * sc * s.s, y + 7 * sc * s.s, 36 * sc * s.s, 15 * sc * s.s, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBalloonSprite(b, x, y, sc, t) {
    const bob = Math.sin(t * 1.5 + b.seed) * 6 * sc;
    ctx.fillStyle = b.col;
    ctx.beginPath();
    ctx.ellipse(x, y - 40 * sc + bob, 30 * sc, 36 * sc, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(x - 9 * sc, y - 46 * sc + bob, 8 * sc, 18 * sc, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#5a4632';
    ctx.lineWidth = 2 * sc;
    ctx.beginPath();
    ctx.moveTo(x - 12 * sc, y - 10 * sc + bob); ctx.lineTo(x - 8 * sc, y + 8 * sc + bob);
    ctx.moveTo(x + 12 * sc, y - 10 * sc + bob); ctx.lineTo(x + 8 * sc, y + 8 * sc + bob);
    ctx.stroke();
    ctx.fillStyle = '#8d5a2b';
    ctx.fillRect(x - 10 * sc, y + 6 * sc + bob, 20 * sc, 12 * sc);
  }

  function drawHouseSprite(s, x, y, sc) {
    if (s.tree) {
      ctx.fillStyle = '#6b4a26';
      ctx.fillRect(x - 4 * sc, y - 26 * sc, 8 * sc, 26 * sc);
      ctx.fillStyle = '#2f8f43';
      ctx.beginPath();
      ctx.arc(x, y - 34 * sc, 18 * sc, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#e8dcc8';
      ctx.fillRect(x - 20 * sc, y - 26 * sc, 40 * sc, 26 * sc);
      ctx.fillStyle = '#c0533a';
      ctx.beginPath();
      ctx.moveTo(x - 25 * sc, y - 26 * sc);
      ctx.lineTo(x, y - 42 * sc);
      ctx.lineTo(x + 25 * sc, y - 26 * sc);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#7a5a3a';
      ctx.fillRect(x - 5 * sc, y - 14 * sc, 10 * sc, 14 * sc);
    }
  }

  function drawAirport(x, y, sc, t, num) {
    // pist: perspektifli gri şerit
    const pw = 300 * sc, ph = 60 * sc;
    ctx.fillStyle = '#5c6068';
    ctx.beginPath();
    ctx.moveTo(x - pw * 0.32, y - ph);
    ctx.lineTo(x + pw * 0.32, y - ph);
    ctx.lineTo(x + pw * 0.5, y);
    ctx.lineTo(x - pw * 0.5, y);
    ctx.closePath();
    ctx.fill();
    // pist orta çizgileri
    ctx.fillStyle = '#e8e8e8';
    for (let i = 0; i < 4; i++) {
      const fy = y - ph * 0.15 - i * ph * 0.22;
      const fw = pw * (0.035 - i * 0.005);
      ctx.fillRect(x - fw / 2, fy - ph * 0.07, fw, ph * 0.11);
    }
    // eşik çizgileri
    ctx.fillStyle = '#fff';
    for (let i = -3; i <= 3; i++) {
      ctx.fillRect(x + i * pw * 0.06 - pw * 0.015, y - ph * 0.12, pw * 0.03, ph * 0.1);
    }
    // terminal binası
    ctx.fillStyle = '#dde5ec';
    ctx.fillRect(x - pw * 0.5 - 90 * sc, y - ph - 48 * sc, 80 * sc, 48 * sc);
    ctx.fillStyle = '#4fc9f0';
    ctx.fillRect(x - pw * 0.5 - 84 * sc, y - ph - 40 * sc, 68 * sc, 18 * sc);
    ctx.fillStyle = '#39424e';
    ctx.fillRect(x - pw * 0.5 - 90 * sc, y - ph - 54 * sc, 80 * sc, 8 * sc);
    // kule
    ctx.fillStyle = '#c8d2dc';
    ctx.fillRect(x + pw * 0.5 + 26 * sc, y - ph - 70 * sc, 12 * sc, 70 * sc);
    ctx.fillStyle = '#39424e';
    ctx.fillRect(x + pw * 0.5 + 16 * sc, y - ph - 92 * sc, 32 * sc, 24 * sc);
    ctx.fillStyle = '#4fc9f0';
    ctx.fillRect(x + pw * 0.5 + 20 * sc, y - ph - 88 * sc, 24 * sc, 12 * sc);
    // kule ışığı
    if (Math.floor(t * 3) % 2 === 0) {
      ctx.fillStyle = '#ff4030';
      ctx.shadowColor = '#ff4030';
      ctx.shadowBlur = 12 * sc;
      ctx.beginPath();
      ctx.arc(x + pw * 0.5 + 32 * sc, y - ph - 98 * sc, 4 * sc, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    // rüzgar tulumu
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 3 * sc;
    ctx.beginPath();
    ctx.moveTo(x - pw * 0.5 - 20 * sc, y - ph);
    ctx.lineTo(x - pw * 0.5 - 20 * sc, y - ph - 30 * sc);
    ctx.stroke();
    ctx.fillStyle = '#f07020';
    ctx.beginPath();
    ctx.moveTo(x - pw * 0.5 - 20 * sc, y - ph - 30 * sc);
    ctx.lineTo(x - pw * 0.5 - 2 * sc + Math.sin(t * 4) * 3 * sc, y - ph - 26 * sc);
    ctx.lineTo(x - pw * 0.5 - 20 * sc, y - ph - 22 * sc);
    ctx.closePath();
    ctx.fill();
    // tabela
    if (sc > 0.15) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(x - 66 * sc, y - ph - 88 * sc, 132 * sc, 26 * sc);
      ctx.strokeStyle = '#2a6f97';
      ctx.lineWidth = 3 * sc;
      ctx.strokeRect(x - 66 * sc, y - ph - 88 * sc, 132 * sc, 26 * sc);
      ctx.fillStyle = '#1a4a6e';
      ctx.font = 'bold ' + 16 * sc + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('HAVALİMANI ' + num, x, y - ph - 75 * sc);
    }
  }

  function drawSprites() {
    const t = performance.now() / 1000;
    const sprites = [
      ...houses.map(s => ({ z: s.z, kind: 'house', s })),
      ...clouds.map(s => ({ z: s.z, kind: 'cloud', s })),
      ...balloons.map(s => ({ z: s.z, kind: 'balloon', s })),
      { z: airport.z, kind: 'airport' },
    ].sort((a, b) => b.z - a.z);

    for (const sp of sprites) {
      const zRel = sp.z - distance + 1;
      if (zRel < 0.4) continue;
      const f = 1 / zRel;
      if (f > 1.15 || f < 0.03) continue;
      const fc = Math.min(f, 1.15);
      const s = sp.s;
      if (sp.kind === 'airport') {
        const y = HORIZON + fc * (H - HORIZON);
        const x = rowCenter(fc) + airport.x * SIDE * fc;
        drawAirport(x, y, fc, t, airport.num);
      } else if (sp.kind === 'house') {
        const y = HORIZON + fc * (H - HORIZON);
        const x = rowCenter(fc) + s.x * SIDE * fc;
        drawHouseSprite(s, x, y, fc);
      } else {
        const y = flyY(fc, s.h);
        const x = rowCenter(fc) + s.x * SIDE * fc;
        if (sp.kind === 'cloud') drawCloudSprite(x, y, fc, s);
        else drawBalloonSprite(s, x, y, fc, t);
      }
    }
  }

  function drawPlane() {
    if (crashed) return;   // patladı: sadece parçacıklar
    const t = performance.now() / 1000;
    const ps = planeScreen();
    const x = ps.x, y = ps.y + Math.sin(t * 2) * 3;
    const bank = steerX * 0.3;

    // gölge
    const shScale = 1.2 - playerH * 0.5;
    ctx.fillStyle = 'rgba(0,0,0,' + Math.max(0.05, 0.32 - playerH * 0.15) + ')';
    ctx.beginPath();
    ctx.ellipse(x, H - 26, 70 * shScale, 9 * shScale, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(bank);

    // ana kanatlar (geriye ok açılı, geniş)
    const wg = ctx.createLinearGradient(-120, 0, 120, 0);
    wg.addColorStop(0, '#c8d2dc');
    wg.addColorStop(0.5, '#f2f6fa');
    wg.addColorStop(1, '#c8d2dc');
    ctx.fillStyle = wg;
    ctx.beginPath();
    ctx.moveTo(-122, 16 + steerY * 6);
    ctx.lineTo(-16, -4);
    ctx.lineTo(16, -4);
    ctx.lineTo(122, 16 + steerY * 6);
    ctx.lineTo(114, 24 + steerY * 6);
    ctx.lineTo(-114, 24 + steerY * 6);
    ctx.closePath();
    ctx.fill();

    // motorlar (kanat altı jet)
    for (const s of [-1, 1]) {
      ctx.fillStyle = '#8b98a8';
      ctx.beginPath();
      ctx.ellipse(s * 58, 22 + steerY * 5, 12, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#39424e';
      ctx.beginPath();
      ctx.ellipse(s * 58, 22 + steerY * 5, 8, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      // egzoz titremesi
      ctx.fillStyle = 'rgba(255, 200, 120, ' + (0.25 + Math.abs(Math.sin(t * 20 + s)) * 0.2) + ')';
      ctx.beginPath();
      ctx.ellipse(s * 58, 30 + steerY * 5, 5, 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // kanat ucu ışıkları: sol kırmızı, sağ yeşil (yanıp söner)
    if (Math.floor(t * 2.5) % 2 === 0) {
      ctx.fillStyle = '#ff3030';
      ctx.shadowColor = '#ff3030';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(-120, 18 + steerY * 6, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#30ff50';
      ctx.shadowColor = '#30ff50';
      ctx.beginPath();
      ctx.arc(120, 18 + steerY * 6, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // gövde (geniş yolcu uçağı tüpü)
    const bg = ctx.createLinearGradient(-20, 0, 20, 0);
    bg.addColorStop(0, '#c8d2dc');
    bg.addColorStop(0.45, '#ffffff');
    bg.addColorStop(1, '#aeb9c6');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.ellipse(0, 4, 20, 30, 0, 0, Math.PI * 2);
    ctx.fill();
    // gövde alt kırmızı şerit
    ctx.fillStyle = '#d64545';
    ctx.beginPath();
    ctx.ellipse(0, 18, 17, 12, 0, 0, Math.PI);
    ctx.fill();
    // pencere şeridi
    ctx.fillStyle = '#39424e';
    ctx.fillRect(-14, -2, 28, 4);

    // dikey kuyruk: büyük, kırmızı, TALHA AIR logolu
    ctx.fillStyle = '#d64545';
    ctx.beginPath();
    ctx.moveTo(-4, -16);
    ctx.lineTo(-2, -66 - steerY * 6);
    ctx.lineTo(12, -62 - steerY * 6);
    ctx.lineTo(10, -16);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('T', 4, -48 - steerY * 6);
    // yatay kuyruk kanatları
    ctx.fillStyle = '#dde5ec';
    ctx.beginPath();
    ctx.moveTo(-52, -14);
    ctx.lineTo(-6, -22);
    ctx.lineTo(-6, -14);
    ctx.lineTo(-48, -8);
    ctx.closePath();
    ctx.moveTo(52, -14);
    ctx.lineTo(6, -22);
    ctx.lineTo(6, -14);
    ctx.lineTo(48, -8);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawYoke() {
    const t = performance.now() / 1000;
    ctx.save();
    ctx.translate(YOKE.x + yokeX * 16, YOKE.y + yokeY * 12);
    ctx.rotate(yokeX * 0.55);

    // direksiyon kolonu
    ctx.fillStyle = '#2e3640';
    ctx.fillRect(-10, 20, 20, 60);
    // direksiyon gövdesi: uçak levyesi (U şekli)
    ctx.strokeStyle = '#39424e';
    ctx.lineWidth = 17;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(0, 0, YOKE.r, Math.PI * 0.15, Math.PI * 0.85, true);
    ctx.stroke();
    ctx.strokeStyle = '#1d2229';
    ctx.lineWidth = 11;
    ctx.beginPath();
    ctx.arc(0, 0, YOKE.r, Math.PI * 0.15, Math.PI * 0.85, true);
    ctx.stroke();
    // elcikler
    ctx.strokeStyle = '#14181d';
    ctx.lineWidth = 20;
    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(s * YOKE.r * Math.cos(Math.PI * 0.15), -YOKE.r * Math.sin(Math.PI * 0.15));
      ctx.lineTo(s * YOKE.r * Math.cos(Math.PI * 0.15) + s * 2, -YOKE.r * Math.sin(Math.PI * 0.15) - 26);
      ctx.stroke();
    }
    // orta göbek
    ctx.fillStyle = '#39424e';
    ctx.beginPath();
    ctx.ellipse(0, 6, 30, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffd54a';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('TALHA AIR', 0, 5);
    ctx.restore();

    // ipucu (direksiyon boştayken hafif parlar)
    if (!yokeActive && state === STATE.PLAYING) {
      ctx.fillStyle = 'rgba(168, 216, 255, ' + (0.25 + Math.sin(t * 3) * 0.1) + ')';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('direksiyonu sürükle', YOKE.x, YOKE.y + YOKE.r + 34);
    }
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(12, 28, 48, 0.55)';
    ctx.fillRect(0, 0, W, 58);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd54a';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText('Taşınan: ' + carried, 118, 22);
    ctx.fillStyle = '#a8d8ff';
    ctx.font = '15px sans-serif';
    const kalan = Math.max(0, Math.ceil((airport.z - distance) * 2));
    ctx.fillText('Uçakta: ' + passengers + ' yolcu   Havalimanına: ' + kalan + ' m   Rekor: ' + best, 118, 45);

    // havalimanı yön oku
    const dxA = airport.x - playerX;
    if (Math.abs(dxA) > 0.2 && stopT <= 0) {
      const ax = W / 2 + Math.sign(dxA) * 150;
      ctx.fillStyle = '#ffd54a';
      ctx.beginPath();
      if (dxA > 0) {
        ctx.moveTo(ax + 18, 90); ctx.lineTo(ax - 8, 76); ctx.lineTo(ax - 8, 104);
      } else {
        ctx.moveTo(ax - 18, 90); ctx.lineTo(ax + 8, 76); ctx.lineTo(ax + 8, 104);
      }
      ctx.closePath();
      ctx.fill();
    }
    // iniş bölgesi bilgisi
    if (state === STATE.PLAYING && stopT <= 0 && airport.z - distance < 30 && airport.z - distance > 0) {
      ctx.fillStyle = playerH < 0.4 ? '#7fff9e' : '#ffb020';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(playerH < 0.4 ? 'İNİŞE HAZIR' : 'İNMEK İÇİN ALÇAL!', W / 2, 130);
    }
    // mesajlar
    if (msgT > 0) {
      ctx.globalAlpha = Math.min(1, msgT);
      ctx.fillStyle = '#7fff9e';
      ctx.font = 'bold 24px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(msg, W / 2, H * 0.3);
      ctx.globalAlpha = 1;
    }
    if (stopT > 0) {
      ctx.fillStyle = '#ffd54a';
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Yolcular iniyor / biniyor...', W / 2, H * 0.36);
    }

    // irtifa göstergesi (sağda dikey çubuk)
    const bx = W - 34, by = 90, bh = 200;
    ctx.fillStyle = 'rgba(12, 28, 48, 0.55)';
    ctx.fillRect(bx - 8, by - 6, 24, bh + 12);
    ctx.fillStyle = 'rgba(255, 80, 60, 0.45)';
    ctx.fillRect(bx - 4, by + bh * 0.82, 16, bh * 0.18);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(bx - 4, by, 16, bh);
    const hy = by + bh - (playerH / 1.5) * bh;
    ctx.fillStyle = playerH < 0.28 ? '#ff5030' : '#7fff9e';
    ctx.beginPath();
    ctx.moveTo(bx - 8, hy);
    ctx.lineTo(bx + 20, hy);
    ctx.lineTo(bx + 14, hy - 5);
    ctx.moveTo(bx + 20, hy);
    ctx.lineTo(bx + 14, hy + 5);
    ctx.strokeStyle = ctx.fillStyle;
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = '#a8d8ff';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('İRTİFA', bx + 4, by - 16);

    // alçak irtifa uyarısı (iniş bölgesinde gösterilmez)
    if (state === STATE.PLAYING && playerH < 0.28 && !(airport.z - distance < 30) && stopT <= 0) {
      const t = performance.now() / 1000;
      if (Math.floor(t * 4) % 2 === 0) {
        ctx.fillStyle = '#ff4030';
        ctx.font = 'bold 28px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('YUKARI ÇEK!', W / 2, 100);
      }
    }
  }

  function drawCenteredPanel(lines) {
    ctx.fillStyle = 'rgba(8, 20, 36, 0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    let y = H * 0.26;
    for (const [text, size, color] of lines) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.fillText(text, W / 2, y);
      y += size * 1.6;
    }
  }

  // ---- Ana döngü ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);

    drawSky();
    drawGround();
    drawSprites();
    drawPlane();

    // parçacıklar (patlama)
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
    }
    ctx.globalAlpha = 1;

    if (state !== STATE.MENU) {
      drawHUD();
      drawYoke();
    }

    if (state === STATE.MENU) {
      drawCenteredPanel([
        ['UÇAK SÜRÜŞÜ', 44, '#a8d8ff'],
        ['', 12, '#fff'],
        ['TALHA AIR ile yolcu taşı!', 19, '#ddd'],
        ['Direksiyonu sürükle (veya ok tuşları/WASD)', 15, '#aaa'],
        ['Havalimanına alçalıp piste hizalan: İN', 15, '#7fff9e'],
        ['Yolcuları bırak, yenilerini al, sonrakine uç', 15, '#aaa'],
        ['Uçak kendiliğinden alçalır:', 15, '#aaa'],
        ['YERE ÇARPARSAN PATLARSIN!', 16, '#ff6b5e'],
        ['Başlamak için tıkla veya SPACE', 19, '#ffd54a'],
      ]);
    } else if (paused && state === STATE.PLAYING) {
      drawCenteredPanel([
        ['DURAKLATILDI', 40, '#ffd54a'],
        ['', 10, '#fff'],
        ['Devam etmek için Ayarlar > Başlat', 18, '#ddd'],
      ]);
    } else if (state === STATE.OVER) {
      drawCenteredPanel([
        ['UÇAK DÜŞTÜ!', 46, '#ff4030'],
        ['', 8, '#fff'],
        ['Taşınan yolcu: ' + carried, 28, '#a8d8ff'],
        ['Rekor: ' + best + ' yolcu', 20, '#ffd54a'],
        ['', 10, '#fff'],
        ['Tekrar uçmak için tıkla veya SPACE', 19, '#ddd'],
      ]);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
