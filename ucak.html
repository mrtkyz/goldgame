<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Uçak Sürüşü</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #12283f;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(140, 200, 255, 0.3);
    max-width: 100vw;
    max-height: 100vh;
  }

  #back {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: #a8d8ff;
    background: rgba(12, 28, 48, 0.75);
    border: 1px solid rgba(168, 216, 255, 0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    text-decoration: none;
  }

  /* Ayarlar menüsü */
  #settings {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  #settings button {
    border: 2px solid rgba(168, 216, 255, 0.5);
    background: rgba(12, 28, 48, 0.85);
    color: #a8d8ff;
    border-radius: 999px;
    font-size: 16px;
    padding: 10px 18px;
    -webkit-tap-highlight-color: transparent;
  }
  #gear {
    width: 46px;
    height: 46px;
    padding: 0 !important;
    font-size: 24px;
    border-radius: 50% !important;
  }
  #menu { display: flex; flex-direction: column; gap: 8px; }
  #menu.hidden { display: none; }
</style>
</head>
<body>
<a id="back" href="index.html">← Oyunlar</a>
<div id="settings">
  <button id="gear" aria-label="Ayarlar">⚙</button>
  <div id="menu" class="hidden">
    <button id="btnPause">⏸ Durdur</button>
    <button id="btnStart">▶ Başlat</button>
    <button id="btnExit">✕ Çık</button>
  </div>
</div>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const HORIZON = 250;
  const PXU = 300;             // 1 dünya birimi = kaç piksel (f=1'de)
  const ALT = 300;             // irtifa ekran ölçeği
  const YOKE = { x: W / 2, y: H - 84, r: 58 };

  function fit() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  addEventListener('resize', fit);
  fit();

  // ---- Oyun durumu ----
  const STATE = { MENU: 0, PLAYING: 1, OVER: 2 };
  let state = STATE.MENU;
  let paused = false;

  // Serbest uçuş: gerçek 2B dünya konumu + pusula yönü
  let wx, wz, heading, traveled, playerH, speed;
  let clouds, balloons, houses, particles;
  let warnT = 0, crashed = false;
  let airport, passengers, carried, stopT, takeoffT, msg, msgT;
  let best = +(localStorage.getItem('ucak-yolcu-best') || 0);

  function newAirport(num) {
    // ~2 km ileride, mevcut rotanın etrafında bir yönde
    const bearing = heading + (Math.random() - 0.5) * 1.6;
    const dist = 950 + Math.random() * 150;
    airport = {
      x: wx + Math.sin(bearing) * dist,
      z: wz + Math.cos(bearing) * dist,
      num,
    };
  }

  function resetWorld() {
    wx = 0; wz = 0; heading = 0; traveled = 0;
    playerH = 0.9; speed = 16;
    clouds = []; balloons = []; houses = []; particles = [];
    warnT = 0; crashed = false;
    passengers = 0; carried = 0;
    stopT = 0; takeoffT = 0; msg = ''; msgT = 0;
    newAirport(1);
    for (let i = 0; i < 30; i++) spawnHouse();
    for (let i = 0; i < 14; i++) spawnCloud();
    for (let i = 0; i < 3; i++) spawnBalloon();
  }

  // Sahne nesneleri: uçağın çevresine, dünya koordinatlarında
  function around(minD, maxD) {
    const ang = heading + (Math.random() - 0.5) * 3.0;
    const d = minD + Math.random() * (maxD - minD);
    return { x: wx + Math.sin(ang) * d, z: wz + Math.cos(ang) * d };
  }
  function spawnHouse() {
    const p = around(8, 55);
    houses.push({ x: p.x, z: p.z, tree: Math.random() < 0.55 });
  }
  function spawnCloud() {
    const p = around(10, 55);
    clouds.push({ x: p.x, z: p.z, h: 0.9 + Math.random() * 0.9, s: 0.7 + Math.random() * 0.8 });
  }
  function spawnBalloon() {
    const p = around(15, 55);
    balloons.push({
      x: p.x, z: p.z,
      h: 0.5 + Math.random() * 0.8,
      col: ['#e74c3c', '#f1c40f', '#9b59b6', '#2ecc71'][Math.floor(Math.random() * 4)],
      seed: Math.random() * 10,
    });
  }

  resetWorld();

  function startGame() {
    resetWorld();
    state = STATE.PLAYING;
    paused = false;
    sndStart();
  }

  function crash() {
    crashed = true;
    const ps = planeScreen();
    for (let i = 0; i < 60; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 80 + Math.random() * 320;
      particles.push({
        x: ps.x, y: ps.y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s - 80,
        life: 0.7 + Math.random() * 0.6,
        color: ['#ffb020', '#ff5030', '#ffe89a', '#555'][i % 4],
      });
    }
    sndCrash();
    state = STATE.OVER;
  }

  // ---- Sesler ----
  let audioCtx = null;
  function getAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    } catch (e) { return null; }
  }
  function beep(freq, dur, type = 'sine', vol = 0.15, delay = 0) {
    const ac = getAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ac.destination);
    o.start(t0);
    o.stop(t0 + dur);
  }
  const sndStart = () => { beep(100, 0.5, 'sawtooth', 0.12); beep(150, 0.5, 'sawtooth', 0.1, 0.4); beep(210, 0.4, 'sawtooth', 0.09, 0.8); };
  const sndWarn = () => beep(820, 0.15, 'square', 0.09);
  const sndCrash = () => { beep(150, 0.4, 'sawtooth', 0.25); beep(80, 0.6, 'sawtooth', 0.22, 0.08); beep(50, 0.8, 'square', 0.18, 0.18); };
  const sndLand = () => { beep(523, 0.15, 'triangle', 0.14); beep(659, 0.15, 'triangle', 0.14, 0.13); beep(784, 0.22, 'triangle', 0.14, 0.26); };
  const sndBoard = () => { beep(1180, 0.25, 'triangle', 0.12); beep(1180, 0.25, 'triangle', 0.1, 0.3); };

  // ---- Girdi ----
  const keys = {};
  addEventListener('keydown', e => {
    if (state !== STATE.PLAYING && (e.key === ' ' || e.key === 'Enter')) { startGame(); e.preventDefault(); return; }
    keys[e.key] = true;
    if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
  });
  addEventListener('keyup', e => keys[e.key] = false);

  let yokeActive = false;
  let yokeX = 0, yokeY = 0;
  function pointerPos(e) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) / r.width * W,
      y: (e.clientY - r.top) / r.height * H,
    };
  }
  canvas.addEventListener('pointerdown', e => {
    if (state !== STATE.PLAYING) { startGame(); return; }
    const p = pointerPos(e);
    if (Math.hypot(p.x - YOKE.x, p.y - YOKE.y) < YOKE.r + 46) {
      yokeActive = true;
      moveYoke(p);
    }
  });
  canvas.addEventListener('pointermove', e => {
    if (yokeActive) moveYoke(pointerPos(e));
  });
  addEventListener('pointerup', () => { yokeActive = false; });
  function moveYoke(p) {
    yokeX = Math.max(-1, Math.min(1, (p.x - YOKE.x) / 70));
    yokeY = Math.max(-1, Math.min(1, (p.y - YOKE.y) / 70));
  }

  // Ayarlar menüsü
  const menuEl = document.getElementById('menu');
  document.getElementById('gear').addEventListener('click', () => {
    menuEl.classList.toggle('hidden');
  });
  document.getElementById('btnPause').addEventListener('click', () => {
    if (state === STATE.PLAYING) paused = true;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnStart').addEventListener('click', () => {
    if (state !== STATE.PLAYING) startGame();
    paused = false;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnExit').addEventListener('click', () => {
    location.href = 'index.html';
  });

  const planeScreen = () => ({
    x: W / 2,
    y: H - 175 - playerH * (ALT * 0.72),
  });

  // Dünya -> kamera dönüşümü (uçağın baktığı yön ileri)
  function transform(sx, sz) {
    const dx = sx - wx, dz = sz - wz;
    const sin = Math.sin(heading), cos = Math.cos(heading);
    return {
      fwd: dx * sin + dz * cos,
      lat: dx * cos - dz * sin,
    };
  }

  const airportDist = () => Math.hypot(airport.x - wx, airport.z - wz);

  // ---- Güncelleme ----
  let steerX = 0, steerY = 0;
  function update(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (state !== STATE.PLAYING || paused) return;

    if (msgT > 0) msgT -= dt;

    // Havalimanında duruş
    if (stopT > 0) {
      stopT -= dt;
      playerH = 0.06;
      if (stopT <= 0) {
        passengers = 4 + Math.floor(Math.random() * 9);
        msg = passengers + ' YENİ YOLCU BİNDİ!';
        msgT = 2.2;
        sndBoard();
        takeoffT = 2;
        newAirport(airport.num + 1);
      }
      return;
    }
    if (takeoffT > 0) {
      takeoffT -= dt;
      playerH += 0.5 * dt;
    }

    // Kontrol
    let dx = 0, dy = 0;
    if (yokeActive) {
      dx = yokeX;
      dy = yokeY;
    } else {
      yokeX += (0 - yokeX) * dt * 8;
      yokeY += (0 - yokeY) * dt * 8;
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
      if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
      if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;
      if (dx || dy) { yokeX = dx * 0.7; yokeY = dy * 0.7; }
    }
    steerX += (dx - steerX) * dt * 6;
    steerY += (dy - steerY) * dt * 6;

    // Sınırsız dönüş: burnu istediğin yöne çevir (tam tur bile)
    heading += dx * 1.1 * dt;

    // İrtifa: direksiyon + kendiliğinden alçalma
    playerH += (-dy * 0.9 - 0.06) * dt;
    playerH = Math.min(1.5, playerH);

    if (playerH <= 0.02) {
      playerH = 0.02;
      crash();
      return;
    }

    const aDist = airportDist();

    // alçak irtifa uyarısı (havalimanı yakınında susar)
    if (playerH < 0.28 && aDist > 60) {
      warnT -= dt;
      if (warnT <= 0) { sndWarn(); warnT = 0.55; }
    }

    // İleri uçuş
    wx += Math.sin(heading) * speed * dt;
    wz += Math.cos(heading) * speed * dt;
    traveled += speed * dt;

    // İNİŞ: havalimanının üstüne alçak gel (kaçırırsan dönüp tekrar gelebilirsin)
    if (aDist < 3 && playerH < 0.4) {
      if (passengers > 0) {
        carried += passengers;
        msg = passengers + ' YOLCU TESLİM EDİLDİ!';
        if (carried > best) {
          best = carried;
          localStorage.setItem('ucak-yolcu-best', best);
        }
      } else {
        msg = 'HAVALİMANINA İNDİN!';
      }
      msgT = 2.4;
      passengers = 0;
      stopT = 2.4;
      playerH = 0.06;
      sndLand();
      return;
    }

    // Sahne: çevredeki nesneleri koru, uzaklaşanları tazele
    const keepNear = o => Math.hypot(o.x - wx, o.z - wz) < 65;
    houses = houses.filter(keepNear);
    clouds = clouds.filter(keepNear);
    balloons = balloons.filter(keepNear);
    while (houses.length < 30) spawnHouse();
    while (clouds.length < 14) spawnCloud();
    while (balloons.length < 3) spawnBalloon();
  }

  // ---- Çizim ----
  const flyScreen = (fwd, lat, h) => {
    const f = 1 / fwd;
    return {
      f,
      x: W / 2 + lat * f * PXU,
      y: HORIZON + f * (H - HORIZON) - h * ALT * f,
      gy: HORIZON + f * (H - HORIZON),
    };
  };

  function drawSky() {
    const t = performance.now() / 1000;
    const g = ctx.createLinearGradient(0, 0, 0, HORIZON);
    g.addColorStop(0, '#4aa3e8');
    g.addColorStop(1, '#cfe8f7');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, HORIZON);
    // güneş: pusulaya göre kayar (dönüş hissi)
    const sunX = ((-heading * 180 % (W + 200)) + W + 200) % (W + 200) - 100;
    ctx.beginPath();
    ctx.arc(sunX, 66, 30, 0, Math.PI * 2);
    ctx.fillStyle = '#ffe89a';
    ctx.fill();
    // uzak dağlar: yönle kayar
    ctx.fillStyle = '#89a8c4';
    const mShift = ((-heading * 260 % 700) + 700) % 700;
    for (const [mx, mw, mh] of [[-40, 240, 70], [180, 280, 95], [420, 220, 65], [660, 260, 80]]) {
      const bx = ((mx + mShift) % 700) - 110;
      ctx.beginPath();
      ctx.moveTo(bx, HORIZON);
      ctx.lineTo(bx + mw / 2, HORIZON - mh);
      ctx.lineTo(bx + mw, HORIZON);
      ctx.closePath();
      ctx.fill();
    }
    // kuş sürüsü
    ctx.strokeStyle = '#3a4a5a';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    for (let i = 0; i < 3; i++) {
      const x = ((W * 0.6 + i * 30 + t * 15) % (W + 60)) - 30;
      const y = 150 + i * 12;
      const flap = Math.sin(t * 7 + i) * 4;
      ctx.beginPath();
      ctx.moveTo(x - 7, y);
      ctx.quadraticCurveTo(x - 3, y - flap, x, y);
      ctx.quadraticCurveTo(x + 3, y - flap, x + 7, y);
      ctx.stroke();
    }
  }

  function drawGround() {
    // çimenlik: yeşil tonlarında yumuşak şeritler
    for (let sy = HORIZON; sy < H; sy++) {
      const f = (sy - HORIZON) / (H - HORIZON);
      const z = traveled + 1 / Math.max(f, 0.02);
      const band = Math.floor(z * 1.3) % 2;
      ctx.fillStyle = band ? '#4f9e55' : '#48954e';
      ctx.fillRect(0, sy, W, 1);
    }
    // çim demetleri (perspektifli noktalar)
    ctx.fillStyle = '#3d8443';
    for (let i = 0; i < 40; i++) {
      const fy = ((i * 97.3 + traveled * 40) % (H - HORIZON));
      const sy = HORIZON + fy;
      const f = fy / (H - HORIZON);
      const sx = (i * 137.5 + Math.floor((traveled * 40 + fy) / (H - HORIZON)) * 53) % W;
      const s = Math.max(1, 4 * f);
      ctx.fillRect(sx, sy - s, 2 * s * 0.4 + 1, s);
    }
  }

  function drawAirport(x, y, sc, t, num) {
    const pw = 300 * sc, ph = 60 * sc;
    ctx.fillStyle = '#5c6068';
    ctx.beginPath();
    ctx.moveTo(x - pw * 0.32, y - ph);
    ctx.lineTo(x + pw * 0.32, y - ph);
    ctx.lineTo(x + pw * 0.5, y);
    ctx.lineTo(x - pw * 0.5, y);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#e8e8e8';
    for (let i = 0; i < 4; i++) {
      const fy = y - ph * 0.15 - i * ph * 0.22;
      const fw = pw * (0.035 - i * 0.005);
      ctx.fillRect(x - fw / 2, fy - ph * 0.07, fw, ph * 0.11);
    }
    ctx.fillStyle = '#fff';
    for (let i = -3; i <= 3; i++) {
      ctx.fillRect(x + i * pw * 0.06 - pw * 0.015, y - ph * 0.12, pw * 0.03, ph * 0.1);
    }
    ctx.fillStyle = '#dde5ec';
    ctx.fillRect(x - pw * 0.5 - 90 * sc, y - ph - 48 * sc, 80 * sc, 48 * sc);
    ctx.fillStyle = '#4fc9f0';
    ctx.fillRect(x - pw * 0.5 - 84 * sc, y - ph - 40 * sc, 68 * sc, 18 * sc);
    ctx.fillStyle = '#39424e';
    ctx.fillRect(x - pw * 0.5 - 90 * sc, y - ph - 54 * sc, 80 * sc, 8 * sc);
    ctx.fillStyle = '#c8d2dc';
    ctx.fillRect(x + pw * 0.5 + 26 * sc, y - ph - 70 * sc, 12 * sc, 70 * sc);
    ctx.fillStyle = '#39424e';
    ctx.fillRect(x + pw * 0.5 + 16 * sc, y - ph - 92 * sc, 32 * sc, 24 * sc);
    ctx.fillStyle = '#4fc9f0';
    ctx.fillRect(x + pw * 0.5 + 20 * sc, y - ph - 88 * sc, 24 * sc, 12 * sc);
    if (Math.floor(t * 3) % 2 === 0) {
      ctx.fillStyle = '#ff4030';
      ctx.shadowColor = '#ff4030';
      ctx.shadowBlur = 12 * sc;
      ctx.beginPath();
      ctx.arc(x + pw * 0.5 + 32 * sc, y - ph - 98 * sc, 4 * sc, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    if (sc > 0.15) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(x - 66 * sc, y - ph - 88 * sc, 132 * sc, 26 * sc);
      ctx.strokeStyle = '#2a6f97';
      ctx.lineWidth = 3 * sc;
      ctx.strokeRect(x - 66 * sc, y - ph - 88 * sc, 132 * sc, 26 * sc);
      ctx.fillStyle = '#1a4a6e';
      ctx.font = 'bold ' + 16 * sc + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('HAVALİMANI ' + num, x, y - ph - 75 * sc);
    }
  }

  function drawCloudSprite(x, y, sc, s) {
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.ellipse(x, y, 60 * sc * s.s, 22 * sc * s.s, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 34 * sc * s.s, y + 6 * sc * s.s, 40 * sc * s.s, 16 * sc * s.s, 0, 0, Math.PI * 2);
    ctx.ellipse(x - 34 * sc * s.s, y + 7 * sc * s.s, 36 * sc * s.s, 15 * sc * s.s, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBalloonSprite(b, x, y, sc, t) {
    const bob = Math.sin(t * 1.5 + b.seed) * 6 * sc;
    ctx.fillStyle = b.col;
    ctx.beginPath();
    ctx.ellipse(x, y - 40 * sc + bob, 30 * sc, 36 * sc, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(x - 9 * sc, y - 46 * sc + bob, 8 * sc, 18 * sc, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#5a4632';
    ctx.lineWidth = 2 * sc;
    ctx.beginPath();
    ctx.moveTo(x - 12 * sc, y - 10 * sc + bob); ctx.lineTo(x - 8 * sc, y + 8 * sc + bob);
    ctx.moveTo(x + 12 * sc, y - 10 * sc + bob); ctx.lineTo(x + 8 * sc, y + 8 * sc + bob);
    ctx.stroke();
    ctx.fillStyle = '#8d5a2b';
    ctx.fillRect(x - 10 * sc, y + 6 * sc + bob, 20 * sc, 12 * sc);
  }

  function drawHouseSprite(s, x, y, sc) {
    if (s.tree) {
      ctx.fillStyle = '#6b4a26';
      ctx.fillRect(x - 4 * sc, y - 26 * sc, 8 * sc, 26 * sc);
      ctx.fillStyle = '#2f8f43';
      ctx.beginPath();
      ctx.arc(x, y - 34 * sc, 18 * sc, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#e8dcc8';
      ctx.fillRect(x - 20 * sc, y - 26 * sc, 40 * sc, 26 * sc);
      ctx.fillStyle = '#c0533a';
      ctx.beginPath();
      ctx.moveTo(x - 25 * sc, y - 26 * sc);
      ctx.lineTo(x, y - 42 * sc);
      ctx.lineTo(x + 25 * sc, y - 26 * sc);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#7a5a3a';
      ctx.fillRect(x - 5 * sc, y - 14 * sc, 10 * sc, 14 * sc);
    }
  }

  function drawSprites() {
    const t = performance.now() / 1000;
    const items = [];
    for (const s of houses) items.push({ s, kind: 'house', h: 0 });
    for (const s of clouds) items.push({ s, kind: 'cloud', h: s.h });
    for (const s of balloons) items.push({ s, kind: 'balloon', h: s.h });
    items.push({ s: airport, kind: 'airport', h: 0 });

    const drawList = [];
    for (const it of items) {
      const tr = transform(it.s.x, it.s.z);
      if (tr.fwd < 0.9 || tr.fwd > 45) continue;
      drawList.push({ ...it, fwd: tr.fwd, lat: tr.lat });
    }
    drawList.sort((a, b) => b.fwd - a.fwd);

    for (const it of drawList) {
      const sc = Math.min(1 / it.fwd, 1.1);
      const p = flyScreen(it.fwd, it.lat, it.h);
      if (p.x < -250 || p.x > W + 250) continue;
      if (it.kind === 'airport') drawAirport(p.x, p.gy, sc, t, airport.num);
      else if (it.kind === 'house') drawHouseSprite(it.s, p.x, p.gy, sc);
      else if (it.kind === 'cloud') drawCloudSprite(p.x, p.y, sc, it.s);
      else drawBalloonSprite(it.s, p.x, p.y, sc, t);
    }
  }

  function drawPlane() {
    if (crashed) return;
    const t = performance.now() / 1000;
    const ps = planeScreen();
    const x = ps.x, y = ps.y + Math.sin(t * 2) * 3;
    const bank = steerX * 0.3;

    const shScale = 1.2 - playerH * 0.5;
    ctx.fillStyle = 'rgba(0,0,0,' + Math.max(0.05, 0.32 - playerH * 0.15) + ')';
    ctx.beginPath();
    ctx.ellipse(x, H - 26, 70 * shScale, 9 * shScale, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(bank);

    const wg = ctx.createLinearGradient(-120, 0, 120, 0);
    wg.addColorStop(0, '#c8d2dc');
    wg.addColorStop(0.5, '#f2f6fa');
    wg.addColorStop(1, '#c8d2dc');
    ctx.fillStyle = wg;
    ctx.beginPath();
    ctx.moveTo(-122, 16 + steerY * 6);
    ctx.lineTo(-16, -4);
    ctx.lineTo(16, -4);
    ctx.lineTo(122, 16 + steerY * 6);
    ctx.lineTo(114, 24 + steerY * 6);
    ctx.lineTo(-114, 24 + steerY * 6);
    ctx.closePath();
    ctx.fill();

    for (const s of [-1, 1]) {
      ctx.fillStyle = '#8b98a8';
      ctx.beginPath();
      ctx.ellipse(s * 58, 22 + steerY * 5, 12, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#39424e';
      ctx.beginPath();
      ctx.ellipse(s * 58, 22 + steerY * 5, 8, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255, 200, 120, ' + (0.25 + Math.abs(Math.sin(t * 20 + s)) * 0.2) + ')';
      ctx.beginPath();
      ctx.ellipse(s * 58, 30 + steerY * 5, 5, 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    if (Math.floor(t * 2.5) % 2 === 0) {
      ctx.fillStyle = '#ff3030';
      ctx.shadowColor = '#ff3030';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(-120, 18 + steerY * 6, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#30ff50';
      ctx.shadowColor = '#30ff50';
      ctx.beginPath();
      ctx.arc(120, 18 + steerY * 6, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    const bg = ctx.createLinearGradient(-20, 0, 20, 0);
    bg.addColorStop(0, '#c8d2dc');
    bg.addColorStop(0.45, '#ffffff');
    bg.addColorStop(1, '#aeb9c6');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.ellipse(0, 4, 20, 30, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#d64545';
    ctx.beginPath();
    ctx.ellipse(0, 18, 17, 12, 0, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = '#39424e';
    ctx.fillRect(-14, -2, 28, 4);

    ctx.fillStyle = '#d64545';
    ctx.beginPath();
    ctx.moveTo(-4, -16);
    ctx.lineTo(-2, -66 - steerY * 6);
    ctx.lineTo(12, -62 - steerY * 6);
    ctx.lineTo(10, -16);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('T', 4, -48 - steerY * 6);
    ctx.fillStyle = '#dde5ec';
    ctx.beginPath();
    ctx.moveTo(-52, -14);
    ctx.lineTo(-6, -22);
    ctx.lineTo(-6, -14);
    ctx.lineTo(-48, -8);
    ctx.closePath();
    ctx.moveTo(52, -14);
    ctx.lineTo(6, -22);
    ctx.lineTo(6, -14);
    ctx.lineTo(48, -8);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawYoke() {
    const t = performance.now() / 1000;
    ctx.save();
    ctx.translate(YOKE.x + yokeX * 16, YOKE.y + yokeY * 12);
    ctx.rotate(yokeX * 0.55);
    ctx.fillStyle = '#2e3640';
    ctx.fillRect(-10, 20, 20, 60);
    ctx.strokeStyle = '#39424e';
    ctx.lineWidth = 17;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(0, 0, YOKE.r, Math.PI * 0.15, Math.PI * 0.85, true);
    ctx.stroke();
    ctx.strokeStyle = '#1d2229';
    ctx.lineWidth = 11;
    ctx.beginPath();
    ctx.arc(0, 0, YOKE.r, Math.PI * 0.15, Math.PI * 0.85, true);
    ctx.stroke();
    ctx.strokeStyle = '#14181d';
    ctx.lineWidth = 20;
    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(s * YOKE.r * Math.cos(Math.PI * 0.15), -YOKE.r * Math.sin(Math.PI * 0.15));
      ctx.lineTo(s * YOKE.r * Math.cos(Math.PI * 0.15) + s * 2, -YOKE.r * Math.sin(Math.PI * 0.15) - 26);
      ctx.stroke();
    }
    ctx.fillStyle = '#39424e';
    ctx.beginPath();
    ctx.ellipse(0, 6, 30, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffd54a';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('TALHA AIR', 0, 5);
    ctx.restore();

    if (!yokeActive && state === STATE.PLAYING) {
      ctx.fillStyle = 'rgba(168, 216, 255, ' + (0.25 + Math.sin(t * 3) * 0.1) + ')';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('direksiyonu sürükle', YOKE.x, YOKE.y + YOKE.r + 34);
    }
  }

  // Rota radarı: havalimanının yerini gösterir (ileri = yukarı)
  function drawRadar() {
    const cx = 62, cy = H - 66, R = 48;
    ctx.save();
    ctx.fillStyle = 'rgba(12, 28, 48, 0.8)';
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(168, 216, 255, 0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(168, 216, 255, 0.15)';
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.55, 0, Math.PI * 2);
    ctx.stroke();

    // havalimanı noktası
    const tr = transform(airport.x, airport.z);
    const ang = Math.atan2(tr.lat, tr.fwd);
    const d = airportDist();
    const rr = Math.min(R - 9, (d / 1150) * (R - 9) + 6);
    const axp = cx + Math.sin(ang) * rr;
    const ayp = cy - Math.cos(ang) * rr;

    // rota çizgisi (kesikli)
    ctx.strokeStyle = 'rgba(255, 213, 74, 0.7)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(axp, ayp);
    ctx.stroke();
    ctx.setLineDash([]);

    // havalimanı işareti
    const t = performance.now() / 1000;
    ctx.fillStyle = '#ffd54a';
    ctx.shadowColor = '#ffd54a';
    ctx.shadowBlur = Math.floor(t * 2) % 2 ? 10 : 4;
    ctx.beginPath();
    ctx.arc(axp, ayp, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // uçak (merkez, ileri yukarı)
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(cx, cy - 8);
    ctx.lineTo(cx + 6, cy + 7);
    ctx.lineTo(cx, cy + 3);
    ctx.lineTo(cx - 6, cy + 7);
    ctx.closePath();
    ctx.fill();

    // mesafe
    ctx.fillStyle = '#a8d8ff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(Math.ceil(d * 2) + ' m', cx, cy + R + 14);
    ctx.restore();
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(12, 28, 48, 0.55)';
    ctx.fillRect(0, 0, W, 58);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffd54a';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText('Taşınan: ' + carried, 118, 22);
    ctx.fillStyle = '#a8d8ff';
    ctx.font = '15px sans-serif';
    ctx.fillText('Uçakta: ' + passengers + ' yolcu   Rekor: ' + best, 118, 45);

    // irtifa göstergesi
    const bx = W - 34, by = 90, bh = 200;
    ctx.fillStyle = 'rgba(12, 28, 48, 0.55)';
    ctx.fillRect(bx - 8, by - 6, 24, bh + 12);
    ctx.fillStyle = 'rgba(255, 80, 60, 0.45)';
    ctx.fillRect(bx - 4, by + bh * 0.82, 16, bh * 0.18);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(bx - 4, by, 16, bh);
    const hy = by + bh - (playerH / 1.5) * bh;
    ctx.fillStyle = playerH < 0.28 ? '#ff5030' : '#7fff9e';
    ctx.beginPath();
    ctx.moveTo(bx - 8, hy);
    ctx.lineTo(bx + 20, hy);
    ctx.lineTo(bx + 14, hy - 5);
    ctx.moveTo(bx + 20, hy);
    ctx.lineTo(bx + 14, hy + 5);
    ctx.strokeStyle = ctx.fillStyle;
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = '#a8d8ff';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('İRTİFA', bx + 4, by - 16);

    // iniş rehberi
    const d = airportDist();
    if (state === STATE.PLAYING && stopT <= 0 && d < 60) {
      ctx.fillStyle = playerH < 0.4 ? '#7fff9e' : '#ffb020';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(playerH < 0.4 ? 'İNİŞE HAZIR' : 'İNMEK İÇİN ALÇAL!', W / 2, 130);
    }
    if (msgT > 0) {
      ctx.globalAlpha = Math.min(1, msgT);
      ctx.fillStyle = '#7fff9e';
      ctx.font = 'bold 24px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(msg, W / 2, H * 0.3);
      ctx.globalAlpha = 1;
    }
    if (stopT > 0) {
      ctx.fillStyle = '#ffd54a';
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Yolcular iniyor / biniyor...', W / 2, H * 0.36);
    }
    // alçak irtifa uyarısı
    if (state === STATE.PLAYING && playerH < 0.28 && d > 60 && stopT <= 0) {
      const t = performance.now() / 1000;
      if (Math.floor(t * 4) % 2 === 0) {
        ctx.fillStyle = '#ff4030';
        ctx.font = 'bold 28px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('YUKARI ÇEK!', W / 2, 100);
      }
    }
  }

  function drawCenteredPanel(lines) {
    ctx.fillStyle = 'rgba(8, 20, 36, 0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    let y = H * 0.26;
    for (const [text, size, color] of lines) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.fillText(text, W / 2, y);
      y += size * 1.6;
    }
  }

  // ---- Ana döngü ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);

    drawSky();
    drawGround();
    drawSprites();
    drawPlane();

    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
    }
    ctx.globalAlpha = 1;

    if (state !== STATE.MENU) {
      drawHUD();
      drawYoke();
      drawRadar();
    }

    if (state === STATE.MENU) {
      drawCenteredPanel([
        ['UÇAK SÜRÜŞÜ', 44, '#a8d8ff'],
        ['', 12, '#fff'],
        ['TALHA AIR ile yolcu taşı!', 19, '#ddd'],
        ['Direksiyonla istediğin yöne dön,', 15, '#aaa'],
        ['geri dönmek de serbest!', 15, '#aaa'],
        ['Soldaki radar havalimanının yerini gösterir', 15, '#ffd54a'],
        ['Havalimanına alçalıp üstünden geç: İN', 15, '#7fff9e'],
        ['Uçak kendiliğinden alçalır:', 15, '#aaa'],
        ['YERE ÇARPARSAN PATLARSIN!', 16, '#ff6b5e'],
        ['Başlamak için tıkla veya SPACE', 19, '#ffd54a'],
      ]);
    } else if (paused && state === STATE.PLAYING) {
      drawCenteredPanel([
        ['DURAKLATILDI', 40, '#ffd54a'],
        ['', 10, '#fff'],
        ['Devam etmek için Ayarlar > Başlat', 18, '#ddd'],
      ]);
    } else if (state === STATE.OVER) {
      drawCenteredPanel([
        ['UÇAK DÜŞTÜ!', 46, '#ff4030'],
        ['', 8, '#fff'],
        ['Taşınan yolcu: ' + carried, 28, '#a8d8ff'],
        ['Rekor: ' + best + ' yolcu', 20, '#ffd54a'],
        ['', 10, '#fff'],
        ['Tekrar uçmak için tıkla veya SPACE', 19, '#ddd'],
      ]);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
