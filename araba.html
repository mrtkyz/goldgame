<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dağ Yolu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #16261c;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(140, 220, 160, 0.25);
    max-width: 100vw;
    max-height: 100vh;
  }

  #back {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: #9fe8b5;
    background: rgba(10, 28, 18, 0.75);
    border: 1px solid rgba(159, 232, 181, 0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    text-decoration: none;
  }

  /* Ayarlar menüsü */
  #settings {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  #settings button {
    border: 2px solid rgba(159, 232, 181, 0.5);
    background: rgba(10, 28, 18, 0.85);
    color: #9fe8b5;
    border-radius: 999px;
    font-size: 16px;
    padding: 10px 18px;
    -webkit-tap-highlight-color: transparent;
  }
  #gear {
    width: 46px;
    height: 46px;
    padding: 0 !important;
    font-size: 24px;
    border-radius: 50% !important;
  }
  #menu { display: flex; flex-direction: column; gap: 8px; }
  #menu.hidden { display: none; }

  /* Direksiyon okları: sadece dokunmatik cihazlarda görünür */
  .steer {
    display: none;
    position: fixed;
    bottom: 24px;
    z-index: 10;
    width: 84px;
    height: 84px;
    border-radius: 50%;
    border: 2px solid rgba(159, 232, 181, 0.5);
    background: rgba(10, 28, 18, 0.55);
    color: #9fe8b5;
    font-size: 36px;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.85;
  }
  #steerL { left: 18px; }
  #steerR { right: 18px; }
  #brake {
    left: calc(50% - 92px);
    border-color: rgba(255, 100, 90, 0.6);
    color: #ff6b5e;
    font-size: 17px;
    font-weight: bold;
  }
  #gas {
    left: calc(50% + 8px);
    border-color: rgba(127, 255, 158, 0.6);
    color: #7fff9e;
    font-size: 17px;
    font-weight: bold;
  }
  @media (pointer: coarse) {
    .steer { display: block; }
  }
  .steer:active { background: rgba(159, 232, 181, 0.35); }
  #brake:active { background: rgba(255, 100, 90, 0.35); }
  #gas:active { background: rgba(127, 255, 158, 0.35); }
</style>
</head>
<body>
<a id="back" href="index.html">← Oyunlar</a>
<div id="settings">
  <button id="gear" aria-label="Ayarlar">⚙</button>
  <div id="menu" class="hidden">
    <button id="btnPause">⏸ Durdur</button>
    <button id="btnStart">▶ Başlat</button>
    <button id="btnExit">✕ Çık</button>
  </div>
</div>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<button id="steerL" class="steer" aria-label="Sola dön">◀</button>
<button id="brake" class="steer" aria-label="Fren">FREN</button>
<button id="gas" class="steer" aria-label="Gaz">GAZ</button>
<button id="steerR" class="steer" aria-label="Sağa dön">▶</button>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const BASE_HORIZON = 280;
  const ROADHALF = 260;
  const BEND = 320;

  function fit() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  addEventListener('resize', fit);
  fit();

  // ---- Oyun durumu ----
  const STATE = { MENU: 0, PLAYING: 1 };
  let state = STATE.MENU;
  let paused = false;

  let distance, speed, playerX, elapsed, braking;
  let hillCur, hillTarget, hillEnd;
  let trees, rocks, posts, nextTreeZ, nextRockZ, nextPostZ;
  let shake, rumbleAcc;
  let best = +(localStorage.getItem('araba-best') || 0);

  function resetWorld() {
    distance = 0; speed = 0; playerX = 0; elapsed = 0; braking = false;
    hillCur = 0; hillTarget = 0; hillEnd = 20;
    trees = []; rocks = []; posts = [];
    nextTreeZ = 4; nextRockZ = 14; nextPostZ = 3;
    shake = 0; rumbleAcc = 0;
    seedScenery();
  }

  function seedScenery() {
    while (nextTreeZ < 50) spawnTree();
    while (nextRockZ < 50) spawnRock();
    while (nextPostZ < 50) spawnPost();
  }
  function spawnTree() {
    for (const side of [-1, 1]) {
      if (Math.random() < 0.8) {
        trees.push({
          z: nextTreeZ + Math.random() * 2,
          x: side * (1.3 + Math.random() * 0.9),
          s: 0.8 + Math.random() * 0.6,
        });
      }
    }
    nextTreeZ += 3.5;
  }
  function spawnRock() {
    trees.push({
      z: nextRockZ,
      x: (Math.random() < 0.5 ? -1 : 1) * (1.35 + Math.random() * 0.7),
      s: 0.5 + Math.random() * 0.5,
      rock: true,
    });
    nextRockZ += 12 + Math.random() * 14;
  }
  function spawnPost() {
    for (const side of [-1, 1]) {
      posts.push({ z: nextPostZ, x: side * 1.1 });
    }
    nextPostZ += 4;
  }

  resetWorld();

  function startGame() {
    resetWorld();
    state = STATE.PLAYING;
    paused = false;
    sndStart();
  }

  // ---- Sesler ----
  let audioCtx = null;
  function getAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    } catch (e) { return null; }
  }
  function beep(freq, dur, type = 'sine', vol = 0.15, delay = 0) {
    const ac = getAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ac.destination);
    o.start(t0);
    o.stop(t0 + dur);
  }
  const sndStart = () => { beep(90, 0.3, 'sawtooth', 0.15); beep(140, 0.25, 'sawtooth', 0.12, 0.25); beep(200, 0.2, 'sawtooth', 0.1, 0.45); };
  const sndRumble = () => beep(75, 0.05, 'triangle', 0.06);

  // ---- Girdi ----
  const keys = {};
  addEventListener('keydown', e => {
    if (state === STATE.MENU && (e.key === ' ' || e.key === 'Enter')) { startGame(); e.preventDefault(); return; }
    keys[e.key] = true;
    if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
  });
  addEventListener('keyup', e => keys[e.key] = false);

  let steerTouch = 0, gasTouch = false, brakeTouch = false;
  for (const [id, val] of [['steerL', -1], ['steerR', 1]]) {
    const btn = document.getElementById(id);
    btn.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (state !== STATE.PLAYING) { startGame(); return; }
      steerTouch = val;
    });
    for (const ev of ['pointerup', 'pointercancel', 'pointerleave']) {
      btn.addEventListener(ev, () => { if (steerTouch === val) steerTouch = 0; });
    }
  }
  for (const [id, setter] of [['gas', v => gasTouch = v], ['brake', v => brakeTouch = v]]) {
    const btn = document.getElementById(id);
    btn.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (state !== STATE.PLAYING) { startGame(); return; }
      setter(true);
    });
    for (const ev of ['pointerup', 'pointercancel', 'pointerleave']) {
      btn.addEventListener(ev, () => setter(false));
    }
  }
  canvas.addEventListener('pointerdown', () => {
    if (state !== STATE.PLAYING) startGame();
  });

  // Ayarlar menüsü
  const menuEl = document.getElementById('menu');
  document.getElementById('gear').addEventListener('click', () => {
    menuEl.classList.toggle('hidden');
  });
  document.getElementById('btnPause').addEventListener('click', () => {
    if (state === STATE.PLAYING) paused = true;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnStart').addEventListener('click', () => {
    if (state !== STATE.PLAYING) startGame();
    paused = false;
    menuEl.classList.add('hidden');
  });
  document.getElementById('btnExit').addEventListener('click', () => {
    location.href = 'index.html';
  });

  // ---- Güncelleme ----
  function update(dt) {
    if (state !== STATE.PLAYING || paused) return;
    elapsed += dt;

    // Gaz ve fren: hız tamamen sürücünün kontrolünde
    const gas = keys['ArrowUp'] || keys['w'] || keys['W'] || gasTouch;
    braking = keys['ArrowDown'] || keys['s'] || keys['S'] || brakeTouch;
    if (braking) {
      speed = Math.max(0, speed - 20 * dt);          // fren: güçlü yavaşlama
    } else if (gas) {
      speed = Math.min(24, speed + 9 * dt);          // gaz: hızlan (en fazla 120 km/s)
    } else {
      speed = Math.max(0, speed - 3 * dt);           // pedal yoksa yavaşça süzül
    }

    // Tepeler: iniş ve çıkışlar (yol dümdüz, viraj yok)
    if (distance > hillEnd) {
      hillTarget = (Math.random() * 2 - 1) * 55;
      hillEnd = distance + 30 + Math.random() * 40;
    }
    hillCur += (hillTarget - hillCur) * dt * 0.5;

    // Direksiyon
    let steer = steerTouch;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) steer = -1;
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) steer = 1;
    playerX += steer * dt * 2.0 * Math.min(1, speed / 8); // duran araba dönmez
    playerX = Math.max(-1.35, Math.min(1.35, playerX));

    // Yol dışı: toprakta yavaşlarsın
    const offroad = Math.abs(playerX) > 1;
    if (offroad) {
      speed = Math.max(4, speed * (1 - 1.2 * dt));
      shake = 3;
      rumbleAcc += dt;
      if (rumbleAcc > 0.13) { rumbleAcc = 0; sndRumble(); }
    } else {
      shake = Math.max(0, shake - dt * 12);
    }

    distance += speed * dt;

    // Sahne üretimi
    while (nextTreeZ < distance + 50) spawnTree();
    while (nextRockZ < distance + 50) spawnRock();
    while (nextPostZ < distance + 50) spawnPost();
    trees = trees.filter(s => s.z - distance + 1 > 0.55);
    posts = posts.filter(s => s.z - distance + 1 > 0.55);
  }

  // ---- Çizim ----
  let horizonY = BASE_HORIZON;
  const rowCenter = f => W / 2 - playerX * ROADHALF * f;

  function drawSky() {
    const t = performance.now() / 1000;
    const g = ctx.createLinearGradient(0, 0, 0, horizonY);
    g.addColorStop(0, '#5fb2e8');
    g.addColorStop(1, '#d8ecf5');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, horizonY);
    // güneş
    ctx.beginPath();
    ctx.arc(W * 0.8, 70, 30, 0, Math.PI * 2);
    ctx.fillStyle = '#ffe89a';
    ctx.fill();
    // bulutlar
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (const [bx, by, br] of [[90, 60, 20], [260, 100, 16], [400, 55, 22]]) {
      const x = (bx + t * 5) % (W + 80) - 40;
      ctx.beginPath();
      ctx.ellipse(x, by, br * 1.6, br * 0.7, 0, 0, Math.PI * 2);
      ctx.ellipse(x + br, by + 4, br * 1.1, br * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // kartal
    ctx.strokeStyle = '#4a3b2a';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    const ex = (t * 18) % (W + 80) - 40;
    const flap = Math.sin(t * 6) * 6;
    ctx.beginPath();
    ctx.moveTo(ex - 16, 130);
    ctx.quadraticCurveTo(ex - 8, 130 - flap, ex, 130);
    ctx.quadraticCurveTo(ex + 8, 130 - flap, ex + 16, 130);
    ctx.stroke();

    // uzak karlı dağlar
    const mOff = 0;
    for (const [mx, mw, mh, col, snow] of [
      [-80, 300, 150, '#8ba3b8', true],
      [120, 340, 190, '#7b93a8', true],
      [330, 280, 140, '#8ba3b8', true],
    ]) {
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(mOff + mx, horizonY);
      ctx.lineTo(mOff + mx + mw / 2, horizonY - mh);
      ctx.lineTo(mOff + mx + mw, horizonY);
      ctx.closePath();
      ctx.fill();
      if (snow) {
        ctx.fillStyle = '#f2f7fa';
        ctx.beginPath();
        ctx.moveTo(mOff + mx + mw / 2 - mw * 0.11, horizonY - mh + mh * 0.22);
        ctx.lineTo(mOff + mx + mw / 2, horizonY - mh);
        ctx.lineTo(mOff + mx + mw / 2 + mw * 0.11, horizonY - mh + mh * 0.22);
        ctx.closePath();
        ctx.fill();
      }
    }
    // yakın yeşil sırt
    ctx.fillStyle = '#4a7a55';
    ctx.beginPath();
    ctx.moveTo(0, horizonY);
    for (let x = 0; x <= W; x += 40) {
      ctx.lineTo(x, horizonY - 24 - Math.sin((x + mOff) * 0.02) * 16);
    }
    ctx.lineTo(W, horizonY);
    ctx.closePath();
    ctx.fill();
  }

  function drawRoad() {
    for (let sy = horizonY; sy < H; sy++) {
      const f = (sy - horizonY) / (H - horizonY);
      const z = distance + 1 / Math.max(f, 0.02);
      const band = Math.floor(z * 1.4) % 2;
      // dağ çayırı / toprak
      ctx.fillStyle = band ? '#4f8a54' : '#47804c';
      ctx.fillRect(0, sy, W, 1);
      // asfalt
      const c = rowCenter(f);
      const half = ROADHALF * f;
      ctx.fillStyle = band ? '#565a62' : '#50545c';
      ctx.fillRect(c - half, sy, half * 2, 1);
      if (f > 0.05) {
        // kenar çizgileri
        ctx.fillStyle = '#e8e8e8';
        ctx.fillRect(c - half, sy, half * 0.05, 1);
        ctx.fillRect(c + half * 0.95, sy, half * 0.05, 1);
        // orta kesik çizgi (sarı)
        if (band === 0) {
          ctx.fillStyle = '#f1c40f';
          ctx.fillRect(c - half * 0.02, sy, half * 0.04, 1);
        }
      }
    }
  }

  function drawTree(x, y, sc, s) {
    const k = s.s;
    if (s.rock) {
      ctx.fillStyle = '#7d8792';
      ctx.beginPath();
      ctx.ellipse(x, y - 20 * sc * k, 38 * sc * k, 26 * sc * k, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#98a2ad';
      ctx.beginPath();
      ctx.ellipse(x - 12 * sc * k, y - 34 * sc * k, 17 * sc * k, 12 * sc * k, -0.4, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    // çam ağacı
    ctx.fillStyle = '#6b4a26';
    ctx.fillRect(x - 7 * sc * k, y - 40 * sc * k, 14 * sc * k, 40 * sc * k);
    for (let i = 0; i < 3; i++) {
      const ty = y - 36 * sc * k - i * 34 * sc * k;
      const tw = (66 - i * 14) * sc * k;
      ctx.fillStyle = i % 2 ? '#1f6b35' : '#2a7e41';
      ctx.beginPath();
      ctx.moveTo(x - tw, ty);
      ctx.lineTo(x, ty - 52 * sc * k);
      ctx.lineTo(x + tw, ty);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawPost(x, y, sc) {
    ctx.fillStyle = '#e8e8e8';
    ctx.fillRect(x - 4 * sc, y - 30 * sc, 8 * sc, 30 * sc);
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(x - 4 * sc, y - 30 * sc, 8 * sc, 8 * sc);
  }

  function drawSprites() {
    const sprites = [
      ...trees.map(s => ({ ...s, kind: 'tree' })),
      ...posts.map(s => ({ ...s, kind: 'post' })),
    ].sort((a, b) => b.z - a.z);

    for (const s of sprites) {
      const zRel = s.z - distance + 1;
      if (zRel < 0.55) continue;
      const f = 1 / zRel;
      if (f > 1.05 || f < 0.03) continue;
      const fc = Math.min(f, 1);
      const y = horizonY + fc * (H - horizonY);
      const x = rowCenter(fc) + s.x * ROADHALF * fc;
      if (s.kind === 'tree') drawTree(x, y, fc, s);
      else drawPost(x, y, fc);
    }
  }

  function drawCar() {
    const t = performance.now() / 1000;
    const steer = (keys['ArrowLeft'] || keys['a'] || keys['A'] || steerTouch === -1) ? -1
                : (keys['ArrowRight'] || keys['d'] || keys['D'] || steerTouch === 1) ? 1 : 0;
    const bob = Math.sin(t * 9) * 1.5 + (Math.random() - 0.5) * shake * 2;
    const baseX = W / 2 + playerX * 24 + (Math.random() - 0.5) * shake * 2;
    const baseY = H - 60 + bob;

    ctx.save();
    ctx.translate(baseX, baseY);
    ctx.rotate(steer * 0.045);

    // gölge
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, 34, 105, 14, 0, 0, Math.PI * 2);
    ctx.fill();

    // tekerlekler
    ctx.fillStyle = '#191c20';
    ctx.fillRect(-96, 2, 26, 34);
    ctx.fillRect(70, 2, 26, 34);

    // gövde
    const g = ctx.createLinearGradient(-90, 0, 90, 0);
    g.addColorStop(0, '#a82c1c');
    g.addColorStop(0.5, '#e04530');
    g.addColorStop(1, '#a82c1c');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(-90, 30);
    ctx.lineTo(-86, -26);
    ctx.quadraticCurveTo(0, -38, 86, -26);
    ctx.lineTo(90, 30);
    ctx.quadraticCurveTo(0, 40, -90, 30);
    ctx.closePath();
    ctx.fill();

    // tavan + arka cam
    ctx.fillStyle = '#c0392b';
    ctx.beginPath();
    ctx.moveTo(-62, -26);
    ctx.lineTo(-46, -74);
    ctx.quadraticCurveTo(0, -82, 46, -74);
    ctx.lineTo(62, -26);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#243447';
    ctx.beginPath();
    ctx.moveTo(-50, -30);
    ctx.lineTo(-38, -68);
    ctx.quadraticCurveTo(0, -75, 38, -68);
    ctx.lineTo(50, -30);
    ctx.closePath();
    ctx.fill();

    // spoyler
    ctx.fillStyle = '#8f2216';
    ctx.fillRect(-70, -84, 140, 10);
    ctx.fillRect(-58, -74, 10, 12);
    ctx.fillRect(48, -74, 10, 12);

    // stop lambaları (frende çok daha parlak)
    ctx.fillStyle = braking ? '#ff1500' : '#ff3b2e';
    ctx.shadowColor = '#ff3b2e';
    ctx.shadowBlur = braking ? 30 : 10;
    ctx.fillRect(-82, -18, 26, 12);
    ctx.fillRect(56, -18, 26, 12);
    ctx.shadowBlur = 0;

    // plaka
    ctx.fillStyle = '#fff';
    ctx.fillRect(-34, 2, 68, 20);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    ctx.strokeRect(-34, 2, 68, 20);
    ctx.fillStyle = '#222';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('07 TALHA', 0, 12);

    // egzoz dumanı
    ctx.fillStyle = 'rgba(200,200,200,0.4)';
    for (let i = 0; i < 2; i++) {
      const dx = -74 - i * 14 - (t * 30 % 12);
      ctx.beginPath();
      ctx.arc(dx, 26 + Math.sin(t * 4 + i) * 3, 5 + i * 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(10, 28, 18, 0.55)';
    ctx.fillRect(0, 0, W, 58);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText(Math.floor(distance * 2) + ' m', 118, 22);
    ctx.fillStyle = '#9fe8b5';
    ctx.font = '15px sans-serif';
    ctx.fillText('Hız: ' + Math.floor(speed * 5) + ' km/s   Rekor: ' + best + ' m', 118, 45);
  }

  function drawCenteredPanel(lines) {
    ctx.fillStyle = 'rgba(8, 22, 14, 0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    let y = H * 0.28;
    for (const [text, size, color] of lines) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.fillText(text, W / 2, y);
      y += size * 1.6;
    }
  }

  // ---- Ana döngü ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);

    // rekoru canlı güncelle
    const m = Math.floor(distance * 2);
    if (state === STATE.PLAYING && m > best) {
      best = m;
      localStorage.setItem('araba-best', best);
    }

    horizonY = BASE_HORIZON + hillCur;

    drawSky();
    drawRoad();
    drawSprites();
    drawCar();
    if (state !== STATE.MENU) drawHUD();

    if (state === STATE.MENU) {
      drawCenteredPanel([
        ['DAĞ YOLU', 46, '#9fe8b5'],
        ['', 14, '#fff'],
        ['Dağlarda araba sürüşü!', 20, '#ddd'],
        ['GAZ: yukarı ok / W veya GAZ pedalı', 16, '#7fff9e'],
        ['FREN: aşağı ok / S veya FREN pedalı', 16, '#ff8080'],
        ['Yön: sağ-sol ok / A-D veya ekran okları', 16, '#aaa'],
        ['Yoldan çıkarsan toprakta yavaşlarsın', 16, '#ffb020'],
        ['Başlamak için tıkla veya SPACE', 20, '#ffd54a'],
      ]);
    } else if (paused && state === STATE.PLAYING) {
      drawCenteredPanel([
        ['DURAKLATILDI', 40, '#ffd54a'],
        ['', 10, '#fff'],
        ['Devam etmek için Ayarlar > Başlat', 18, '#ddd'],
      ]);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
