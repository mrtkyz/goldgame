<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Yılan Oyunu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #0d2418;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #game {
    display: block;
    background: linear-gradient(#1a4a2e 0%, #0d2418 70%, #143b24 100%);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(80, 220, 120, 0.25);
    max-width: 100vw;
    max-height: 100vh;
  }

  #back {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: #7fff9e;
    background: rgba(8, 30, 18, 0.75);
    border: 1px solid rgba(127, 255, 158, 0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    text-decoration: none;
  }

  /* Ekran yön tuşları: sadece dokunmatik cihazlarda görünür */
  #dpad {
    display: none;
    position: fixed;
    right: 14px;
    bottom: 18px;
    z-index: 10;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.85;
  }
  @media (pointer: coarse) {
    #dpad { display: flex; }
  }
  #dpad .mid { display: flex; gap: 84px; }
  #dpad button {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    border: 2px solid rgba(127, 255, 158, 0.5);
    background: rgba(8, 30, 18, 0.6);
    color: #7fff9e;
    font-size: 32px;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  #dpad button:active {
    background: rgba(127, 255, 158, 0.35);
  }
</style>
</head>
<body>
<a id="back" href="index.html">← Oyunlar</a>
<div id="wrap"><canvas id="game" width="480" height="624"></canvas></div>
<div id="dpad">
  <button data-dir="0,-1" aria-label="Yukarı">▲</button>
  <div class="mid">
    <button data-dir="-1,0" aria-label="Sol">◀</button>
    <button data-dir="1,0" aria-label="Sağ">▶</button>
  </div>
  <button data-dir="0,1" aria-label="Aşağı">▼</button>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const CELL = 40;                 // hücre boyutu (büyük kareler = kolay nişan)
  const COLS = 12, ROWS = 14;      // oyun alanı: 12x14 hücre
  const TOP = 64;                  // üstteki HUD şeridi

  function fit() {
    const scale = Math.min(innerWidth / W, innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  addEventListener('resize', fit);
  fit();

  // ---- Oyun durumu ----
  const STATE = { MENU: 0, PLAYING: 1, OVER: 2 };
  let state = STATE.MENU;

  let snake, dir, food, score, eaten, stepTime, stepAcc;
  let best = +(localStorage.getItem('yilan-best') || 0);

  function startGame() {
    snake = [{ x: 5, y: 7 }, { x: 4, y: 7 }, { x: 3, y: 7 }];
    dir = { x: 1, y: 0 };
    dirQueue = [];
    score = 0; eaten = 0;
    stepTime = 0.24;   // saniye cinsinden adım süresi; yedikçe kısalır
    stepAcc = 0;
    placeFood();
    state = STATE.PLAYING;
  }

  function placeFood() {
    while (true) {
      const f = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS),
      };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
    }
  }

  function gameOver() {
    state = STATE.OVER;
    sndOver();
    if (score > best) {
      best = score;
      localStorage.setItem('yilan-best', best);
    }
  }

  // ---- Sesler ----
  let audioCtx = null;
  function getAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    } catch (e) { return null; }
  }
  function beep(freq, dur, type = 'sine', vol = 0.15, delay = 0) {
    const ac = getAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g).connect(ac.destination);
    o.start(t0);
    o.stop(t0 + dur);
  }
  const sndEat = () => { beep(520, 0.08, 'triangle', 0.18); beep(780, 0.1, 'triangle', 0.12, 0.06); };
  const sndOver = () => { beep(330, 0.25, 'square', 0.1); beep(220, 0.4, 'square', 0.1, 0.2); };

  // ---- Girdi ----
  // Komut kuyruğu: hızlı art arda basılan dönüşler kaybolmaz
  let dirQueue = [];
  function setDir(x, y) {
    const last = dirQueue.length ? dirQueue[dirQueue.length - 1] : dir;
    if (x === last.x && y === last.y) return; // aynı yön tekrar eklenmez
    if (x === -last.x && y === -last.y) {
      // Tam tersine basıldı: otomatik U dönüşü (önce güvenli yana, sonra geriye)
      if (dirQueue.length >= 2) return;
      const head = snake[0];
      const perps = last.x !== 0
        ? [{ x: 0, y: -1 }, { x: 0, y: 1 }]
        : [{ x: -1, y: 0 }, { x: 1, y: 0 }];
      const safe = perps.filter(p => {
        const nx = head.x + p.x, ny = head.y + p.y;
        return nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS &&
               !snake.some(s => s.x === nx && s.y === ny);
      });
      dirQueue.push(safe[0] || perps[0], { x, y });
      return;
    }
    if (dirQueue.length < 3) dirQueue.push({ x, y });
  }
  addEventListener('keydown', e => {
    if ((state === STATE.MENU || state === STATE.OVER) &&
        (e.key === ' ' || e.key === 'Enter')) { startGame(); e.preventDefault(); return; }
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'a' || k === 'A') setDir(-1, 0);
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') setDir(1, 0);
    else if (k === 'ArrowUp' || k === 'w' || k === 'W') setDir(0, -1);
    else if (k === 'ArrowDown' || k === 's' || k === 'S') setDir(0, 1);
    if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(k)) e.preventDefault();
  });

  // Dokunmatik: parmağı kaydırdıkça anında döner (parmağı kaldırmak gerekmez)
  let touchStart = null;
  const SWIPE = 22;
  function trySwipe(x, y) {
    if (!touchStart) return;
    const dx = x - touchStart.x;
    const dy = y - touchStart.y;
    if (Math.abs(dx) < SWIPE && Math.abs(dy) < SWIPE) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(Math.sign(dx), 0);
    else setDir(0, Math.sign(dy));
    touchStart = { x, y }; // sürüklemeye devam ederek tekrar dönebilsin
  }
  canvas.addEventListener('pointerdown', e => {
    if (state !== STATE.PLAYING) { startGame(); return; }
    touchStart = { x: e.clientX, y: e.clientY };
  });
  addEventListener('pointermove', e => trySwipe(e.clientX, e.clientY));
  addEventListener('pointerup', e => { trySwipe(e.clientX, e.clientY); touchStart = null; });

  // Ekran yön tuşları (mobil)
  for (const btn of document.querySelectorAll('#dpad button')) {
    const [bx, by] = btn.dataset.dir.split(',').map(Number);
    btn.addEventListener('pointerdown', e => {
      e.preventDefault();
      e.stopPropagation();
      if (state !== STATE.PLAYING) { startGame(); return; }
      setDir(bx, by);
    });
  }

  // ---- Güncelleme ----
  function step() {
    if (dirQueue.length) dir = dirQueue.shift();
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Duvara veya kendine çarpma
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      // Yedi: büyür (kuyruk kesilmez), hızlanır
      score += 10;
      eaten++;
      stepTime = Math.max(0.1, 0.24 - eaten * 0.004);
      sndEat();
      placeFood();
    } else {
      snake.pop();
    }
  }

  function update(dt) {
    if (state !== STATE.PLAYING) return;
    stepAcc += dt;
    while (stepAcc >= stepTime) {
      stepAcc -= stepTime;
      step();
      if (state !== STATE.PLAYING) return;
    }
  }

  // ---- Çizim ----
  const cx = c => c * CELL + CELL / 2;
  const cy = r => TOP + r * CELL + CELL / 2;

  function drawBoard() {
    // satranç deseni gibi çok hafif kareler
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if ((r + c) % 2 === 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.025)';
          ctx.fillRect(c * CELL, TOP + r * CELL, CELL, CELL);
        }
      }
    }
    ctx.strokeStyle = 'rgba(127, 255, 158, 0.25)';
    ctx.lineWidth = 2;
    ctx.strokeRect(1, TOP + 1, COLS * CELL - 2, ROWS * CELL - 2);
  }

  function drawFood(t) {
    const pulse = 1 + 0.15 * Math.sin(t * 6);
    const x = cx(food.x), y = cy(food.y);
    const g = ctx.createRadialGradient(x - 3, y - 3, 1, x, y, 15 * pulse);
    g.addColorStop(0, '#ffe89a');
    g.addColorStop(1, '#e0a419');
    ctx.beginPath();
    ctx.arc(x, y, 13 * pulse, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    // parlak halka
    ctx.strokeStyle = 'rgba(255, 232, 154, 0.35)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y, 17 * pulse, 0, Math.PI * 2);
    ctx.stroke();
  }

  function drawSnake() {
    // gövde: baştan kuyruğa incelerek ve koyulaşarak
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const f = i / Math.max(1, snake.length - 1);       // 0=baş, 1=kuyruk
      const rad = 17 - f * 6;
      const x = cx(s.x), y = cy(s.y);
      const g = ctx.createRadialGradient(x - 5, y - 5, 1, x, y, rad + 3);
      g.addColorStop(0, i === 0 ? '#a8ff9e' : '#63d97a');
      g.addColorStop(1, i === 0 ? '#3faf4e' : '#2a7e3c');
      ctx.beginPath();
      ctx.arc(x, y, rad, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }
    // baş: gözler
    const h = snake[0];
    const hx = cx(h.x), hy = cy(h.y);
    const ex = dir.y === 0 ? 0 : 7, ey = dir.x === 0 ? 0 : 7; // göz dizilimi yöne dik
    for (const sgn of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(hx + sgn * ex + dir.x * 5, hy + sgn * ey + dir.y * 5, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(hx + sgn * ex + dir.x * 7.5, hy + sgn * ey + dir.y * 7.5, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#123';
      ctx.fill();
    }
  }

  function drawHUD() {
    // skor: yem noktası simgesi + sayı
    const g = ctx.createRadialGradient(28, 30, 1, 30, 32, 10);
    g.addColorStop(0, '#ffe89a');
    g.addColorStop(1, '#e0a419');
    ctx.beginPath();
    ctx.arc(30, 32, 9, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#7fff9e';
    ctx.font = 'bold 26px sans-serif';
    ctx.fillText(String(score), 50, 33);
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#9c9';
    ctx.font = '15px sans-serif';
    ctx.fillText('Rekor: ' + best, 16, 48);
    // uzunluk göstergesi
    ctx.textAlign = 'right';
    ctx.fillStyle = '#9c9';
    ctx.font = '15px sans-serif';
    ctx.fillText('Uzunluk: ' + snake.length, W - 16, 24);
  }

  function drawCenteredPanel(lines) {
    ctx.fillStyle = 'rgba(5, 20, 12, 0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    let y = H * 0.30;
    for (const [text, size, color] of lines) {
      ctx.fillStyle = color;
      ctx.font = 'bold ' + size + 'px sans-serif';
      ctx.fillText(text, W / 2, y);
      y += size * 1.6;
    }
  }

  // ---- Ana döngü ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);

    ctx.clearRect(0, 0, W, H);
    drawBoard();
    if (state !== STATE.MENU) {
      drawFood(now / 1000);
      drawSnake();
      drawHUD();
    }

    if (state === STATE.MENU) {
      drawCenteredPanel([
        ['YILAN OYUNU', 44, '#7fff9e'],
        ['', 20, '#fff'],
        ['Noktaları ye, büyü!', 20, '#ddd'],
        ['Ama duvara ve kendine çarpma!', 16, '#aaa'],
        ['Ok tuşları / WASD veya kaydırarak oyna', 16, '#aaa'],
        ['Dikkat: yedikçe hızlanırsın!', 16, '#ffb020'],
        ['Başlamak için tıkla veya SPACE', 20, '#ffd54a'],
      ]);
    } else if (state === STATE.OVER) {
      drawCenteredPanel([
        ['OYUN BİTTİ', 44, '#ff6b6b'],
        ['Skorun: ' + score, 30, '#7fff9e'],
        ['Uzunluğun: ' + snake.length, 22, '#9c9'],
        [score >= best && score > 0 ? '★ YENİ REKOR! ★' : 'Rekor: ' + best, 24, '#ffd54a'],
        ['', 10, '#fff'],
        ['Tekrar oynamak için tıkla veya SPACE', 20, '#ddd'],
      ]);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
